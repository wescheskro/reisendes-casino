<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a05">
<title>Bar – Reisendes Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;background:#0a0a05;overscroll-behavior:none}
body{font-family:'Playfair Display',serif;color:#F0E6D3;user-select:none;touch-action:manipulation}

/* ============ BAR BACKGROUND ============ */
.bar-bg{
  position:fixed;inset:0;z-index:0;
  background:
    url('/games/img/bar-bg.jpg') center center / 120% auto no-repeat,
    url('/games/img/bg.jpg') center center / cover no-repeat;
  background-color:#0a0a05;
}
.bar-bg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(0,0,0,.2) 0%,rgba(0,0,0,.6) 100%);
}

/* ============ TOP BAR ============ */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,.8),transparent);
}
.top-bar .logo{font-size:14px;color:#D4AF37;font-weight:700}
.top-bar .info{font-size:11px;color:rgba(240,230,211,.6)}
.top-bar .back{
  background:rgba(0,0,0,.4);border:1px solid rgba(212,175,55,.3);
  color:#D4AF37;padding:6px 12px;border-radius:8px;cursor:pointer;
  font-family:inherit;font-size:12px;
}

/* ============ SITZPLÄTZE (runder Tisch) ============ */
.seats{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(90vw,500px);height:min(90vw,500px);
  z-index:10;
}
.seat{
  position:absolute;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transition:transform .2s;z-index:55;
}
.seat:hover{transform:scale(1.05)}
.seat.dragging{opacity:.8;z-index:999;transition:none}
.seat-avatar{
  width:96px;height:96px;border-radius:50%;
  border:3px solid rgba(212,175,55,.4);
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  display:flex;align-items:center;justify-content:center;
  font-size:40px;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.seat-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.seat-avatar.occupied{border-color:#D4AF37;box-shadow:0 0 12px rgba(212,175,55,.3)}
.seat-avatar.video-active{border-color:#4CAF50;box-shadow:0 0 12px rgba(76,175,80,.4)}
.seat-name{
  font-size:13px;color:#D4AF37;margin-top:4px;font-weight:700;
  text-shadow:0 2px 6px rgba(0,0,0,.9);
  white-space:nowrap;overflow:visible;
}
.seat-empty{
  font-size:9px;color:rgba(240,230,211,.4);margin-top:4px;
}
.seat-video{
  position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:120px;height:90px;border-radius:10px;overflow:hidden;
  border:2px solid rgba(212,175,55,.4);
  box-shadow:0 4px 16px rgba(0,0,0,.7);
  display:none;
}
.seat-video.active{display:block}
.seat-video video{width:100%;height:100%;object-fit:cover}

/* ============ CONTROLS ============ */
.bar-controls{
  position:fixed;bottom:65px;left:50%;transform:translateX(-50%);
  display:flex;gap:12px;z-index:100;
}
.bar-btn{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;cursor:pointer;transition:all .2s;
  border:2px solid rgba(212,175,55,.3);
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.bar-btn:hover{transform:scale(1.1);border-color:rgba(212,175,55,.6)}
.bar-btn.active{border-color:#4CAF50;background:rgba(76,175,80,.2)}
.bar-btn.end{border-color:#ff4444;background:rgba(255,68,68,.2)}

/* ============ EIGENES VIDEO ============ */
.my-video{
  position:fixed;bottom:90px;right:16px;
  width:140px;height:105px;border-radius:12px;overflow:hidden;
  border:2px solid rgba(212,175,55,.4);
  box-shadow:0 4px 16px rgba(0,0,0,.7);
  z-index:50;display:none;
}
.my-video.active{display:block}
.my-video video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}

/* ============ CHAT ============ */
.bar-chat{
  display:contents;
}
.chat-messages{
  position:fixed;top:80px;left:0;right:0;width:100%;
  overflow-y:auto;padding:8px;
  background:rgba(0,0,0,.5);border-radius:0 0 10px 10px;
  backdrop-filter:blur(6px);max-height:150px;z-index:50;
  scrollbar-width:thin;scrollbar-color:rgba(212,175,55,.3) transparent;
}
.chat-msg{font-size:11px;margin-bottom:4px}
.chat-msg .name{color:#D4AF37;font-weight:700}
.chat-msg .text{color:#F0E6D3}
.chat-input-wrap{
  position:fixed;bottom:0;left:0;right:0;width:100%;
  display:flex;gap:0;z-index:50;
}
.chat-input{
  flex:1;padding:10px 12px;border:none;
  background:rgba(0,0,0,.7);color:#F0E6D3;
  font-size:13px;font-family:inherit;
  border-radius:0;outline:none;
  backdrop-filter:blur(6px);
}
.chat-input::placeholder{color:rgba(212,175,55,.3)}
.chat-tts-btn{
  background:rgba(0,0,0,.7);border:none;
  color:rgba(212,175,55,.5);padding:10px 12px;cursor:pointer;
  font-size:16px;border-radius:10px 0 0 10px;
  backdrop-filter:blur(6px);transition:.2s;
}
.chat-tts-btn.active{color:#4CAF50;text-shadow:0 0 8px rgba(76,175,80,.5)}
.chat-send{
  background:rgba(212,175,55,.2);border:none;
  color:#D4AF37;padding:10px 14px;cursor:pointer;
  border-radius:0 10px 10px 0;font-size:16px;
  backdrop-filter:blur(6px);
}

/* ============ ONLINE COUNT ============ */
.bar-online{
  position:fixed;top:40px;right:16px;z-index:50;
  font-size:11px;color:rgba(240,230,211,.5);
  background:rgba(0,0,0,.4);padding:4px 10px;border-radius:20px;
  backdrop-filter:blur(6px);
}
.bar-online .dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:#4CAF50;margin-right:4px;vertical-align:middle;
}

/* Sprechblasen */
.bot-bubble{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:rgba(26,26,46,.92);border:1px solid rgba(212,175,55,.35);
  border-radius:12px;padding:8px 14px;
  font-size:12px;color:rgba(240,230,211,.9);line-height:1.3;
  white-space:nowrap;max-width:200px;white-space:normal;text-align:center;
  pointer-events:none;z-index:10001;
  animation:bubble-in .3s ease;
  box-shadow:0 4px 12px rgba(0,0,0,.5);
}
.bot-bubble::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:8px solid transparent;border-top-color:rgba(26,26,46,.92);
}
@keyframes bubble-in{
  from{opacity:0;transform:translateX(-50%) translateY(6px) scale(.9)}
  to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
}
@keyframes bubble-out{
  from{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  to{opacity:0;transform:translateX(-50%) translateY(6px) scale(.9)}
}

/* Getränke auf dem Tisch */
.bar-drinks{
  position:fixed;bottom:42%;left:50%;transform:translateX(-50%);
  z-index:50;display:flex;gap:16px;align-items:flex-end;
}
.bar-drink{
  cursor:grab;transition:transform .2s;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.6));
  text-align:center;
  touch-action:none;user-select:none;
  position:relative;
}
.bar-drink.dragging{cursor:grabbing;opacity:.8;z-index:999}
.bar-drink img{width:56px;height:100px;object-fit:contain;}
.bar-drink:hover{transform:scale(1.15)}
.bar-drink:active{transform:scale(.95)}
.bar-drink-label{
  background:rgba(212,175,55,.9);color:#000;
  font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;
  margin-top:2px;white-space:nowrap;
}
/* Kauf-Dialog */
.champagne-modal{
  display:none;position:fixed;inset:0;z-index:100000;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  justify-content:center;align-items:center;
}
.champagne-modal.active{display:flex}
.champagne-card{
  background:linear-gradient(145deg,#1a1a2e,#16213e);
  border:2px solid #D4AF37;border-radius:20px;
  padding:24px;text-align:center;max-width:300px;width:90%;
}
.champagne-card img{width:120px;margin-bottom:12px;filter:drop-shadow(0 4px 16px rgba(212,175,55,.4))}
.champagne-card h3{color:#D4AF37;font-family:'Playfair Display',serif;font-size:20px;margin:0 0 6px}
.champagne-card p{color:rgba(240,230,211,.7);font-size:13px;margin:0 0 16px}
.champagne-price{font-size:24px;font-weight:900;color:#F4D03F;margin-bottom:16px}
.champagne-buy{
  background:linear-gradient(135deg,#D4AF37,#F4D03F);color:#000;
  font-family:'Playfair Display',serif;font-size:16px;font-weight:800;
  padding:12px 30px;border:none;border-radius:50px;cursor:pointer;
  letter-spacing:1px;transition:.2s;width:100%;
}
.champagne-buy:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(212,175,55,.5)}
.champagne-cancel{
  background:none;border:none;color:rgba(240,230,211,.5);
  font-size:12px;cursor:pointer;margin-top:10px;font-family:inherit;
}

.seat-avatar.bot{border-color:rgba(160,130,55,.5);box-shadow:0 0 8px rgba(160,130,55,.2);animation:bot-idle 3s ease-in-out infinite}
.seat-name.bot{color:rgba(212,175,55,.6)}
@keyframes bot-idle{
  0%,100%{transform:translateY(0) rotate(0deg)}
  25%{transform:translateY(-3px) rotate(1.5deg)}
  50%{transform:translateY(0) rotate(0deg)}
  75%{transform:translateY(-2px) rotate(-1deg)}
}
.seat.bot-moving{transition:top .8s ease-in-out, left .8s ease-in-out}
.seat.bot-moving .seat-avatar{animation:bot-hop .8s ease-in-out}
@keyframes bot-hop{
  0%{transform:translateY(0) scale(1)}
  30%{transform:translateY(-15px) scale(1.1)}
  60%{transform:translateY(-5px) scale(1.05)}
  100%{transform:translateY(0) scale(1)}
}

.bot-toggle-bar{
  position:fixed;top:40px;left:16px;z-index:50;
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:rgba(240,230,211,.5);
  background:rgba(0,0,0,.4);padding:4px 10px;border-radius:20px;
  backdrop-filter:blur(6px);cursor:pointer;user-select:none;
}
.bot-toggle-bar input{display:none}
.bot-switch-bar{
  width:28px;height:16px;border-radius:8px;
  background:rgba(255,255,255,.15);position:relative;transition:.2s;
}
.bot-switch-bar::after{
  content:'';position:absolute;top:2px;left:2px;
  width:12px;height:12px;border-radius:50%;background:#888;transition:.2s;
}
.bot-toggle-bar input:checked + .bot-switch-bar{background:rgba(76,175,80,.5)}
.bot-toggle-bar input:checked + .bot-switch-bar::after{left:14px;background:#4caf50}

@media(max-width:500px){
  .seat-avatar{width:72px;height:72px;font-size:32px}
  .seat-video{width:100px;height:75px;top:-70px}
  .bar-btn{width:48px;height:48px;font-size:20px}
  .chat-input-wrap{bottom:0}
  .my-video{width:110px;height:82px}
}

@media (max-height: 450px) and (orientation: landscape) {
  .bar-container { flex-direction: row; }
  .seat-avatar { width: 56px !important; height: 56px !important; }
  .bar-header { padding: 4px 8px; }
  body { overflow: auto; }
}

/* ═══════ PLAYER MENU ═══════ */
.player-menu-overlay{position:fixed;inset:0;z-index:190;display:none}
.player-menu-overlay.open{display:block}
.player-menu{
  position:fixed;z-index:200;min-width:200px;
  background:linear-gradient(165deg,rgba(30,18,8,.97),rgba(15,8,3,.98));
  border:1.5px solid rgba(212,175,55,.3);border-radius:14px;
  box-shadow:0 8px 32px rgba(0,0,0,.7),0 0 16px rgba(212,175,55,.1);
  transform:scale(.9);opacity:0;pointer-events:none;transition:.15s;
}
.player-menu.open{transform:scale(1);opacity:1;pointer-events:all}
.pm-header{padding:14px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(212,175,55,.12)}
.pm-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#2c1810,#1a0f08);border:2px solid rgba(212,175,55,.4);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.pm-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.pm-name{font-size:14px;font-weight:700;color:#F4D03F;letter-spacing:.5px}
.pm-status{font-size:10px;color:rgba(240,230,211,.4);margin-top:1px}
.pm-actions{padding:6px 0}
.pm-action{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;transition:.15s;color:#F0E6D3;font-size:13px;border:none;background:none;width:100%;font-family:inherit}
.pm-action:hover{background:rgba(212,175,55,.1)}
.pm-action:active{background:rgba(212,175,55,.18)}
.pm-action-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.pm-action-icon.profile{background:rgba(212,175,55,.15);color:#F4D03F}
.pm-action-icon.call{background:rgba(46,204,113,.15);color:#2ecc71}
.pm-action-icon.video{background:rgba(52,152,219,.15);color:#3498db}
.pm-action-icon.voice{background:rgba(155,89,182,.15);color:#9b59b6}
.pm-action-icon.money{background:rgba(241,196,15,.15);color:#f1c40f}
.pm-action-icon.msg{background:rgba(230,126,34,.15);color:#e67e22}
.pm-action-label{font-weight:600}
.pm-action-sub{font-size:10px;color:rgba(240,230,211,.35);margin-top:1px}
</style>
</head>
<body>

<div class="bar-bg"></div>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="logo">🍺 Die Bar · Wodding <script>document.write(new URLSearchParams(location.search).get('room')||'1')</script></div>
  <div class="info" id="barInfo">Verbinde...</div>
  <button class="back" id="barLobbyBtn" onclick="location.href='/'">← Lobby</button>
</div>
<script>if(location.search.includes('embed=1'))document.getElementById('barLobbyBtn').style.display='none';</script>

<div class="bar-online" id="barOnline"><span class="dot"></span><span id="barCount">0</span> in der Bar</div>
<label class="bot-toggle-bar" id="botToggleWrap">
  <input type="checkbox" id="botToggle" checked onchange="toggleBarBots(this.checked)">

  Bots
</label>

<!-- SITZPLÄTZE -->
<div class="seats" id="seats"></div>

<!-- EIGENES VIDEO -->
<div class="my-video" id="myVideo">
  <video id="localVideo" autoplay playsinline muted></video>
</div>

<!-- GETRÄNKE AUF DEM TISCH -->
<div class="bar-drinks">
  <div class="bar-drink" id="drink-whiskey" data-drink="whiskey">
    <img src="/img/whiskey.png" alt="Whiskey" draggable="false" style="width:39px;height:70px">
  </div>
  <div class="bar-drink" id="drink-vodka" data-drink="vodka">
    <img src="/img/vodka.jpg" alt="Vodka" draggable="false">
  </div>
  <div class="bar-drink" id="drink-champagner" data-drink="champagner">
    <img src="/img/champagne.png" alt="Champagner" draggable="false">
  </div>
</div>

<!-- GETRÄNK KAUF-DIALOG -->
<div class="champagne-modal" id="drinkModal" onclick="if(event.target===this)closeDrinkModal()">
  <div class="champagne-card">
    <img id="drinkModalImg" src="" alt="">
    <h3 id="drinkModalTitle"></h3>
    <p>Spendiere eine Runde f&uuml;r alle am Tisch!</p>
    <div class="champagne-price" id="drinkModalPrice"></div>
    <button class="champagne-buy" onclick="buyDrink()">🥂 Bestellen</button>
    <button class="champagne-cancel" onclick="closeDrinkModal()">Abbrechen</button>
  </div>

<!-- CHAT -->
<div class="bar-chat">
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-wrap">
    <button class="chat-tts-btn" id="chatTtsBtn" onclick="toggleChatTTS()" title="Vorlesen an/aus">🔇</button>
    <input class="chat-input" id="chatInput" placeholder="Nachricht..." maxlength="200"
      onkeydown="if(event.key==='Enter')sendChat()">

<!-- CONTROLS -->
<div class="bar-controls">
  <button class="bar-btn" id="btnMic" onclick="toggleMic()" title="Mikrofon">🎤</button>
  <button class="bar-btn" id="btnCam" onclick="toggleCam()" title="Kamera">📷</button>
  <button class="bar-btn" id="btnSeat" onclick="takeSeat()" title="Hinsetzen">🪑</button>
  <button class="bar-btn" id="btnJukebox" onclick="toggleBarJukebox()" title="Jukebox">🎵</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// Raum-Kontext für Jukebox setzen BEVOR jukebox.js lädt
// Raum 1 = globale Jukebox (läuft auf Hauptseite), Raum 2+ = eigene Jukebox pro Raum
window._jkRoom = new URLSearchParams(location.search).get('room') || '1';
</script>
<script src="/js/jukebox.js"></script>
<script src="/js/friends.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// BAR – Video-Telefonie Raum
// ═══════════════════════════════════════════════════════════════

const MAX_SEATS = 8;
const barRoom = new URLSearchParams(location.search).get('room') || '1';
// Positionen um den runden Tisch
const DEFAULT_SEAT_POSITIONS = [
  {top:'36%',left:'40%'},   // hinten mitte (am Tresen)
  {top:'40%',left:'54%'},   // rechts hinten
  {top:'50%',left:'58%'},   // rechts mitte
  {top:'60%',left:'52%'},   // rechts vorne
  {top:'64%',left:'40%'},   // vorne mitte (Eingang)
  {top:'60%',left:'28%'},   // links vorne
  {top:'50%',left:'22%'},   // links mitte
  {top:'40%',left:'28%'},   // links hinten
];
// Gespeicherte Positionen laden oder Default
let SEAT_POSITIONS = (() => {
  try {
    const saved = JSON.parse(localStorage.getItem('bar_seat_positions'));
    if (saved && saved.length === 8) return saved;
  } catch(e) {}
  return DEFAULT_SEAT_POSITIONS.map(p => ({...p}));
})();

let socket = null;
let mySeatIdx = -1;
let myStream = null;
let micOn = false;
let camOn = false;
let seats = Array(MAX_SEATS).fill(null);
let peerConnections = {};
const guest = (() => { try { return JSON.parse(localStorage.getItem('casinoGuest')); } catch(e) { return null; } })();
const username = (() => { try { const u = JSON.parse(localStorage.getItem('casinoUser')); return u?.username; } catch(e) { return null; } })() || (guest ? guest.username : null) || localStorage.getItem('pokerPlayerName') || 'Gast';
const token = localStorage.getItem('casinoToken') || localStorage.getItem('token');
let myAvatarUrl = null;

// Server-Avatar laden
(async function loadMyAvatar() {
  const t = localStorage.getItem('casinoToken') || localStorage.getItem('token');
  if (!t) return;
  try {
    const res = await fetch('/api/user/avatar', { headers: { 'Authorization': 'Bearer ' + t } });
    if (res.ok) {
      const data = await res.json();
      if (data.avatarUrl) { myAvatarUrl = data.avatarUrl; renderSeats(); }
    }
  } catch(e) {}
})();

// ─── SEATS RENDERN ───
function renderSeats() {
  const container = document.getElementById('seats');
  container.innerHTML = '';
  SEAT_POSITIONS.forEach((pos, i) => {
    const seat = seats[i];
    const div = document.createElement('div');
    div.className = 'seat';
    div.dataset.seat = i;
    div.style.top = pos.top;
    div.style.left = pos.left;
    div.style.transform = 'translate(-50%,-50%)';

    if (seat) {
      const botDelay = seat.isBot ? `animation-delay:${(i * 0.7) % 3}s` : '';
      div.innerHTML = `
        <div class="seat-video" id="video-${i}"><video id="rv-${i}" autoplay playsinline></video></div>
        <div class="seat-avatar ${seat.isBot ? 'bot' : (seat.video ? 'video-active' : 'occupied')}" style="${botDelay}">${seat.avatarConfig && seat.avatarConfig.emoji ? '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:'+seat.avatarConfig.color+';border-radius:50%;font-size:28px">'+seat.avatarConfig.emoji+'</div>' : '<img src="'+(seat.avatar || 'https://api.dicebear.com/9.x/toon-head/svg?seed='+encodeURIComponent(seat.username))+'">'}</div>
        <div class="seat-name${seat.isBot ? ' bot' : ''}">${seat.username}</div>
      `;
      div.addEventListener('click', () => { if (!div._dragMoved) openPlayerMenu(div); });
    } else {
      div.innerHTML = `
        <div class="seat-avatar" onclick="takeSeatAt(${i})">+</div>
        <div class="seat-empty">Frei</div>
      `;
    }
    // Drag-Funktionalität für jeden Sitz
    addSeatDrag(div, i);
    container.appendChild(div);
  });
  document.getElementById('barCount').textContent = seats.filter(s => s).length;
}

// ─── SITZPLÄTZE VERSCHIEBEN ───
function addSeatDrag(el, idx) {
  let dragging = false, moved = false, startX, startY, startLeft, startTop;
  const seatsEl = document.getElementById('seats');

  function onStart(e) {
    const ev = e.touches ? e.touches[0] : e;
    startX = ev.clientX; startY = ev.clientY;
    const rect = seatsEl.getBoundingClientRect();
    startLeft = parseFloat(SEAT_POSITIONS[idx].left) / 100 * rect.width;
    startTop = parseFloat(SEAT_POSITIONS[idx].top) / 100 * rect.height;
    dragging = true;
    moved = false;
  }

  function onMove(e) {
    if (!dragging) return;
    const ev = e.touches ? e.touches[0] : e;
    const dx = ev.clientX - startX;
    const dy = ev.clientY - startY;
    if (!moved && Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
    moved = true;
    e.preventDefault();
    el.classList.add('dragging');
    const rect = seatsEl.getBoundingClientRect();
    const newLeft = ((startLeft + dx) / rect.width * 100).toFixed(1) + '%';
    const newTop = ((startTop + dy) / rect.height * 100).toFixed(1) + '%';
    el.style.left = newLeft;
    el.style.top = newTop;
    SEAT_POSITIONS[idx] = { top: newTop, left: newLeft };
  }

  function onEnd() {
    el._dragMoved = moved;
    if (dragging && moved) {
      el.classList.remove('dragging');
      localStorage.setItem('bar_seat_positions', JSON.stringify(SEAT_POSITIONS));
    }
    dragging = false;
    setTimeout(() => { el._dragMoved = false; }, 50);
  }

  el.addEventListener('mousedown', onStart);
  el.addEventListener('touchstart', onStart, { passive: true });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
}

// ─── PLATZ NEHMEN ───
function takeSeat() {
  const free = seats.findIndex(s => !s);

function takeSeatAt(idx) {
  if (seats[idx] || mySeatIdx >= 0) return;
  mySeatIdx = idx;
  seats[idx] = { username, id: socket.id, avatar: myAvatarUrl || null, video: false };
  socket.emit('bar:sit', { idx, username, avatar: myAvatarUrl });
  renderSeats();
  document.getElementById('btnSeat').classList.add('active');
}

function leaveSeat() {
  if (mySeatIdx < 0) return;
  socket.emit('bar:leave', { idx: mySeatIdx });

  mySeatIdx = -1;
  stopMedia();
  renderSeats();

}

// ─── MEDIA ───
async function toggleMic() {
  if (mySeatIdx < 0) { takeSeat(); return; }
  micOn = !micOn;
  await ensureMedia();
  if (myStream) {
    myStream.getAudioTracks().forEach(t => t.enabled = micOn);
  }
  document.getElementById('btnMic').classList.toggle('active', micOn);
}

async function toggleCam() {
  if (mySeatIdx < 0) { takeSeat(); return; }
  camOn = !camOn;
  await ensureMedia();
  if (myStream) {
    myStream.getVideoTracks().forEach(t => t.enabled = camOn);
  }
  document.getElementById('btnCam').classList.toggle('active', camOn);
  const myVid = document.getElementById('myVideo');
  myVid.classList.toggle('active', camOn);
  if (camOn && myStream) {
    document.getElementById('localVideo').srcObject = myStream;
  }
  // Anderen mitteilen
  socket.emit('bar:media', { idx: mySeatIdx, video: camOn, audio: micOn });
  if (seats[mySeatIdx]) seats[mySeatIdx].video = camOn;
  renderSeats();
}

async function ensureMedia() {
  if (myStream) return;
  try {
    myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    myStream.getAudioTracks().forEach(t => t.enabled = micOn);
    myStream.getVideoTracks().forEach(t => t.enabled = camOn);
    document.getElementById('localVideo').srcObject = myStream;
    // WebRTC Verbindungen zu allen anderen aufbauen
    setupPeerConnections();
  } catch(e) {
    // Mikrofon/Kamera nicht verfügbar — normal auf Desktop ohne Permission
  }
}

function stopMedia() {
  if (myStream) {
    myStream.getTracks().forEach(t => t.stop());
    myStream = null;
  }
  micOn = false; camOn = false;
  document.getElementById('btnMic').classList.remove('active');
  document.getElementById('btnCam').classList.remove('active');
  document.getElementById('myVideo').classList.remove('active');
  // Peer Connections schließen
  Object.values(peerConnections).forEach(pc => pc.close());
  peerConnections = {};
}

// ─── WebRTC ───
function setupPeerConnections() {
  seats.forEach((seat, i) => {
    if (!seat || i === mySeatIdx) return;
    createPeerConnection(seat.id, i, true);
  });
}

function createPeerConnection(peerId, seatIdx, isInitiator) {
  if (peerConnections[peerId]) return;
  const pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  });
  peerConnections[peerId] = pc;

  if (myStream) {
    myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
  }

  pc.ontrack = (e) => {
    const vid = document.getElementById('rv-' + seatIdx);
    if (vid) vid.srcObject = e.streams[0];
    const container = document.getElementById('video-' + seatIdx);
    if (container) container.classList.add('active');
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('bar:ice', { to: peerId, candidate: e.candidate });
    }
  };

  if (isInitiator) {
    pc.createOffer().then(offer => {
      pc.setLocalDescription(offer);
      socket.emit('bar:offer', { to: peerId, offer });
    });
  }
}

function speakChat(name, text) {

  speechSynthesis.speak(utter);
}

// ─── SOCKET ───
function initSocket() {
  const guestBaxt = parseInt(localStorage.getItem('guestBaxt') || '0');
  socket = io({ auth: { token, username, guestBaxt: !token ? guestBaxt : undefined } });

  // Gast: Baxt-Updates
  if (!token && guest) {
    socket.on('guest:baxtUpdate', (data) => {
      localStorage.setItem('guestBaxt', String(Math.max(0, data.baxt)));
    });
    socket.on('guest:broke', () => {
      localStorage.setItem('guestBaxt', '0');
      setTimeout(() => { window.location.href = '/'; }, 3000);
    });
  }

  socket.emit('bar:join', { room: barRoom });

  socket.on('bar:state', (data) => {
    seats = data.seats || Array(MAX_SEATS).fill(null);
    // Server-Bots erkennen und in barBots-Array übernehmen (für Sprechblasen)
    barBots = [];
    seats.forEach((s, i) => {
      if (s && s.isBot) {
        if (!s.avatar) s.avatar = barBotAvatar(s.username);
        barBots.push({ name: s.username, seatIdx: i });
      }
    });
    if (barBots.length > 0) startBarBotChat();
    renderSeats();
    document.getElementById('barInfo').textContent = 'Die Bar · ' + seats.filter(s=>s).length + ' Gäste';
  });

  socket.on('bar:sit', (data) => {
    if (window.playDoorSound) window.playDoorSound();
    seats[data.idx] = { username: data.username, id: data.id, video: false, avatar: data.avatar || null };
    renderSeats();
    addChatMsg('🍺', data.username + ' hat sich hingesetzt');
    document.getElementById('barInfo').textContent = 'Die Bar · ' + seats.filter(s=>s).length + ' Gäste';
  });

  socket.on('bar:leave', (data) => {
    if (window.playDoorSound) window.playDoorSound();
    if (seats[data.idx]) {
      addChatMsg('🍺', seats[data.idx].username + ' ist gegangen');
      // Peer Connection schließen
      const peerId = seats[data.idx].id;
      if (peerConnections[peerId]) {
        peerConnections[peerId].close();
        delete peerConnections[peerId];
      }
    }
    seats[data.idx] = null;
    renderSeats();
    document.getElementById('barInfo').textContent = 'Die Bar · ' + seats.filter(s=>s).length + ' Gäste';
  });

  socket.on('bar:media', (data) => {
    if (seats[data.idx]) {
      seats[data.idx].video = data.video;
      renderSeats();
    }
  });

  socket.on('bar:chat', (data) => {
    addChatMsg(data.username, data.msg);
    showBotBubble({ name: data.username, seatIdx: seats.findIndex(s => s && s.username === data.username) }, data.msg);
  });

  // WebRTC Signaling
  socket.on('bar:offer', async (data) => {
    const seatIdx = seats.findIndex(s => s && s.id === data.from);
    createPeerConnection(data.from, seatIdx, false);
    const pc = peerConnections[data.from];
    await pc.setRemoteDescription(data.offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('bar:answer', { to: data.from, answer });
  });

  socket.on('bar:answer', async (data) => {
    const pc = peerConnections[data.from];
    if (pc) await pc.setRemoteDescription(data.answer);
  });

  socket.on('bar:ice', async (data) => {
    const pc = peerConnections[data.from];
    if (pc) await pc.addIceCandidate(data.candidate);
  });

  socket.on('disconnect', () => {
    document.getElementById('barInfo').textContent = 'Verbindung verloren...';
  });

  socket.on('connect', () => {
    socket.emit('bar:join', { room: barRoom });
  });
}

// Sprechblase über Bot-Avatar anzeigen
function showBotBubble(bot, text) {
  if (bot.seatIdx < 0) return;
  const seatEl = document.querySelector(`.seat[data-seat="${bot.seatIdx}"]`);
  if (!seatEl) return;
  // Alte Bubble entfernen
  const old = seatEl.querySelector('.bot-bubble');
  if (old) old.remove();
  // Neue Bubble
  const bubble = document.createElement('div');
  bubble.className = 'bot-bubble';
  bubble.textContent = text;
  seatEl.style.position = seatEl.style.position || 'absolute';
  seatEl.appendChild(bubble);
  // Nach 4s ausblenden
  setTimeout(() => {
    bubble.style.animation = 'bubble-out .3s ease forwards';
    setTimeout(() => bubble.remove(), 300);
  }, 4000);
}
let barBots = [];
let barBotsEnabled = true;
let barBotChatInterval = null;
let barBotSeatInterval = null;

function diceBearUrl(name) {
  return 'https://api.dicebear.com/9.x/toon-head/svg?seed=' + encodeURIComponent(name);
}
function barBotAvatar(name) {
  return diceBearUrl(name);
}

function initBarBots() {
  const count = 3; // immer 3 Bots
  const shuffled = [...BAR_BOT_NAMES].sort(() => Math.random() - .5);
  barBots = shuffled.slice(0, count).map(name => ({ name }));
  placeBarBots();
  startBarBotChat();
}

function placeBarBots() {
  // Bots auf freie Plätze setzen
  barBots.forEach(bot => { bot.seatIdx = -1; });
  if (!barBotsEnabled) { renderSeats(); return; }
  barBots.forEach(bot => {
    const free = seats.findIndex((s, i) => !s && !barBots.some(b => b.seatIdx === i));
    if (free >= 0) {
      bot.seatIdx = free;
      seats[free] = { username: bot.name, id: 'bot-' + bot.name.replace(/\s/g,''), avatar: barBotAvatar(bot.name), video: false, isBot: true };
    }
  });
  renderSeats();
}

function startBarBotChat() {
  if (barBotChatInterval) clearInterval(barBotChatInterval);
  barBotChatInterval = setInterval(() => {
    if (!barBotsEnabled || barBots.length < 1) return;
    const activeBots = barBots.filter(b => b.seatIdx >= 0);
    if (activeBots.length < 1) return;

    // 50% Chance auf Konversation zwischen zwei Bots, sonst Einzelspruch
    if (activeBots.length >= 2 && Math.random() < 0.5) {
      const convo = BAR_BOT_CONVOS[Math.floor(Math.random() * BAR_BOT_CONVOS.length)];
      const shuffled = [...activeBots].sort(() => Math.random() - .5);
      const bot1 = shuffled[0], bot2 = shuffled[1];
      // Bot 1 fragt
      showBotBubble(bot1, convo[0]);
      addChatMsg(bot1.name, convo[0]);
      // Bot 2 antwortet nach 2-3s
      setTimeout(() => {
        showBotBubble(bot2, convo[1]);
        addChatMsg(bot2.name, convo[1]);
      }, 2000 + Math.random() * 1500);
    } else {
      const bot = activeBots[Math.floor(Math.random() * activeBots.length)];
      const msg = BAR_BOT_CHAT[Math.floor(Math.random() * BAR_BOT_CHAT.length)];
      showBotBubble(bot, msg);
      addChatMsg(bot.name, msg);
    }
  }, 6000 + Math.random() * 8000);

  // Bots wechseln gelegentlich den Platz
  if (barBotSeatInterval) clearInterval(barBotSeatInterval);
  barBotSeatInterval = setInterval(() => {
    if (!barBotsEnabled || barBots.length < 1) return;
    if (Math.random() > 0.4) return;
    const movingBot = barBots[Math.floor(Math.random() * barBots.length)];
    if (movingBot.seatIdx < 0) return;
    // Freien Platz finden
    const freeSeats = [];
    for (let i = 0; i < MAX_SEATS; i++) {
      if (!seats[i] && i !== movingBot.seatIdx) freeSeats.push(i);
    }
    if (freeSeats.length === 0) return;
    const newIdx = freeSeats[Math.floor(Math.random() * freeSeats.length)];
    const oldIdx = movingBot.seatIdx;
    // Alten Platz freigeben
    seats[oldIdx] = null;
    // Neuen Platz belegen
    movingBot.seatIdx = newIdx;
    seats[newIdx] = { username: movingBot.name, id: 'bot-' + movingBot.name.replace(/\s/g,''), avatar: barBotAvatar(movingBot.name), video: false, isBot: true };
    addChatMsg('🍺', movingBot.name + ' setzt sich um');
    renderSeats();
  }, 15000 + Math.random() * 20000);
}

function toggleBarBots(on) {
  barBotsEnabled = on;
  if (on) {
    if (barBots.length === 0) initBarBots();
    else placeBarBots();
  } else {
    barBots.forEach(bot => {
      if (bot.seatIdx >= 0) { seats[bot.seatIdx] = null; bot.seatIdx = -1; }
    });
    renderSeats();
  }
}

    <div>
      <div class="pm-name" id="pmName">Spieler</div>
      <div class="pm-status">Online</div>
    </div>
  </div>
  <div class="pm-actions">
    <button class="pm-action" onclick="pmAction('profile')"><div class="pm-action-icon profile">👤</div><div><div class="pm-action-label">Profil ansehen</div><div class="pm-action-sub">Statistiken & Rang</div></div></button>
    <button class="pm-action" onclick="pmAction('message')"><div class="pm-action-icon msg">💬</div><div><div class="pm-action-label">Nachricht</div><div class="pm-action-sub">Textnachricht senden</div></div></button>
    <button class="pm-action" onclick="pmAction('call')"><div class="pm-action-icon call">📞</div><div><div class="pm-action-label">Anrufen</div><div class="pm-action-sub">Sprachanruf starten</div></div></button>
    <button class="pm-action" onclick="pmAction('video')"><div class="pm-action-icon video">📹</div><div><div class="pm-action-label">Videoanruf</div><div class="pm-action-sub">Face-to-Face</div></div></button>
    <button class="pm-action" onclick="pmAction('voicemsg')"><div class="pm-action-icon voice">🎙</div><div><div class="pm-action-label">Sprachnachricht</div><div class="pm-action-sub">Audio aufnehmen & senden</div></div></button>
    <button class="pm-action" onclick="pmAction('money')"><div class="pm-action-icon money">💰</div><div><div class="pm-action-label">Geld senden</div><div class="pm-action-sub">Baxt Coins überweisen</div></div></button>
  </div>
</div>
<script>
let pmTarget = null;
function openPlayerMenu(seatEl) {
  const nameEl = seatEl.querySelector('.seat-name');
  if (!nameEl) return;
  pmTarget = nameEl.textContent.trim();
  const menu = document.getElementById('playerMenu');
  const overlay = document.getElementById('pmOverlay');
  document.getElementById('pmName').textContent = pmTarget;
  const avImg = seatEl.querySelector('.seat-avatar img');
  const avatarEl = document.getElementById('pmAvatar');
  if (avImg) avatarEl.innerHTML = `<img src="${avImg.src}" alt="${pmTarget}">`;
  else avatarEl.innerHTML = pmTarget.charAt(0).toUpperCase();
  const rect = seatEl.getBoundingClientRect();
  let top = rect.bottom + 8, left = rect.left;
  if (top + 320 > window.innerHeight) top = rect.top - 320;
  if (top < 8) top = 8;
  if (left + 210 > window.innerWidth) left = window.innerWidth - 218;
  if (left < 8) left = 8;
  menu.style.top = top + 'px';
  menu.style.left = left + 'px';
  overlay.classList.add('open');
  menu.classList.add('open');
}
function closePlayerMenu() {
  document.getElementById('pmOverlay').classList.remove('open');
  document.getElementById('playerMenu').classList.remove('open');
  pmTarget = null;
}
function pmAction(type) {
  const name = pmTarget;
  closePlayerMenu();
  switch(type) {
    case 'profile': openProfileModal(name); break;
    case 'message': openMessageModal(name); break;
    case 'call': startCallUI(name, false); break;
    case 'video': startCallUI(name, true); break;
    case 'voicemsg': openVoiceRecorder(name); break;
    case 'money': openSendMoney(name); break;
  }
}
function createActionModal(title, content) {
  const old = document.getElementById('actionModal');
  if (old) old.remove();
  const overlay = document.createElement('div');
  overlay.id = 'actionModal';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center';
  const modal = document.createElement('div');
  modal.style.cssText = 'background:linear-gradient(165deg,rgba(30,18,8,.97),rgba(15,8,3,.98));border:1.5px solid rgba(212,175,55,.3);border-radius:16px;padding:20px;min-width:280px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.7);color:#F0E6D3;font-family:Playfair Display,serif';
  modal.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:16px;font-weight:700;color:#F4D03F">${title}</div><button onclick="closeActionModal()" style="background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px">✕</button></div>${content}`;
  overlay.appendChild(modal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeActionModal(); });
  document.body.appendChild(overlay);
}
function closeActionModal() { const m = document.getElementById('actionModal'); if (m) m.remove(); }
function openProfileModal(name) {
  const hash = [...name].reduce((h,c) => ((h<<5)-h)+c.charCodeAt(0), 0);
  const level = Math.abs(hash % 20) + 1;
  const wins = Math.abs((hash*7) % 150);
  const games = wins + Math.abs((hash*3) % 200);
  const winRate = games > 0 ? Math.round(wins/games*100) : 0;
  const rank = level > 15 ? 'Diamant' : level > 10 ? 'Gold' : level > 5 ? 'Silber' : 'Bronze';
  const rankColor = level > 15 ? '#b9f2ff' : level > 10 ? '#F4D03F' : level > 5 ? '#c0c0c0' : '#cd7f32';
  createActionModal('👤 Spielerprofil', `<div style="text-align:center;margin-bottom:14px"><div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#2c1810,#1a0f08);border:3px solid ${rankColor};margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 16px ${rankColor}44">${name.charAt(0).toUpperCase()}</div><div style="font-size:18px;font-weight:900;color:#F4D03F">${name}</div><div style="font-size:12px;color:${rankColor};margin-top:2px">⭐ ${rank} · Level ${level}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:rgba(255,255,255,.05);border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:900;color:#F4D03F">${games}</div><div style="font-size:10px;color:rgba(240,230,211,.4)">Spiele</div></div><div style="background:rgba(255,255,255,.05);border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:900;color:#2ecc71">${winRate}%</div><div style="font-size:10px;color:rgba(240,230,211,.4)">Gewinnrate</div></div></div>`);
}
function openMessageModal(name) { createActionModal('💬 Nachricht an ' + name, `<textarea placeholder="Nachricht eingeben..." style="width:100%;height:80px;background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.2);border-radius:8px;padding:10px;color:#F0E6D3;font-family:inherit;font-size:13px;resize:none"></textarea><button onclick="closeActionModal()" style="margin-top:10px;width:100%;padding:10px;background:linear-gradient(135deg,#D4AF37,#8B6914);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit">Senden</button>`); }
function startCallUI(name, video) { createActionModal(video ? '📹 Videoanruf' : '📞 Sprachanruf', `<div style="text-align:center;padding:20px"><div style="font-size:36px;margin-bottom:10px">${name.charAt(0).toUpperCase()}</div><div style="font-size:16px;font-weight:700;color:#F4D03F;margin-bottom:4px">${name}</div><div style="color:rgba(240,230,211,.4);font-size:12px">Rufe an...</div><button onclick="closeActionModal()" style="margin-top:16px;padding:10px 24px;background:#e74c3c;border:none;border-radius:20px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit">Auflegen</button></div>`); }
function openVoiceRecorder(name) { createActionModal('🎙 Sprachnachricht an ' + name, `<div style="text-align:center;padding:16px"><div style="font-size:48px;margin-bottom:10px">🎙</div><div style="color:rgba(240,230,211,.4);font-size:12px;margin-bottom:14px">Tippe zum Aufnehmen</div><button onclick="closeActionModal()" style="padding:10px 24px;background:linear-gradient(135deg,#D4AF37,#8B6914);border:none;border-radius:20px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit">Senden</button></div>`); }
function openSendMoney(name) { createActionModal('💰 Geld senden an ' + name, `<div style="text-align:center"><input type="number" placeholder="Betrag in ₿" style="width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.2);border-radius:8px;color:#F0E6D3;font-family:inherit;font-size:16px;text-align:center;margin-bottom:10px"><button onclick="closeActionModal()" style="width:100%;padding:10px;background:linear-gradient(135deg,#D4AF37,#8B6914);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit">Überweisen</button></div>`); }
</script>
<script src="/js/door-sound.js"></script>

</body>
</html>
