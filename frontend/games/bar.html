<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a05">
<title>Bar – Reisendes Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;background:#0a0a05;overscroll-behavior:none}
body{font-family:'Playfair Display',serif;color:#F0E6D3;user-select:none;touch-action:manipulation}

/* ============ BAR BACKGROUND ============ */
.bar-bg{
  position:fixed;inset:0;z-index:0;
  background:
    url('/games/img/bar-bg.jpg') center center / 120% auto no-repeat,
    url('/games/img/bg.jpg') center center / cover no-repeat;
  background-color:#0a0a05;
}
.bar-bg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(0,0,0,.2) 0%,rgba(0,0,0,.6) 100%);
}

/* ============ TOP BAR ============ */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,.8),transparent);
}
.top-bar .logo{font-size:14px;color:#D4AF37;font-weight:700}
.top-bar .info{font-size:11px;color:rgba(240,230,211,.6)}
.top-bar .back{
  background:rgba(0,0,0,.4);border:1px solid rgba(212,175,55,.3);
  color:#D4AF37;padding:6px 12px;border-radius:8px;cursor:pointer;
  font-family:inherit;font-size:12px;
}

/* ============ SITZPLÄTZE (runder Tisch) ============ */
.seats{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(90vw,500px);height:min(90vw,500px);
  z-index:10;
}
.seat{
  position:absolute;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transition:transform .2s;
}
.seat:hover{transform:scale(1.05)}
.seat-avatar{
  width:64px;height:64px;border-radius:50%;
  border:3px solid rgba(212,175,55,.4);
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.seat-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.seat-avatar.occupied{border-color:#D4AF37;box-shadow:0 0 12px rgba(212,175,55,.3)}
.seat-avatar.video-active{border-color:#4CAF50;box-shadow:0 0 12px rgba(76,175,80,.4)}
.seat-name{
  font-size:10px;color:#D4AF37;margin-top:4px;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
  max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.seat-empty{
  font-size:9px;color:rgba(240,230,211,.4);margin-top:4px;
}
.seat-video{
  position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:120px;height:90px;border-radius:10px;overflow:hidden;
  border:2px solid rgba(212,175,55,.4);
  box-shadow:0 4px 16px rgba(0,0,0,.7);
  display:none;
}
.seat-video.active{display:block}
.seat-video video{width:100%;height:100%;object-fit:cover}

/* ============ CONTROLS ============ */
.bar-controls{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:12px;z-index:100;
}
.bar-btn{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;cursor:pointer;transition:all .2s;
  border:2px solid rgba(212,175,55,.3);
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.bar-btn:hover{transform:scale(1.1);border-color:rgba(212,175,55,.6)}
.bar-btn.active{border-color:#4CAF50;background:rgba(76,175,80,.2)}
.bar-btn.end{border-color:#ff4444;background:rgba(255,68,68,.2)}

/* ============ EIGENES VIDEO ============ */
.my-video{
  position:fixed;bottom:90px;right:16px;
  width:140px;height:105px;border-radius:12px;overflow:hidden;
  border:2px solid rgba(212,175,55,.4);
  box-shadow:0 4px 16px rgba(0,0,0,.7);
  z-index:50;display:none;
}
.my-video.active{display:block}
.my-video video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}

/* ============ CHAT ============ */
.bar-chat{
  position:fixed;bottom:90px;left:16px;
  width:260px;max-height:200px;z-index:50;
  display:flex;flex-direction:column;
}
.chat-messages{
  flex:1;overflow-y:auto;padding:8px;
  background:rgba(0,0,0,.5);border-radius:10px 10px 0 0;
  backdrop-filter:blur(6px);max-height:150px;
  scrollbar-width:thin;scrollbar-color:rgba(212,175,55,.3) transparent;
}
.chat-msg{font-size:11px;margin-bottom:4px}
.chat-msg .name{color:#D4AF37;font-weight:700}
.chat-msg .text{color:#F0E6D3}
.chat-input-wrap{display:flex;gap:0}
.chat-input{
  flex:1;padding:8px 10px;border:none;
  background:rgba(0,0,0,.6);color:#F0E6D3;
  font-size:11px;font-family:inherit;
  border-radius:0 0 0 10px;outline:none;
  border-top:1px solid rgba(212,175,55,.15);
}
.chat-input::placeholder{color:rgba(212,175,55,.3)}
.chat-send{
  background:rgba(212,175,55,.15);border:none;
  color:#D4AF37;padding:8px 12px;cursor:pointer;
  border-radius:0 0 10px 0;font-size:14px;
  border-top:1px solid rgba(212,175,55,.15);
}

/* ============ ONLINE COUNT ============ */
.bar-online{
  position:fixed;top:40px;right:16px;z-index:50;
  font-size:11px;color:rgba(240,230,211,.5);
  background:rgba(0,0,0,.4);padding:4px 10px;border-radius:20px;
  backdrop-filter:blur(6px);
}
.bar-online .dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:#4CAF50;margin-right:4px;vertical-align:middle;
}

@media(max-width:500px){
  .seat-avatar{width:50px;height:50px;font-size:22px}
  .seat-video{width:100px;height:75px;top:-70px}
  .bar-btn{width:48px;height:48px;font-size:20px}
  .bar-chat{width:200px}
  .my-video{width:110px;height:82px}
}
</style>
</head>
<body>

<div class="bar-bg"></div>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="logo">🍺 Die Bar</div>
  <div class="info" id="barInfo">Verbinde...</div>
  <button class="back" id="barLobbyBtn" onclick="location.href='/'">← Lobby</button>
</div>
<script>if(location.search.includes('embed=1'))document.getElementById('barLobbyBtn').style.display='none';</script>

<div class="bar-online" id="barOnline"><span class="dot"></span><span id="barCount">0</span> in der Bar</div>

<!-- SITZPLÄTZE -->
<div class="seats" id="seats"></div>

<!-- EIGENES VIDEO -->
<div class="my-video" id="myVideo">
  <video id="localVideo" autoplay playsinline muted></video>
</div>

<!-- CHAT -->
<div class="bar-chat">
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-wrap">
    <input class="chat-input" id="chatInput" placeholder="Nachricht..." maxlength="200"
      onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send" onclick="sendChat()">➤</button>
  </div>
</div>

<!-- CONTROLS -->
<div class="bar-controls">
  <button class="bar-btn" id="btnMic" onclick="toggleMic()" title="Mikrofon">🎤</button>
  <button class="bar-btn" id="btnCam" onclick="toggleCam()" title="Kamera">📷</button>
  <button class="bar-btn" id="btnSeat" onclick="takeSeat()" title="Hinsetzen">🪑</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/jukebox.js"></script>
<script src="/js/friends.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// BAR – Video-Telefonie Raum
// ═══════════════════════════════════════════════════════════════

const MAX_SEATS = 8;
// Positionen um den runden Tisch
const SEAT_POSITIONS = [
  {top:'42%',left:'50%'},   // oben am Tisch
  {top:'50%',left:'72%'},   // rechts oben
  {top:'65%',left:'78%'},   // rechts
  {top:'78%',left:'72%'},   // rechts unten
  {top:'85%',left:'50%'},   // unten am Tisch
  {top:'78%',left:'28%'},   // links unten
  {top:'65%',left:'22%'},   // links
  {top:'50%',left:'28%'},   // links oben
];

let socket = null;
let mySeatIdx = -1;
let myStream = null;
let micOn = false;
let camOn = false;
let seats = Array(MAX_SEATS).fill(null);
let peerConnections = {};
const username = localStorage.getItem('pokerPlayerName') || 'Gast';
const token = localStorage.getItem('token') || localStorage.getItem('casinoToken');

// ─── SEATS RENDERN ───
function renderSeats() {
  const container = document.getElementById('seats');
  container.innerHTML = '';
  SEAT_POSITIONS.forEach((pos, i) => {
    const seat = seats[i];
    const div = document.createElement('div');
    div.className = 'seat';
    div.style.top = pos.top;
    div.style.left = pos.left;
    div.style.transform = 'translate(-50%,-50%)';

    if (seat) {
      div.innerHTML = `
        <div class="seat-video" id="video-${i}"><video id="rv-${i}" autoplay playsinline></video></div>
        <div class="seat-avatar ${seat.video ? 'video-active' : 'occupied'}">${seat.avatar || seat.username.charAt(0).toUpperCase()}</div>
        <div class="seat-name">${seat.username}</div>
      `;
    } else {
      div.innerHTML = `
        <div class="seat-avatar" onclick="takeSeatAt(${i})">+</div>
        <div class="seat-empty">Frei</div>
      `;
    }
    container.appendChild(div);
  });
  document.getElementById('barCount').textContent = seats.filter(s => s).length;
}

// ─── PLATZ NEHMEN ───
function takeSeat() {
  const free = seats.findIndex(s => !s);
  if (free >= 0) takeSeatAt(free);
}

function takeSeatAt(idx) {
  if (seats[idx] || mySeatIdx >= 0) return;
  mySeatIdx = idx;
  seats[idx] = { username, id: socket.id, avatar: null, video: false };
  socket.emit('bar:sit', { idx, username });
  renderSeats();
  document.getElementById('btnSeat').classList.add('active');
}

function leaveSeat() {
  if (mySeatIdx < 0) return;
  socket.emit('bar:leave', { idx: mySeatIdx });
  seats[mySeatIdx] = null;
  mySeatIdx = -1;
  stopMedia();
  renderSeats();
  document.getElementById('btnSeat').classList.remove('active');
}

// ─── MEDIA ───
async function toggleMic() {
  if (mySeatIdx < 0) { takeSeat(); return; }
  micOn = !micOn;
  await ensureMedia();
  if (myStream) {
    myStream.getAudioTracks().forEach(t => t.enabled = micOn);
  }
  document.getElementById('btnMic').classList.toggle('active', micOn);
}

async function toggleCam() {
  if (mySeatIdx < 0) { takeSeat(); return; }
  camOn = !camOn;
  await ensureMedia();
  if (myStream) {
    myStream.getVideoTracks().forEach(t => t.enabled = camOn);
  }
  document.getElementById('btnCam').classList.toggle('active', camOn);
  const myVid = document.getElementById('myVideo');
  myVid.classList.toggle('active', camOn);
  if (camOn && myStream) {
    document.getElementById('localVideo').srcObject = myStream;
  }
  // Anderen mitteilen
  socket.emit('bar:media', { idx: mySeatIdx, video: camOn, audio: micOn });
  if (seats[mySeatIdx]) seats[mySeatIdx].video = camOn;
  renderSeats();
}

async function ensureMedia() {
  if (myStream) return;
  try {
    myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    myStream.getAudioTracks().forEach(t => t.enabled = micOn);
    myStream.getVideoTracks().forEach(t => t.enabled = camOn);
    document.getElementById('localVideo').srcObject = myStream;
    // WebRTC Verbindungen zu allen anderen aufbauen
    setupPeerConnections();
  } catch(e) {
    console.error('Media error:', e);
  }
}

function stopMedia() {
  if (myStream) {
    myStream.getTracks().forEach(t => t.stop());
    myStream = null;
  }
  micOn = false; camOn = false;
  document.getElementById('btnMic').classList.remove('active');
  document.getElementById('btnCam').classList.remove('active');
  document.getElementById('myVideo').classList.remove('active');
  // Peer Connections schließen
  Object.values(peerConnections).forEach(pc => pc.close());
  peerConnections = {};
}

// ─── WebRTC ───
function setupPeerConnections() {
  seats.forEach((seat, i) => {
    if (!seat || i === mySeatIdx) return;
    createPeerConnection(seat.id, i, true);
  });
}

function createPeerConnection(peerId, seatIdx, isInitiator) {
  if (peerConnections[peerId]) return;
  const pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  });
  peerConnections[peerId] = pc;

  if (myStream) {
    myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
  }

  pc.ontrack = (e) => {
    const vid = document.getElementById('rv-' + seatIdx);
    if (vid) vid.srcObject = e.streams[0];
    const container = document.getElementById('video-' + seatIdx);
    if (container) container.classList.add('active');
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('bar:ice', { to: peerId, candidate: e.candidate });
    }
  };

  if (isInitiator) {
    pc.createOffer().then(offer => {
      pc.setLocalDescription(offer);
      socket.emit('bar:offer', { to: peerId, offer });
    });
  }
}

// ─── CHAT ───
function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  socket.emit('bar:chat', { msg, username });
  input.value = '';
}

function addChatMsg(name, text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `<span class="name">${name}:</span> <span class="text">${text}</span>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  // Max 50 Nachrichten
  while (container.children.length > 50) container.removeChild(container.firstChild);
}

// ─── SOCKET ───
function initSocket() {
  socket = io({ auth: { token, username } });

  socket.emit('bar:join');

  socket.on('bar:state', (data) => {
    seats = data.seats || Array(MAX_SEATS).fill(null);
    renderSeats();
    document.getElementById('barInfo').textContent = 'Die Bar · ' + seats.filter(s=>s).length + ' Gäste';
  });

  socket.on('bar:sit', (data) => {
    seats[data.idx] = { username: data.username, id: data.id, video: false };
    renderSeats();
    addChatMsg('🍺', data.username + ' hat sich hingesetzt');
    document.getElementById('barInfo').textContent = 'Die Bar · ' + seats.filter(s=>s).length + ' Gäste';
  });

  socket.on('bar:leave', (data) => {
    if (seats[data.idx]) {
      addChatMsg('🍺', seats[data.idx].username + ' ist gegangen');
      // Peer Connection schließen
      const peerId = seats[data.idx].id;
      if (peerConnections[peerId]) {
        peerConnections[peerId].close();
        delete peerConnections[peerId];
      }
    }
    seats[data.idx] = null;
    renderSeats();
    document.getElementById('barInfo').textContent = 'Die Bar · ' + seats.filter(s=>s).length + ' Gäste';
  });

  socket.on('bar:media', (data) => {
    if (seats[data.idx]) {
      seats[data.idx].video = data.video;
      renderSeats();
    }
  });

  socket.on('bar:chat', (data) => {
    addChatMsg(data.username, data.msg);
  });

  // WebRTC Signaling
  socket.on('bar:offer', async (data) => {
    const seatIdx = seats.findIndex(s => s && s.id === data.from);
    createPeerConnection(data.from, seatIdx, false);
    const pc = peerConnections[data.from];
    await pc.setRemoteDescription(data.offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('bar:answer', { to: data.from, answer });
  });

  socket.on('bar:answer', async (data) => {
    const pc = peerConnections[data.from];
    if (pc) await pc.setRemoteDescription(data.answer);
  });

  socket.on('bar:ice', async (data) => {
    const pc = peerConnections[data.from];
    if (pc) await pc.addIceCandidate(data.candidate);
  });

  socket.on('disconnect', () => {
    document.getElementById('barInfo').textContent = 'Verbindung verloren...';
  });

  socket.on('connect', () => {
    socket.emit('bar:join');
  });
}

// ─── INIT ───
const isEmbed = location.search.includes('embed=1') || window !== window.top;
renderSeats();
if (!isEmbed) {
  initSocket();
} else {
  document.getElementById('barInfo').textContent = 'Die Bar';
  document.querySelector('.bar-controls').style.display = 'none';
  document.querySelector('.bar-chat').style.display = 'none';
}
</script>
</body>
</html>
