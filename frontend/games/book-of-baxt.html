<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Buch des Baxt - Reisendes Casino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000}
body{font-family:'Cinzel',serif;color:#fff;display:flex;align-items:center;justify-content:center;user-select:none}

/* ========== EPIC BACKGROUND - Egyptian sunset with pyramids ========== */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-sky{
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    #0a0520 0%,#1a0a35 15%,#3d1155 28%,#7a2040 42%,
    #c4522a 55%,#e8913a 65%,#f4c84a 75%,#eedd77 85%,
    #c4a03a 92%,#8a6020 100%
  );
}
/* Stars */
.bg-stars{position:absolute;inset:0;z-index:1}
.bg-stars::before,.bg-stars::after{
  content:'';position:absolute;border-radius:50%;background:#fff;
}
/* Pyramids silhouette */
.bg-pyramids{
  position:absolute;bottom:5%;left:0;right:0;height:35%;z-index:2;
}
.pyramid{position:absolute;bottom:0}
.pyramid.p1{left:5%;width:0;height:0;border-left:120px solid transparent;border-right:120px solid transparent;border-bottom:150px solid #1a1020;filter:brightness(.7)}
.pyramid.p2{left:18%;width:0;height:0;border-left:200px solid transparent;border-right:200px solid transparent;border-bottom:250px solid #15081a;filter:brightness(.5)}
.pyramid.p3{right:15%;width:0;height:0;border-left:150px solid transparent;border-right:150px solid transparent;border-bottom:180px solid #18091e;filter:brightness(.6)}
/* Sand dunes */
.bg-sand{
  position:absolute;bottom:0;left:0;right:0;height:12%;z-index:3;
  background:linear-gradient(180deg,#5a3a15,#3d2810,#2a1a08);
  border-radius:100% 100% 0 0 / 60% 60% 0 0;
}
/* Animated floating particles */
.bg-particles{position:absolute;inset:0;z-index:4;opacity:.6}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}

/* ========== GAME WRAPPER ========== */
.game-wrap{
  position:relative;z-index:10;
  width:min(98vw,900px);
  aspect-ratio:16/10;
  max-height:96vh;
  display:flex;flex-direction:column;
  border-radius:12px;overflow:hidden;
  box-shadow:0 0 60px rgba(0,0,0,.8),0 0 120px rgba(139,69,0,.2);
}

/* ========== TOP BAR - Title ========== */
.top-bar{
  height:56px;
  background:linear-gradient(180deg,#2a1a05 0%,#1a0e02 40%,#0f0800 100%);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  border-bottom:3px solid;
  border-image:linear-gradient(90deg,#8B6914,#D4AF37,#F4D03F,#D4AF37,#8B6914) 1;
  position:relative;
}
.top-bar::after{
  content:'';position:absolute;bottom:-5px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(244,208,63,.3),transparent);
}
.back-btn{
  background:none;border:1px solid rgba(212,175,55,.3);color:#D4AF37;
  padding:6px 14px;border-radius:6px;cursor:pointer;font-family:inherit;
  font-size:11px;transition:.2s;letter-spacing:1px;
}
.back-btn:hover{background:rgba(212,175,55,.15);border-color:#D4AF37}
.title-area{text-align:center;flex:1}
.title-area h1{
  font-family:'Uncial Antiqua',serif;
  font-size:clamp(16px,3vw,28px);letter-spacing:3px;
  background:linear-gradient(180deg,#fff5cc 0%,#F4D03F 30%,#D4AF37 60%,#B8860B 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 2px 4px rgba(212,175,55,.5));
  text-transform:uppercase;
}
.title-area .sub{font-size:9px;color:rgba(212,175,55,.5);letter-spacing:5px}
.bal-display{
  background:rgba(0,0,0,.4);border:1px solid rgba(212,175,55,.25);
  border-radius:6px;padding:4px 12px;text-align:center;
}
.bal-display .bl{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:1px}
.bal-display .bv{font-size:16px;color:#F4D03F;font-weight:700}

/* ========== MAIN GAME AREA ========== */
.game-main{
  flex:1;display:flex;position:relative;
  background:linear-gradient(180deg,#0a0510,#050208);
}

/* ========== GOLDEN FRAME - 3D beveled ========== */
.gold-frame-l,.gold-frame-r{
  width:40px;z-index:5;position:relative;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:space-around;
  padding:4px 0;
}
.gold-frame-l{
  background:linear-gradient(90deg,#4a3010,#8B6914,#B8960B,#D4AF37,#B8960B,#8B6914 85%,#5a3a10);
  border-right:2px solid #3a2505;
  box-shadow:inset -3px 0 8px rgba(0,0,0,.4);
}
.gold-frame-r{
  background:linear-gradient(270deg,#4a3010,#8B6914,#B8960B,#D4AF37,#B8960B,#8B6914 85%,#5a3a10);
  border-left:2px solid #3a2505;
  box-shadow:inset 3px 0 8px rgba(0,0,0,.4);
}
/* Hieroglyph pattern on frame */
.gold-frame-l::before,.gold-frame-r::before{
  content:'𓂀 𓃭 𓁹 𓋴 𓊝 𓂋 𓃀 𓇳 𓁿 𓃠';
  position:absolute;top:5px;bottom:5px;width:100%;
  font-size:10px;line-height:20px;text-align:center;color:rgba(60,30,5,.35);
  writing-mode:vertical-lr;overflow:hidden;pointer-events:none;z-index:0;
}
/* Payline number buttons */
.pln{
  width:28px;height:22px;border-radius:4px;z-index:1;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;cursor:pointer;
  color:#000;text-shadow:0 1px 0 rgba(255,255,255,.3);
  border:1px solid rgba(0,0,0,.4);
  box-shadow:0 2px 4px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.2);
  transition:.15s;position:relative;
}
.pln:hover{transform:scale(1.15);filter:brightness(1.3)}

/* ========== REELS AREA ========== */
.reels-area{
  flex:1;display:flex;flex-direction:column;position:relative;
}
/* Top/bottom frame bars */
.frame-bar{
  height:6px;flex-shrink:0;
  background:linear-gradient(180deg,#D4AF37,#8B6914);
  box-shadow:0 2px 6px rgba(0,0,0,.5);position:relative;z-index:3;
}
.frame-bar.bottom{background:linear-gradient(180deg,#8B6914,#D4AF37)}

/* Reels viewport */
.reels-vp{
  flex:1;display:flex;gap:2px;position:relative;overflow:hidden;
  background:#080412;
}

.reel-col{
  flex:1;position:relative;overflow:hidden;
  background:linear-gradient(180deg,rgba(20,10,35,.8),rgba(10,5,20,.9));
  border-left:1px solid rgba(212,175,55,.08);
  border-right:1px solid rgba(212,175,55,.08);
}
/* Reel shine overlay */
.reel-col::before{
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(180deg,
    rgba(0,0,0,.6) 0%,rgba(0,0,0,.15) 8%,
    transparent 15%,transparent 85%,
    rgba(0,0,0,.15) 92%,rgba(0,0,0,.6) 100%
  );
}
.reel-col::after{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(90deg,rgba(255,255,255,.02),rgba(255,255,255,.06) 50%,rgba(255,255,255,.02));
}

/* Reel strip - contains symbols for scrolling animation */
.reel-strip{
  position:absolute;left:0;right:0;
  display:flex;flex-direction:column;
  transition:none;
}
.reel-strip.landing{
  transition:transform .15s cubic-bezier(.17,.67,.35,1.3);
}

/* Individual symbol cell */
.sym-cell{
  width:100%;aspect-ratio:1/0.85;
  display:flex;align-items:center;justify-content:center;
  position:relative;flex-shrink:0;
}
.sym-cell .sym-wrap{
  width:88%;height:88%;position:relative;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;
  background:radial-gradient(ellipse at 50% 40%,rgba(40,20,60,.3),rgba(10,5,20,.5));
  border:1px solid rgba(212,175,55,.06);
  overflow:hidden;
}
/* Symbol image */
.sym-cell .sym-img{
  width:82%;height:82%;
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.6));
}
.sym-cell .sym-img svg{width:100%;height:100%}

/* Win highlighting */
.sym-cell.win-hl .sym-wrap{
  border:2px solid #F4D03F !important;
  box-shadow:0 0 15px rgba(244,208,63,.5),0 0 30px rgba(244,208,63,.25),inset 0 0 15px rgba(244,208,63,.15);
  animation:symGlow .5s ease-in-out infinite alternate;
}
@keyframes symGlow{
  from{box-shadow:0 0 15px rgba(244,208,63,.5),0 0 30px rgba(244,208,63,.25)}
  to{box-shadow:0 0 25px rgba(244,208,63,.7),0 0 50px rgba(244,208,63,.4),0 0 80px rgba(244,208,63,.15)}
}
.sym-cell.win-hl .sym-img{animation:symPulse .4s ease-in-out infinite alternate}
@keyframes symPulse{from{transform:scale(1)}to{transform:scale(1.08)}}

/* ========== WIN LINE SVG OVERLAY ========== */
.winline-svg{
  position:absolute;inset:0;z-index:10;pointer-events:none;
}
.winline-svg svg{width:100%;height:100%}
.wl-path{
  fill:none;stroke-width:3;stroke-linecap:round;
  filter:drop-shadow(0 0 4px currentColor);
  animation:wlFlash .6s ease-in-out infinite alternate;
}
@keyframes wlFlash{from{opacity:1}to{opacity:.5}}

/* ========== INFO BAR ========== */
.info-bar{
  height:32px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#0a0510,#12081e);
  border-top:1px solid rgba(212,175,55,.1);
  font-size:clamp(11px,1.5vw,15px);letter-spacing:1px;color:rgba(255,255,255,.7);
  position:relative;z-index:5;
}
.info-bar.win-msg{color:#F4D03F;font-weight:700;text-shadow:0 0 10px rgba(244,208,63,.5)}
.info-bar.fs-msg{color:#ff5555;font-weight:700}

/* ========== CONTROL PANEL ========== */
.ctrl-panel{
  height:52px;display:flex;align-items:center;justify-content:center;gap:4px;
  padding:0 8px;
  background:linear-gradient(180deg,#1a0e05 0%,#120a02 50%,#0a0500 100%);
  border-top:3px solid;
  border-image:linear-gradient(90deg,#8B6914,#D4AF37,#F4D03F,#D4AF37,#8B6914) 1;
  position:relative;
}
.ctrl-panel::before{
  content:'';position:absolute;top:-5px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(244,208,63,.2),transparent);
}

/* Control group box */
.cg{
  display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(180deg,rgba(0,0,0,.4),rgba(0,0,0,.2));
  border:1px solid rgba(212,175,55,.15);border-radius:6px;
  padding:2px 6px;min-width:65px;
}
.cg .cg-label{font-size:7px;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase}
.cg .cg-val{font-size:clamp(13px,1.8vw,17px);color:#F4D03F;font-weight:700}
.cg-btns{display:flex;gap:2px;margin-top:1px}
.cg-btns button{
  width:22px;height:18px;border-radius:3px;border:1px solid rgba(212,175,55,.2);
  background:linear-gradient(180deg,rgba(212,175,55,.12),rgba(212,175,55,.04));
  color:#D4AF37;font-size:13px;cursor:pointer;font-weight:700;
  display:flex;align-items:center;justify-content:center;transition:.1s;
}
.cg-btns button:hover{background:rgba(212,175,55,.2);border-color:#D4AF37}
.cg-btns button:active{transform:scale(.9)}
.cg.win-cg{border-color:rgba(139,0,0,.3)}
.cg.win-cg .cg-val{color:#ff4444}
.cg.win-cg.has-win .cg-val{color:#F4D03F;text-shadow:0 0 8px rgba(244,208,63,.5)}

/* SPIN button */
.spin-wrap{margin:0 8px}
.spin-btn{
  width:clamp(44px,7vw,58px);height:clamp(44px,7vw,58px);
  border-radius:50%;cursor:pointer;border:none;
  background:radial-gradient(circle at 35% 30%,#33cc33,#1a8a1a,#0d5a0d 70%,#063a06);
  box-shadow:0 0 0 2px #D4AF37,0 0 0 4px rgba(0,0,0,.6),0 4px 12px rgba(0,0,0,.5),0 0 15px rgba(26,140,26,.3);
  transition:.15s;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.spin-btn::before{
  content:'';position:absolute;inset:3px;border-radius:50%;
  background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.15),transparent 60%);
  border:1px solid rgba(255,255,255,.1);
}
.spin-btn:hover:not(:disabled){
  transform:scale(1.08);
  box-shadow:0 0 0 2px #F4D03F,0 0 0 4px rgba(0,0,0,.6),0 4px 15px rgba(0,0,0,.5),0 0 25px rgba(26,140,26,.5);
}
.spin-btn:active:not(:disabled){transform:scale(.93)}
.spin-btn:disabled{opacity:.35;cursor:not-allowed}
.spin-btn .play-tri{
  width:0;height:0;position:relative;z-index:1;margin-left:3px;
  border-top:clamp(10px,1.5vw,14px) solid transparent;
  border-bottom:clamp(10px,1.5vw,14px) solid transparent;
  border-left:clamp(16px,2.5vw,20px) solid #fff;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));
}
.spin-btn.is-stop .play-tri{
  border:none;width:clamp(16px,2.5vw,20px);height:clamp(16px,2.5vw,20px);
  background:#fff;border-radius:2px;margin-left:0;
}

/* Side buttons */
.side-btn{
  padding:5px 8px;border-radius:5px;
  border:1px solid rgba(212,175,55,.15);
  background:linear-gradient(180deg,rgba(212,175,55,.08),rgba(212,175,55,.02));
  color:#D4AF37;font-size:9px;cursor:pointer;font-family:inherit;
  letter-spacing:.5px;text-transform:uppercase;transition:.15s;
}
.side-btn:hover{background:rgba(212,175,55,.15);border-color:rgba(212,175,55,.4)}
.side-btn.active{background:linear-gradient(180deg,#D4AF37,#8B6914);color:#000;font-weight:700;border-color:#D4AF37}

/* ========== FREE SPINS OVERLAY ========== */
.fs-overlay{
  display:none;position:absolute;inset:0;z-index:50;
  background:rgba(0,0,0,.9);
  flex-direction:column;align-items:center;justify-content:center;
}
.fs-overlay.show{display:flex}
.fs-overlay h2{
  font-family:'Uncial Antiqua',serif;
  font-size:clamp(24px,5vw,44px);letter-spacing:4px;
  background:linear-gradient(180deg,#fff5cc,#F4D03F,#D4AF37);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 3px 8px rgba(212,175,55,.6));
  animation:fsBounce .6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes fsBounce{from{transform:scale(0) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.fs-overlay p{color:#D4AF37;font-size:clamp(14px,2vw,20px);margin-top:8px;letter-spacing:2px}
.fs-overlay .fs-sym{font-size:48px;margin-top:12px;animation:fsSpin 1s ease}
@keyframes fsSpin{from{transform:rotateY(0)}to{transform:rotateY(720deg)}}

/* ========== BIG WIN OVERLAY ========== */
.bigwin-overlay{
  display:none;position:absolute;inset:0;z-index:60;
  background:rgba(0,0,0,.85);
  flex-direction:column;align-items:center;justify-content:center;
}
.bigwin-overlay.show{display:flex}
.bigwin-overlay h2{
  font-size:clamp(36px,7vw,64px);font-weight:900;letter-spacing:6px;
  background:linear-gradient(180deg,#fff,#F4D03F,#D4AF37,#8B6914);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 4px 12px rgba(212,175,55,.8));
  animation:bigwinPop 1s cubic-bezier(.34,1.56,.64,1);
}
@keyframes bigwinPop{0%{transform:scale(0) rotate(-15deg)}60%{transform:scale(1.15) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
.bigwin-overlay .bw-amount{
  font-size:clamp(28px,5vw,52px);color:#F4D03F;font-weight:900;margin-top:8px;
  text-shadow:0 0 20px rgba(244,208,63,.6);
  animation:bwCount 2s ease-out;
}
@keyframes bwCount{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}

/* ========== PAYTABLE MODAL ========== */
.paytable-modal{
  display:none;position:absolute;inset:0;z-index:70;
  background:rgba(0,0,0,.95);overflow-y:auto;
  padding:20px;
}
.paytable-modal.show{display:block}
.paytable-modal h2{
  text-align:center;font-size:24px;color:#D4AF37;margin-bottom:16px;letter-spacing:3px;
}
.pt-close{
  position:absolute;top:10px;right:16px;font-size:28px;color:#D4AF37;
  cursor:pointer;background:none;border:none;z-index:1;
}
.pt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.pt-item{
  background:rgba(212,175,55,.05);border:1px solid rgba(212,175,55,.15);
  border-radius:8px;padding:10px;text-align:center;
}
.pt-item .pt-sym{width:50px;height:50px;margin:0 auto 6px}
.pt-item .pt-sym svg{width:100%;height:100%}
.pt-item .pt-pays{font-size:11px;color:rgba(255,255,255,.6);line-height:1.6}
.pt-item .pt-pays span{color:#F4D03F;font-weight:700}

/* ========== GAMBLE OVERLAY ========== */
.gamble-overlay{
  display:none;position:absolute;inset:0;z-index:55;
  background:rgba(5,2,10,.97);
  flex-direction:column;align-items:center;justify-content:center;
}
.gamble-overlay.show{display:flex}
.gamble-card{
  width:120px;height:170px;background:#fff;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:72px;margin:16px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  transition:transform .3s;perspective:600px;
}
.gamble-card.flip{animation:cardFlip .5s ease}
@keyframes cardFlip{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
.gamble-btns{display:flex;gap:16px;margin-top:20px}
.gamble-btns button{
  padding:12px 32px;border-radius:8px;border:2px solid;
  font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;
  transition:.2s;letter-spacing:1px;
}
.g-red{background:linear-gradient(180deg,#cc0000,#880000);border-color:#ff3333;color:#fff}
.g-red:hover{background:linear-gradient(180deg,#ee2222,#aa0000)}
.g-black{background:linear-gradient(180deg,#333,#111);border-color:#666;color:#fff}
.g-black:hover{background:linear-gradient(180deg,#555,#222)}
.g-collect{background:linear-gradient(180deg,#D4AF37,#8B6914);border-color:#F4D03F;color:#000}
.gamble-info{color:rgba(255,255,255,.5);font-size:13px;margin-top:16px;letter-spacing:1px}
.gamble-stake{color:#F4D03F;font-size:20px;font-weight:700;margin-bottom:8px}

/* ========== REEL LANDING BOUNCE ========== */
.reel-col.reel-landing .sym-cell .sym-wrap{
  animation:landBounce .4s ease-out;
}
@keyframes landBounce{
  0%{transform:translateY(-18px) scaleY(1.08);opacity:.85}
  35%{transform:translateY(8px) scaleY(0.95)}
  55%{transform:translateY(-4px) scaleY(1.02)}
  75%{transform:translateY(2px) scaleY(0.99)}
  100%{transform:translateY(0) scaleY(1);opacity:1}
}
/* Reel column during spin - slight blur */
.reel-col.spinning{filter:blur(0.5px)}

/* ========== WIN COUNTER FLASH ========== */
.cg.win-cg.has-win .cg-val{
  animation:winFlash .4s ease-in-out 3;
}
@keyframes winFlash{
  0%,100%{color:#F4D03F;transform:scale(1)}
  50%{color:#fff;transform:scale(1.2)}
}

/* ========== MUTE BUTTON ========== */
.mute-btn{
  position:absolute;top:4px;right:4px;z-index:90;
  background:none;border:1px solid rgba(212,175,55,.3);color:#D4AF37;
  width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;opacity:.6;
}
.mute-btn:hover{opacity:1;border-color:#D4AF37}

/* ========== RESPONSIVE ========== */
@media(max-width:600px){
  .game-wrap{border-radius:0;width:100vw;height:100vh;max-height:none;aspect-ratio:auto}
  .gold-frame-l,.gold-frame-r{width:28px}
  .pln{width:22px;height:18px;font-size:8px}
  .top-bar{height:44px}
  .ctrl-panel{height:48px}
  .cg{min-width:50px;padding:2px 4px}
}
</style>
</head>
<body>

<!-- ========== BACKGROUND ========== -->
<div class="bg">
  <div class="bg-sky"></div>
  <div class="bg-stars" id="bgStars"></div>
  <div class="bg-pyramids">
    <div class="pyramid p1"></div>
    <div class="pyramid p2"></div>
    <div class="pyramid p3"></div>
  </div>
  <div class="bg-sand"></div>
  <div class="bg-particles" id="bgPart"></div>

// ===== SOUND ENGINE (Web Audio API) =====
const SFX = {
  muted: false,
  sounds: {},
  SOUND_PATH: '/games/sounds/',

  init() {
    // Preload all MP3 sound files
    const files = {
      reelSpin: 'reel-spin',
      reelStop: 'reel-stop',
      win: 'win',
      bigWin: 'big-win',
      scatter: 'scatter',
      freeSpinsSound: 'free-spins',
      btnClickSound: 'btn-click',
      coins: 'coins',
      cardFlip: 'card-flip',
      gambleLoseSound: 'gamble-lose'
    };
    for (const [key, file] of Object.entries(files)) {
      const audio = new Audio(this.SOUND_PATH + file + '.mp3');
      audio.preload = 'auto';
      audio.volume = 0.6;
      this.sounds[key] = audio;
    }
    // Special: reel spin loops (old wagon wheel on gravel)
    this.sounds.reelSpin.loop = true;
    this.sounds.reelSpin.volume = 0.45;
    // Reel stop: wheel clicking slow down
    this.sounds.reelStop.volume = 0.55;
    // Adjust individual volumes
    this.sounds.btnClickSound.volume = 0.4;
    this.sounds.bigWin.volume = 0.8;
    this.sounds.freeSpinsSound.volume = 0.8;
    this.sounds.scatter.volume = 0.7;
    this.sounds.coins.volume = 0.5;
  },

  resume() {
    // No-op for MP3 mode (needed for compatibility)
  },

  // Play a sound (clone for overlapping playback)
  _play(key, opts = {}) {
    if (this.muted || !this.sounds[key]) return null;
    let audio;
    if (opts.clone !== false) {
      audio = this.sounds[key].cloneNode();
      audio.volume = this.sounds[key].volume;
    } else {
      audio = this.sounds[key];
    }
    if (opts.volume) audio.volume = opts.volume;
    if (opts.loop) audio.loop = true;
    if (opts.playbackRate) audio.playbackRate = opts.playbackRate;
    audio.currentTime = 0;
    audio.play().catch(() => {});
    return audio;
  },

  // Stop a specific sound
  _stop(key) {
    if (this.sounds[key]) {
      this.sounds[key].pause();
      this.sounds[key].currentTime = 0;
    }
  },

  // ===================== CASINO SOUND EFFECTS =====================

  _spinAudio: null,
  _spinRate: 1.0,
  _spinAccel: null,

  spinStart() {
    // Start wagon wheel sound - ramp up speed from slow to fast
    const audio = this.sounds.reelSpin;
    if (this.muted || !audio) return;
    audio.currentTime = 0;
    audio.loop = true;
    audio.volume = 0.15;
    audio.playbackRate = 0.4;
    audio.play().catch(() => {});
    this._spinAudio = audio;
    this._spinRate = 0.4;
    // Accelerate the wheel over 400ms
    clearInterval(this._spinAccel);
    this._spinAccel = setInterval(() => {
      if (this._spinRate < 1.3) {
        this._spinRate += 0.06;
        audio.playbackRate = this._spinRate;
        audio.volume = Math.min(0.5, audio.volume + 0.02);
      } else {
        clearInterval(this._spinAccel);
        this._spinAccel = null;
      }
    }, 25);
  },

  reelSpin() {
    // No-op: continuous wagon wheel handles this
  },

  reelStop(idx) {
    // Each reel stop: decelerate the wagon wheel
    if (this._spinAudio) {
      clearInterval(this._spinAccel);
      // Reduce speed and volume step by step
      const targetRate = Math.max(0.3, 1.3 - (idx + 1) * 0.22);
      const targetVol = Math.max(0.08, 0.5 - (idx + 1) * 0.1);
      // Smooth deceleration over 150ms
      const steps = 6;
      const rateStep = (this._spinAudio.playbackRate - targetRate) / steps;
      const volStep = (this._spinAudio.volume - targetVol) / steps;
      let step = 0;
      const decel = setInterval(() => {
        step++;
        if (this._spinAudio) {
          this._spinAudio.playbackRate = Math.max(0.2, this._spinAudio.playbackRate - rateStep);
          this._spinAudio.volume = Math.max(0.03, this._spinAudio.volume - volStep);
        }
        if (step >= steps) clearInterval(decel);
      }, 25);
    }
    // Last reel: fully stop the wagon wheel
    if (idx === 4 && this._spinAudio) {
      setTimeout(() => {
        const audio = this._spinAudio;
        if (!audio) return;
        const fadeOut = setInterval(() => {
          if (audio.volume > 0.02 || audio.playbackRate > 0.25) {
            audio.volume = Math.max(0, audio.volume - 0.02);
            audio.playbackRate = Math.max(0.2, audio.playbackRate - 0.04);
          } else {
            clearInterval(fadeOut);
            audio.pause();
            audio.currentTime = 0;
            audio.volume = 0.5;
            audio.playbackRate = 1.0;
            this._spinAudio = null;
          }
        }, 30);
      }, 180);
    }
    // Reel stop thud/click sound
    this._play('reelStop', { volume: 0.5, playbackRate: 0.9 + idx * 0.05 });
  },

  win() {
    this._play('win');
    // Also play coins
    setTimeout(() => this._play('coins', { volume: 0.4 }), 300);
  },

  bigWin() {
    this._play('bigWin');
    // Coin shower effect: play coins multiple times
    setTimeout(() => this._play('coins', { volume: 0.5 }), 500);
    setTimeout(() => this._play('coins', { volume: 0.4 }), 1200);
  },

  scatter() {
    this._play('scatter');
  },

  freeSpins() {
    this._play('freeSpinsSound');
    // Add scatter magic on top
    setTimeout(() => this._play('scatter', { volume: 0.4 }), 500);
  },

  btnClick() {
    this._play('btnClickSound');
  },

  gambleReveal() {
    this._play('cardFlip');
  },

  gambleWin() {
    this._play('win', { volume: 0.7 });
  },

  gambleLose() {
    this._play('gambleLoseSound');
  },

  coinTick() {
    this._play('coins', { volume: 0.2, playbackRate: 1.2 + Math.random() * 0.6 });
  },

  // Reel ambience (compatibility)
  startReelAmbience() { this.spinStart(); },
  stopReelAmbience() {
    if (this._spinAudio) {
      this._spinAudio.pause();
      this._spinAudio.currentTime = 0;
      this._spinAudio = null;
    }
  }
};

// ===== PARTICLE / COIN FX ENGINE =====
const FX = {
  canvas: null,
  ctx: null,
  particles: [],
  running: false,
  init() {
    this.canvas = document.getElementById('fxCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize', () => this.resize());
  },
  resize() {
    if (!this.canvas) return;
    const wrap = document.getElementById('gameWrap');
    this.canvas.width = wrap.clientWidth;
    this.canvas.height = wrap.clientHeight;
  },
  // Spawn coin particles from a position
  spawnCoins(x, y, count = 20) {
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 8,
        vy: -Math.random() * 10 - 3,
        size: 4 + Math.random() * 6,
        life: 1,
        decay: 0.01 + Math.random() * 0.015,
        color: Math.random() > 0.3 ? '#F4D03F' : '#D4AF37',
        type: 'coin',
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.3
      });
    }
    if (!this.running) this.loop();
  },
  // Spawn sparkle particles
  spawnSparkles(x, y, count = 15) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 4;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 1 + Math.random() * 3,
        life: 1,
        decay: 0.02 + Math.random() * 0.02,
        color: ['#F4D03F', '#fff', '#ff6b6b', '#00bfff'][Math.floor(Math.random() * 4)],
        type: 'sparkle'
      });
    }
    if (!this.running) this.loop();
  },
  // Big win coin shower from top
  coinShower(duration = 3000) {
    const w = this.canvas.width;
    const interval = setInterval(() => {
      for (let i = 0; i < 5; i++) {
        this.spawnCoins(Math.random() * w, -10, 1);
      }
    }, 50);
    setTimeout(() => clearInterval(interval), duration);
    if (!this.running) this.loop();
  },
  // Win line sparkle trail
  trailSparkles(x1, y1, x2, y2) {
    const steps = 8;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const x = x1 + (x2 - x1) * t;
      const y = y1 + (y2 - y1) * t;
      this.spawnSparkles(x, y, 3);
    }
  },
  loop() {
    this.running = true;
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15; // gravity
      p.life -= p.decay;

      if (p.life <= 0) {
        this.particles.splice(i, 1);
        continue;
      }

      ctx.globalAlpha = p.life;

      if (p.type === 'coin') {
        // Draw coin (gold circle with shine)
        p.rot += p.rotSpeed;
        const scaleX = Math.cos(p.rot); // 3D rotation effect
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.scale(scaleX, 1);
        ctx.beginPath();
        ctx.arc(0, 0, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.strokeStyle = '#8B6914';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Inner circle
        ctx.beginPath();
        ctx.arc(0, 0, p.size * 0.6, 0, Math.PI * 2);
        ctx.strokeStyle = '#B8860B';
        ctx.lineWidth = 0.5;
        ctx.stroke();
        ctx.restore();
      } else {
        // Sparkle
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
        // Cross sparkle
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(p.x - p.size * 2, p.y);
        ctx.lineTo(p.x + p.size * 2, p.y);
        ctx.moveTo(p.x, p.y - p.size * 2);
        ctx.lineTo(p.x, p.y + p.size * 2);
        ctx.stroke();
      }
    }

    ctx.globalAlpha = 1;

    if (this.particles.length > 0) {
      requestAnimationFrame(() => this.loop());
    } else {
      this.running = false;
    }
  }
};

// ===== WIN COUNTER ANIMATION =====
function animateCounter(elementId, from, to, duration = 500) {
  const el = document.getElementById(elementId);
  const start = performance.now();
  const diff = to - from;
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const eased = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    el.textContent = Math.round(from + diff * eased);
    if (t < 1) requestAnimationFrame(step);
    else el.textContent = to;
    if (diff > 0 && Math.random() > 0.7) SFX.coinTick();
  }
  requestAnimationFrame(step);
}

    s.style.cssText = `position:absolute;width:${size}px;height:${size}px;background:#fff;border-radius:50%;
      left:${Math.random()*100}%;top:${Math.random()*40}%;opacity:${.2+Math.random()*.6};
      animation:twinkle ${2+Math.random()*3}s ease-in-out ${Math.random()*3}s infinite alternate`;
    stars.appendChild(s);
  }
}

function createPaylineButtons() {
  const frameL = document.getElementById('frameL');
  const frameR = document.getElementById('frameR');
  // Lines are displayed in specific order matching Book of Ra
  const leftOrder  = [4,2,9,6,1,7,8,3,5,10];
  const rightOrder = [4,2,8,6,1,7,9,3,5,10];
  leftOrder.forEach(n => {
    const btn = document.createElement('div');
    btn.className = 'pln';
    btn.textContent = n;
    btn.style.background = `linear-gradient(180deg,${PAYLINE_COLORS[n-1]},${darken(PAYLINE_COLORS[n-1])})`;
    btn.onclick = () => flashPayline(n-1);
    frameL.appendChild(btn);
  });
  rightOrder.forEach(n => {
    const btn = document.createElement('div');

    btn.onclick = () => flashPayline(n-1);
    frameR.appendChild(btn);
  });
}

function darken(hex) {
  const r = Math.max(0, parseInt(hex.slice(1,3),16) - 80);
  const g = Math.max(0, parseInt(hex.slice(3,5),16) - 80);
  const b = Math.max(0, parseInt(hex.slice(5,7),16) - 80);
  return `rgb(${r},${g},${b})`;
}

function createReels() {
  const vp = document.getElementById('reelsVP');
  for (let r = 0; r < 5; r++) {
    const col = document.createElement('div');
    col.className = 'reel-col';
    col.id = 'reel-' + r;

    const strip = document.createElement('div');
    strip.className = 'reel-strip';
    strip.id = 'strip-' + r;

    // Create BUFFER + VISIBLE_ROWS cells
    for (let i = 0; i < BUFFER + VISIBLE_ROWS; i++) {
      const cell = document.createElement('div');
      cell.className = 'sym-cell';
      cell.id = `c-${r}-${i}`;
      const wrap = document.createElement('div');
      wrap.className = 'sym-wrap';
      const img = document.createElement('div');
      img.className = 'sym-img';
      wrap.appendChild(img);
      cell.appendChild(wrap);
      strip.appendChild(cell);
    }

    col.appendChild(strip);
    vp.appendChild(col);
    reelStrips.push(strip);
  }
}

function fillInitialGrid() {
  for (let r = 0; r < 5; r++) {
    for (let row = 0; row < VISIBLE_ROWS; row++) {
      const sym = randomSymbol();
      grid[r][row] = sym;
    }
    renderReel(r);
  }
}

function renderReel(r) {
  const strip = reelStrips[r];
  const cellH = strip.parentElement.clientHeight / VISIBLE_ROWS;

  // Fill buffer cells with random symbols
  for (let i = 0; i < BUFFER; i++) {
    const cell = strip.children[i];
    const sym = randomSymbol();
    cell.querySelector('.sym-img').innerHTML = SVG[sym.id] || '';
    cell.style.height = cellH + 'px';
  }

  // Fill visible cells with grid data
  for (let row = 0; row < VISIBLE_ROWS; row++) {
    const cell = strip.children[BUFFER + row];
    const sym = grid[r][row];
    cell.querySelector('.sym-img').innerHTML = SVG[sym.id] || '';
    cell.style.height = cellH + 'px';
  }

  // Position strip so visible rows are showing
  strip.style.transform = `translateY(-${BUFFER * cellH}px)`;
}

function randomSymbol() {
  // Weighted random - lower value symbols more frequent
  const weights = [2, 3, 4, 5, 5, 6, 10, 10, 12, 12, 14];
  const total = weights.reduce((a,b) => a+b, 0);
  let rand = Math.random() * total;
  for (let i = 0; i < SYMBOLS.length; i++) {
    rand -= weights[i];
    if (rand <= 0) return SYMBOLS[i];
  }
  return SYMBOLS[SYMBOLS.length - 1];
}

// ===== SPIN LOGIC =====
async function doSpin() {
  if (spinning) return;

  const totalBet = betPerLine * lines;
  if (freeSpins <= 0 && balance < totalBet) {
    setInfo('Nicht genug Guthaben!');
    return;
  }

  spinning = true;
  SFX.resume();
  SFX.spinStart();
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('spinBtn').classList.add('is-stop');
  document.getElementById('gambleBtn').style.display = 'none';
  clearWinHighlights();
  clearWinLines();

  if (freeSpins > 0) {
    freeSpins--;
    setInfo(`Freispiel ${10 - freeSpins} von 10`, 'fs-msg');
  } else {
    balance -= totalBet;
  }
  lastWin = 0;
  updateUI();

  // Generate results
  const results = [];
  for (let r = 0; r < 5; r++) {
    const col = [];
    for (let row = 0; row < VISIBLE_ROWS; row++) {
      col.push(randomSymbol());
    }
    results.push(col);
  }

  // Animate reels
  await animateReels(results);

  // Set final grid
  for (let r = 0; r < 5; r++) {
    for (let row = 0; row < VISIBLE_ROWS; row++) {
      grid[r][row] = results[r][row];
    }
  }

  // Check wins
  const wins = checkWins();

  if (wins.totalWin > 0) {
    const oldBal = balance;
    lastWin = wins.totalWin;
    balance += lastWin;

    if (freeSpins > 0) freeSpinTotalWin += lastWin;

    // Show win effects
    highlightWins(wins);
    drawWinLines(wins);

    // Spawn particles at winning positions
    const vp = document.getElementById('reelsVP');
    const vpRect = vp.getBoundingClientRect();
    const wrapRect = document.getElementById('gameWrap').getBoundingClientRect();
    wins.lines.forEach(w => {
      w.positions.forEach(([r, row]) => {
        const colW = vp.clientWidth / 5;
        const rowH = vp.clientHeight / 3;
        const px = (vpRect.left - wrapRect.left) + r * colW + colW / 2;
        const py = (vpRect.top - wrapRect.top) + row * rowH + rowH / 2;
        FX.spawnSparkles(px, py, 8);
      });
    });

    if (lastWin >= totalBet * 10) {
      SFX.bigWin();
      FX.coinShower(3000);
      showBigWin(lastWin);
    } else {
      SFX.win();
      // Spawn some coins from center
      FX.spawnCoins(FX.canvas.width / 2, FX.canvas.height / 2, 15);
      // Romani win phrases
      const phrases = ['Baxtalo!','Latscho!','Kushti!','Opre!','Sastipen!'];
      setInfo(`${phrases[Math.floor(Math.random()*phrases.length)]} GEWINN: ${lastWin}`, 'win-msg');
    }

    // Animate balance counter
    animateCounter('balVal', oldBal, balance, 600);
    animateCounter('winVal', 0, lastWin, 600);

    if (freeSpins <= 0) {
      document.getElementById('gambleBtn').style.display = '';
      gambleWin = lastWin;
    }
  } else {
    setInfo(freeSpins > 0 ? `Noch ${freeSpins} Freispiele` : 'Kein Gewinn');
  }

  // Check for scatter (3+ books = free spins)
  if (wins.scatterCount >= 3 && freeSpins <= 0) {
    SFX.scatter();
    await startFreeSpins();
  }

  updateUI();
  spinning = false;
  document.getElementById('spinBtn').disabled = false;
  document.getElementById('spinBtn').classList.remove('is-stop');

  // Free spins ended?
  if (freeSpins === 0 && freeSpinTotalWin > 0) {
    setInfo(`Freispiele beendet! Gesamtgewinn: ${freeSpinTotalWin}`, 'win-msg');
    freeSpinTotalWin = 0;
    freeSpinSymbol = null;
  }

  // Auto play
  if (autoPlay && (freeSpins > 0 || balance >= betPerLine * lines)) {
    setTimeout(doSpin, 800);
  }
}

async function animateReels(results) {
  const promises = [];

  for (let r = 0; r < 5; r++) {
    promises.push(animateReel(r, results[r], r * 250)); // stagger 250ms per reel
  }

  await Promise.all(promises);
}

function animateReel(reelIdx, finalSymbols, delay) {
  return new Promise(resolve => {
    const strip = reelStrips[reelIdx];
    const col = strip.parentElement;
    const cellH = col.clientHeight / VISIBLE_ROWS;

    // STEP 1: Copy CURRENT visible symbols to the top cells (0,1,2)
    // so there is NO visual jump when we reset translateY to 0
    for (let row = 0; row < VISIBLE_ROWS; row++) {
      const currentSym = grid[reelIdx][row];
      strip.children[row].querySelector('.sym-img').innerHTML = SVG[currentSym.id] || '';
      strip.children[row].style.height = cellH + 'px';
    }

    // STEP 2: Fill the scrolling buffer (cells 3..BUFFER-1) with random symbols
    for (let i = VISIBLE_ROWS; i < BUFFER; i++) {
      const sym = randomSymbol();
      strip.children[i].querySelector('.sym-img').innerHTML = SVG[sym.id] || '';
      strip.children[i].style.height = cellH + 'px';
    }

    // STEP 3: Set final result symbols at the bottom (cells BUFFER..BUFFER+2)
    for (let row = 0; row < VISIBLE_ROWS; row++) {
      strip.children[BUFFER + row].querySelector('.sym-img').innerHTML = SVG[finalSymbols[row].id] || '';
      strip.children[BUFFER + row].style.height = cellH + 'px';
    }

    // STEP 4: Position at top - shows cells 0,1,2 = CURRENT symbols (NO JUMP!)
    strip.style.transition = 'none';
    strip.style.transform = 'translateY(0px)';
    strip.offsetHeight; // force reflow

    // STEP 5: Animate after delay
    setTimeout(() => {
      const spinDuration = 600 + reelIdx * 180;
      const targetY = BUFFER * cellH;
      const overshootY = targetY + cellH * 0.35;

      // Phase 1: Fast spin to overshoot position
      strip.style.transition = `transform ${spinDuration}ms cubic-bezier(.2,.0,.3,1)`;
      strip.style.transform = `translateY(-${overshootY}px)`;

      // Phase 2: Bounce back + stop sound synced to this reel
      setTimeout(() => {
        strip.style.transition = `transform 200ms cubic-bezier(.3,.1,.4,1.4)`;
        strip.style.transform = `translateY(-${targetY}px)`;

        SFX.reelStop(reelIdx);
        col.classList.add('reel-landing');
        setTimeout(() => col.classList.remove('reel-landing'), 400);

        setTimeout(() => {
          strip.style.transition = 'none';
          resolve();
        }, 220);
      }, spinDuration);
    }, delay);
  });
}

// ===== WIN CHECKING =====
function checkWins() {
  const result = { lines: [], totalWin: 0, scatterCount: 0, scatterPositions: [] };

  // Count scatters (books)
  const bookPositions = [];
  for (let r = 0; r < 5; r++) {
    for (let row = 0; row < 3; row++) {
      if (grid[r][row].id === 'book') {
        bookPositions.push([r, row]);
      }
    }
  }
  result.scatterCount = bookPositions.length;
  result.scatterPositions = bookPositions;

  // Scatter pays
  if (bookPositions.length >= 3) {
    const bookSym = SYMBOLS[0];
    const scatterPay = bookSym.mult[bookPositions.length - 1] * betPerLine * lines;
    result.totalWin += scatterPay;
  }

  // Check each payline
  for (let l = 0; l < lines; l++) {
    const line = PAYLINES[l];
    const syms = line.map((row, r) => grid[r][row]);

    // Find leftmost symbol (ignore book as wild if another sym starts)
    let matchSym = null;
    let count = 0;
    let positions = [];

    for (let r = 0; r < 5; r++) {
      const s = syms[r];
      const isWild = s.id === 'book';

      if (matchSym === null) {
        if (!isWild) matchSym = s;
        positions.push([r, line[r]]);
        count++;
      } else if (s.id === matchSym.id || isWild) {
        positions.push([r, line[r]]);
        count++;
      } else {
        break;
      }
    }

    // If all wilds, match as book
    if (matchSym === null) matchSym = SYMBOLS[0];

    // Free spin expanding symbol
    if (freeSpinSymbol && freeSpins >= 0) {
      // Check if expanding symbol appears on payline
      const expandCount = syms.filter(s => s.id === freeSpinSymbol.id || s.id === 'book').length;
      if (expandCount >= 3) {
        count = expandCount;
        positions = [];
        for (let r = 0; r < 5; r++) {
          if (syms[r].id === freeSpinSymbol.id || syms[r].id === 'book') {
            positions.push([r, line[r]]);
          }
        }
        matchSym = freeSpinSymbol;
      }
    }

    if (count >= 3 && matchSym.mult[count - 1] > 0) {
      const win = matchSym.mult[count - 1] * betPerLine;
      result.lines.push({ lineIdx: l, symbol: matchSym, count, positions, win });
      result.totalWin += win;
    }
  }

  return result;
}

// ===== WIN DISPLAY =====
function highlightWins(wins) {
  const allPos = new Set();
  wins.lines.forEach(w => w.positions.forEach(([r,row]) => allPos.add(`${r}-${row}`)));
  wins.scatterPositions.forEach(([r,row]) => allPos.add(`${r}-${row}`));

  allPos.forEach(key => {
    const [r, row] = key.split('-').map(Number);
    const cell = reelStrips[r].children[BUFFER + row];
    cell.classList.add('win-hl');
  });
}

function clearWinHighlights() {
  document.querySelectorAll('.win-hl').forEach(el => el.classList.remove('win-hl'));
}

function drawWinLines(wins) {
  const svgCont = document.getElementById('winlineSvg');
  const vp = document.getElementById('reelsVP');
  const vpW = vp.clientWidth;
  const vpH = vp.clientHeight;
  const colW = vpW / 5;
  const rowH = vpH / 3;

  let svgStr = `<svg viewBox="0 0 ${vpW} ${vpH}" preserveAspectRatio="none">`;

  wins.lines.forEach(w => {
    const color = PAYLINE_COLORS[w.lineIdx];
    const points = w.positions.map(([r, row]) => {
      return `${r * colW + colW/2},${row * rowH + rowH/2}`;
    }).join(' ');
    svgStr += `<polyline points="${points}" class="wl-path" stroke="${color}" stroke-opacity=".8"/>`;
  });

  svgStr += '</svg>';
  svgCont.innerHTML = svgStr;
}

function clearWinLines() {
  document.getElementById('winlineSvg').innerHTML = '';
}

function flashPayline(idx) {
  clearWinLines();
  const vp = document.getElementById('reelsVP');
  const vpW = vp.clientWidth;
  const vpH = vp.clientHeight;
  const colW = vpW / 5;
  const rowH = vpH / 3;
  const color = PAYLINE_COLORS[idx];
  const line = PAYLINES[idx];

  const points = line.map((row, r) => `${r * colW + colW/2},${row * rowH + rowH/2}`).join(' ');
  const svgStr = `<svg viewBox="0 0 ${vpW} ${vpH}" preserveAspectRatio="none">
    <polyline points="${points}" class="wl-path" stroke="${color}" stroke-width="4" stroke-opacity=".9"/>
  </svg>`;
  document.getElementById('winlineSvg').innerHTML = svgStr;

  setTimeout(clearWinLines, 1500);
}

// ===== FREE SPINS =====
async function startFreeSpins() {
  // Pick random expanding symbol (not book)
  const expandable = SYMBOLS.filter(s => !s.scatter);
  freeSpinSymbol = expandable[Math.floor(Math.random() * expandable.length)];
  freeSpins = 10;
  freeSpinTotalWin = 0;

  SFX.freeSpins();
  FX.coinShower(2500);
  const overlay = document.getElementById('fsOverlay');
  document.getElementById('fsText').textContent = '10 Freispiele gewonnen!';
  document.getElementById('fsSym').innerHTML = SVG[freeSpinSymbol.id] || freeSpinSymbol.name;
  document.getElementById('fsSym').style.width = '80px';
  document.getElementById('fsSym').style.height = '80px';
  overlay.classList.add('show');

  await new Promise(r => setTimeout(r, 3000));
  overlay.classList.remove('show');
}

// ===== BIG WIN =====
function showBigWin(amount) {
  SFX.bigWin();
  FX.coinShower(3500);
  const overlay = document.getElementById('bigwinOverlay');
  overlay.classList.add('show');
  // Animate amount counting up
  const el = document.getElementById('bwAmount');
  el.textContent = '0';
  let current = 0;
  const step = Math.max(1, Math.floor(amount / 40));
  const countUp = setInterval(() => {
    current += step;
    if (current >= amount) { current = amount; clearInterval(countUp); }
    el.textContent = current + ' Punkte!';
    SFX.coinTick();
  }, 50);
  setTimeout(() => overlay.classList.remove('show'), 4000);
}

// ===== GAMBLE =====
function startGamble() {
  if (gambleWin <= 0) return;
  document.getElementById('gambleStake').textContent = gambleWin;
  document.getElementById('gambleCard').textContent = '?';
  document.getElementById('gambleCard').style.color = '#333';
  document.getElementById('gambleOverlay').classList.add('show');
}

function gamblePick(choice) {
  SFX.gambleReveal();
  const isRed = Math.random() < 0.5;
  const card = document.getElementById('gambleCard');
  const suits = isRed ? ['♥','♦'] : ['♠','♣'];
  card.textContent = suits[Math.floor(Math.random() * 2)];
  card.style.color = isRed ? '#cc0000' : '#000';
  card.classList.add('flip');
  setTimeout(() => card.classList.remove('flip'), 500);

  const won = (choice === 'red' && isRed) || (choice === 'black' && !isRed);

  setTimeout(() => {
    if (won) {
      SFX.gambleWin();
      FX.spawnCoins(FX.canvas.width / 2, FX.canvas.height / 2, 25);
      gambleWin *= 2;
      balance += gambleWin / 2;
      document.getElementById('gambleStake').textContent = gambleWin;
      setInfo(`Verdoppelt! ${gambleWin} Punkte!`, 'win-msg');
    } else {
      SFX.gambleLose();
      balance -= gambleWin;
      gambleWin = 0;
      lastWin = 0;
      setInfo('Verloren!');
      document.getElementById('gambleOverlay').classList.remove('show');
      document.getElementById('gambleBtn').style.display = 'none';
    }
    updateUI();
  }, 600);
}

function collectGamble() {
  document.getElementById('gambleOverlay').classList.remove('show');
  document.getElementById('gambleBtn').style.display = 'none';
  setInfo(`${gambleWin} Punkte eingelöst!`, 'win-msg');
  gambleWin = 0;
}

// ===== PAYTABLE =====
function togglePaytable() {
  const modal = document.getElementById('paytableModal');
  if (modal.classList.contains('show')) {
    modal.classList.remove('show');
    return;
  }

  const grid = document.getElementById('ptGrid');
  grid.innerHTML = '';

  SYMBOLS.forEach(sym => {
    const item = document.createElement('div');
    item.className = 'pt-item';

    const symDiv = document.createElement('div');
    symDiv.className = 'pt-sym';
    symDiv.innerHTML = SVG[sym.id] || '';
    item.appendChild(symDiv);

    const name = document.createElement('div');
    name.style.cssText = 'color:#D4AF37;font-size:12px;font-weight:700;margin-bottom:4px';
    name.textContent = sym.name;
    item.appendChild(name);

    const pays = document.createElement('div');
    pays.className = 'pt-pays';
    const labels = ['×2','×3','×4','×5'];
    for (let i = 1; i < 5; i++) {
      if (sym.mult[i] > 0) {
        pays.innerHTML += `${labels[i-1]}: <span>${sym.mult[i]}×</span><br>`;
      }
    }
    if (sym.scatter) pays.innerHTML += '<br><span style="color:#ff5555">SCATTER + WILD</span>';
    item.appendChild(pays);

    grid.appendChild(item);
  });

  modal.classList.add('show');
}

// ===== CONTROLS =====
function adjBet(d) {
  SFX.resume(); SFX.btnClick();
  const bets = [1,2,5,10,20,50,100,200];
  let idx = bets.indexOf(betPerLine);
  idx = Math.max(0, Math.min(bets.length - 1, idx + d));
  betPerLine = bets[idx];
  updateUI();
}

function adjLines(d) {
  SFX.resume(); SFX.btnClick();
  lines = Math.max(1, Math.min(10, lines + d));
  updateUI();
}

function toggleAuto() {
  SFX.resume(); SFX.btnClick();
  autoPlay = !autoPlay;
  document.getElementById('autoBtn').classList.toggle('active', autoPlay);
  if (autoPlay && !spinning) doSpin();
}

function toggleMute() {
  SFX.muted = !SFX.muted;
  document.getElementById('muteBtn').textContent = SFX.muted ? '🔇' : '🔊';
}

function setInfo(text, cls) {
  const bar = document.getElementById('infoBar');
  bar.textContent = text;
  bar.className = 'info-bar' + (cls ? ' ' + cls : '');
}

function updateUI() {
  document.getElementById('balVal').textContent = balance;
  document.getElementById('betVal').textContent = betPerLine;
  document.getElementById('linesVal').textContent = lines;
  document.getElementById('totalBetVal').textContent = betPerLine * lines;
  document.getElementById('winVal').textContent = lastWin;
  const winCg = document.getElementById('winCg');
  winCg.classList.toggle('has-win', lastWin > 0);
}

// ===== RESIZE HANDLER =====
function onResize() {
  for (let r = 0; r < 5; r++) {
    const strip = reelStrips[r];
    if (!strip || !strip.parentElement) continue;
    const cellH = strip.parentElement.clientHeight / VISIBLE_ROWS;
    for (let i = 0; i < strip.children.length; i++) {
      strip.children[i].style.height = cellH + 'px';
    }
    strip.style.transition = 'none';
    strip.style.transform = `translateY(-${BUFFER * cellH}px)`;
  }
}
window.addEventListener('resize', onResize);

// Add CSS animation for twinkle
const style = document.createElement('style');
style.textContent = `@keyframes twinkle{from{opacity:.3}to{opacity:1}}`;
document.head.appendChild(style);

// ===== START =====
window.addEventListener('DOMContentLoaded', init);
window.addEventListener('load', () => setTimeout(onResize, 100));
