<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a05">
<title>Blackjack – Reisendes Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;background:#0a0a05;overscroll-behavior:none}
body{font-family:'Playfair Display',serif;color:#F0E6D3;user-select:none;-webkit-user-select:none;touch-action:manipulation;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

/* ═══════ BACKGROUND ═══════ */
.table-bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 50% 55%, rgba(13,92,46,.3) 0%, rgba(10,68,35,.2) 40%, rgba(6,46,23,.1) 70%, transparent 100%),
    url('img/blackjack-bg.jpg') center center / cover no-repeat;
}
.table-felt{
  position:fixed;bottom:195px;left:50%;transform:translateX(-50%);
  width:min(92vw,880px);height:min(42vh,300px);
  border-radius:180px;z-index:1;
  border:8px solid rgba(139,105,20,.7);
  box-shadow:0 0 0 4px rgba(212,175,55,.5),0 0 50px rgba(0,0,0,.5),inset 0 0 60px rgba(0,0,0,.4);
  background:
    repeating-linear-gradient(45deg, rgba(212,175,55,.015) 0px, rgba(212,175,55,.015) 1px, transparent 1px, transparent 14px),
    repeating-linear-gradient(-45deg, rgba(212,175,55,.015) 0px, rgba(212,175,55,.015) 1px, transparent 1px, transparent 14px),
    radial-gradient(ellipse at 50% 50%, rgba(26,122,66,.85) 0%, rgba(15,92,46,.8) 50%, rgba(10,68,35,.85) 100%);
}
/* Blackjack text on felt */
.felt-text{
  position:fixed;bottom:310px;left:50%;transform:translateX(-50%);z-index:2;
  font-size:clamp(18px,4vw,32px);font-weight:900;letter-spacing:6px;text-transform:uppercase;
  color:rgba(212,175,55,.08);pointer-events:none;
}
/* "BLACKJACK PAYS 3:2" arc */
.felt-rules{
  position:fixed;bottom:350px;left:50%;transform:translateX(-50%);z-index:2;
  font-size:clamp(9px,1.5vw,13px);letter-spacing:4px;text-transform:uppercase;
  color:rgba(240,230,211,.06);pointer-events:none;
}

/* ═══════ LANTERN GLOW ═══════ */
.lantern-glow{
  position:fixed;top:3%;left:50%;transform:translateX(-50%);
  width:300px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,180,50,.06) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ═══════ TOP BAR ═══════ */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:calc(env(safe-area-inset-top, 0px) + 8px) calc(env(safe-area-inset-right, 0px) + 16px) 8px calc(env(safe-area-inset-left, 0px) + 16px);
  background:linear-gradient(180deg,rgba(30,18,8,.95),rgba(30,18,8,.6));
  border-bottom:1px solid rgba(212,175,55,.15);
}
.top-bar .logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:#D4AF37}
.top-bar .back,.back{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);color:#D4AF37;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;transition:.2s;min-height:44px;min-width:44px;display:flex;align-items:center}
.top-bar .back:hover,.back:hover{background:rgba(212,175,55,.2)}
.top-bar .info{font-size:12px;color:rgba(240,230,211,.5)}

/* ═══════ TIMER BAR ═══════ */
.timer-bar{
  position:fixed;top:46px;left:0;right:0;z-index:99;height:3px;
  background:rgba(0,0,0,.3);
}
.timer-fill{
  height:100%;width:100%;
  background:linear-gradient(90deg,#2ecc71,#f39c12,#e74c3c);
  transition:width .3s linear;
  border-radius:0 2px 2px 0;
}

/* ═══════ DEALER AREA ═══════ */
.dealer-area{
  position:fixed;bottom:400px;left:50%;transform:translateX(-50%);
  text-align:center;z-index:10;
}
.dealer-label{
  font-size:11px;color:rgba(240,230,211,.6);margin-bottom:6px;
  letter-spacing:3px;text-transform:uppercase;
  text-shadow:0 1px 4px rgba(0,0,0,.6);
}
.dealer-avatar{
  display:none;
}
.dealer-cards{display:flex;gap:6px;justify-content:center;min-height:100px;align-items:center}
.dealer-value{
  font-size:22px;font-weight:900;color:#F4D03F;margin-top:6px;
  text-shadow:0 0 12px rgba(244,208,63,.3);
}

/* ═══════ CARDS (Poker-Style) ═══════ */
.card{
  width:70px;height:auto;aspect-ratio:5/7;
  border-radius:8px;
  background:linear-gradient(165deg,#ffffff 0%,#f9f7f2 30%,#f0ece3 70%,#e8e2d6 100%);
  color:#1a1a2e;font-weight:900;
  box-shadow:0 4px 14px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.5) inset;
  transition:transform .3s ease;
  position:relative;overflow:hidden;
  border:1.5px solid rgba(180,170,150,.35);
  flex-shrink:0;
}
.card::before{
  content:'';position:absolute;inset:3px;border-radius:5px;
  border:1px solid rgba(150,140,120,.12);
  pointer-events:none;z-index:1;
}
.card .corner-tl{
  position:absolute;top:3px;left:4px;
  display:flex;flex-direction:column;align-items:center;line-height:1;z-index:2;
}
.card .corner-tl .c-rank{font-size:16px;font-weight:800;font-family:'Playfair Display',serif}
.card .corner-tl .c-suit{font-size:12px;line-height:1}
.card .corner-br{
  position:absolute;bottom:3px;right:4px;
  display:flex;flex-direction:column;align-items:center;line-height:1;z-index:2;
  transform:rotate(180deg);
}
.card .corner-br .c-rank{font-size:16px;font-weight:800;font-family:'Playfair Display',serif}
.card .corner-br .c-suit{font-size:12px;line-height:1}
.card .center-suit{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(24px,4vw,36px);z-index:2;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.08));
}
.card.red{color:#c0392b}
.card.black{color:#1a1a2e}
.card.hidden{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:2px solid rgba(212,175,55,.5);
  color:transparent;font-size:0;
}
.card.hidden::before{display:none}
/* Card deal animation */
.card.dealing{
  animation:cardDeal .4s ease-out;
}
@keyframes cardDeal{
  0%{transform:translateY(-60px) scale(.7) rotate(-10deg);opacity:0}
  100%{transform:translateY(0) scale(1) rotate(0);opacity:1}
}
/* Hit card extra pop */
.card.card-hit{
  animation:cardHit .35s ease-out;
}
@keyframes cardHit{
  0%{transform:translateY(-40px) scale(.5);opacity:0}
  60%{transform:translateY(5px) scale(1.05)}
  100%{transform:translateY(0) scale(1);opacity:1}
}

/* ═══════ FLYING CARD ANIMATIONS ═══════ */
.flying-card{
  position:fixed;
  width:32px;height:46px;border-radius:5px;
  z-index:9999;pointer-events:none;
  transition:none;
  box-shadow:0 4px 16px rgba(0,0,0,.6);
}
.flying-card.face-down{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:1.5px solid rgba(212,175,55,.5);
}
.flying-card.face-up{
  background:linear-gradient(165deg,#fff,#f0ece3);
  border:1.5px solid rgba(212,175,55,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;
}
.flying-card.face-up.red{color:#c0392b}

/* ═══════ SEATS ═══════ */
.seats{
  position:fixed;bottom:200px;left:0;right:0;
  display:flex;gap:2px;z-index:10;
  width:100%;max-width:860px;margin:0 auto;
  justify-content:center;
  align-items:flex-end;
  padding:0 4px;box-sizing:border-box;
  overflow-x:auto;overflow-y:visible;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.seats::-webkit-scrollbar{display:none}
.seat{
  flex:0 0 auto;min-width:70px;max-width:115px;width:calc((100% - 12px) / 7);
  text-align:center;cursor:pointer;transition:.3s;
}
.seat-inner{
  background:rgba(20,10,5,.85);border-radius:10px;padding:6px 4px 7px;
  border:2px solid rgba(212,175,55,.12);transition:.3s;
  backdrop-filter:blur(4px);
}
.seat.active .seat-inner{
  border-color:#F4D03F;
  box-shadow:0 0 16px rgba(244,208,63,.35),0 0 6px rgba(244,208,63,.2) inset;
  animation:pulse-glow 1.5s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 16px rgba(244,208,63,.35)}
  50%{box-shadow:0 0 28px rgba(244,208,63,.5)}
}

/* Avatar */
.seat-avatar{
  width:72px;height:72px;margin:0 auto 4px;
  border-radius:50%;overflow:hidden;
  border:3px solid rgba(212,175,55,.4);
  background:radial-gradient(circle at 30% 30%, rgba(60,50,40,.6), rgba(15,10,8,.8));
  box-shadow:0 4px 14px rgba(0,0,0,.5);
}
.seat-avatar canvas{width:100%;height:100%;border-radius:50%}
.seat.active .seat-avatar{
  border-color:#F4D03F;
  box-shadow:0 0 14px rgba(244,208,63,.4);
  animation:avatar-glow 2s ease-in-out infinite;
}
@keyframes avatar-glow{
  0%,100%{box-shadow:0 0 14px rgba(244,208,63,.4)}
  50%{box-shadow:0 0 24px rgba(244,208,63,.6)}
}

/* Seat cards */
.seat-cards{display:flex;gap:3px;justify-content:center;min-height:40px;align-items:center;position:relative}
.seat-cards .card{
  width:28px!important;height:40px!important;aspect-ratio:auto!important;
  border-radius:4px;font-size:9px;
  box-shadow:0 2px 6px rgba(0,0,0,.4)!important;
}
.seat-cards .card:nth-child(1){transform:rotate(-5deg) translateX(2px);z-index:1}
.seat-cards .card:nth-child(2){transform:rotate(5deg) translateX(-2px);z-index:2}
.seat-cards .card:nth-child(n+3){transform:rotate(0);margin-left:-8px}
.seat-cards .card .corner-tl{top:1px;left:2px}
.seat-cards .card .corner-tl .c-rank{font-size:8px}
.seat-cards .card .corner-tl .c-suit{font-size:5px}
.seat-cards .card .corner-br{display:none}
.seat-cards .card .center-suit{font-size:13px}
.seat-cards .card::before{inset:1px;border-radius:3px}

.seat-name{
  font-size:12px;color:#D4AF37;margin-top:4px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 2px 6px rgba(0,0,0,.9);
  max-width:100%;
}
.seat.you .seat-name{color:#F4D03F;font-weight:700}
.seat-rang{
  font-size:9px;color:rgba(212,175,55,.6);margin-top:1px;
  font-style:italic;
}
.seat-value{font-size:13px;font-weight:700;color:#fff;margin-top:1px}
.seat-bet-bubble{
  font-size:8px;color:#F4D03F;
  background:rgba(0,0,0,.6);padding:1px 6px;border-radius:8px;
  display:inline-block;margin-top:1px;
  border:1px solid rgba(212,175,55,.15);
}
.seat-status{
  font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;
  display:inline-block;margin-top:3px;
}
.seat-status.win{background:rgba(68,221,68,.2);color:#4d4}
.seat-status.lose,.seat-status.bust{background:rgba(221,68,68,.2);color:#d44}
.seat-status.push{background:rgba(221,221,68,.2);color:#dd4}
.seat-status.blackjack{background:rgba(255,215,0,.25);color:#FFD700;animation:bjFlash 1s ease-in-out infinite}
@keyframes bjFlash{
  0%,100%{box-shadow:0 0 8px rgba(255,215,0,.3)}
  50%{box-shadow:0 0 20px rgba(255,215,0,.6)}
}

/* Empty seat */
.seat.empty .seat-inner{opacity:.2}
.seat.empty:hover .seat-inner{opacity:.55;border-color:rgba(212,175,55,.3)}
.seat.empty .seat-cards{display:flex;align-items:center;justify-content:center}
.seat.empty .seat-cards::after{
  content:'+';font-size:16px;color:rgba(212,175,55,.25);
  width:28px;height:40px;border:2px dashed rgba(212,175,55,.15);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
}
.seat.folded .seat-inner{opacity:.3;filter:grayscale(.5)}

/* ═══════ MY HAND (large cards at bottom) ═══════ */
.my-hand{
  position:fixed;bottom:0;left:0;right:0;z-index:99;
  display:flex;justify-content:center;align-items:flex-end;
  gap:8px;pointer-events:none;
  padding:0 20px 10px;
  opacity:0;transform:translateY(60px);
  transition:opacity .4s, transform .4s;
}
.my-hand.visible{opacity:1;transform:translateY(0)}
.my-hand .hand-card{
  width:120px;height:168px;flex-shrink:0;
  border-radius:12px;position:relative;overflow:hidden;
  background:linear-gradient(165deg,#ffffff 0%,#f9f7f2 30%,#f0ece3 70%,#e8e2d6 100%);
  border:2.5px solid rgba(212,175,55,.4);
  box-shadow:0 10px 35px rgba(0,0,0,.6),0 0 0 2px rgba(255,255,255,.15),0 0 25px rgba(244,208,63,.15);
  pointer-events:auto;
  color:#1a1a2e;font-weight:900;
}
.my-hand .hand-card::before{
  content:'';position:absolute;inset:6px;border-radius:7px;
  border:1px solid rgba(150,140,120,.12);pointer-events:none;z-index:1;
}
.my-hand .hand-card.red{color:#c0392b}
.my-hand .hand-card.hidden{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:2.5px solid rgba(212,175,55,.5);color:transparent;
}
.my-hand .hand-card.hidden::before{display:none}
.my-hand .hand-card:nth-child(1){transform:rotate(-4deg)}
.my-hand .hand-card:nth-child(2){transform:rotate(3deg)}
.my-hand .hand-card:nth-child(3){transform:rotate(0) translateY(-5px)}
.my-hand .hand-card:nth-child(4){transform:rotate(2deg) translateY(-8px)}
.my-hand .hand-card:nth-child(5){transform:rotate(-1deg) translateY(-10px)}
.my-hand .hand-card .hc-corner-tl{
  position:absolute;top:8px;left:10px;
  display:flex;flex-direction:column;align-items:center;line-height:1;z-index:2;
}
.my-hand .hand-card .hc-corner-tl .hc-rank{font-size:30px;font-weight:900;font-family:'Playfair Display',serif}
.my-hand .hand-card .hc-corner-tl .hc-suit{font-size:22px;line-height:1;margin-top:-2px}
.my-hand .hand-card .hc-corner-br{
  position:absolute;bottom:8px;right:10px;
  display:flex;flex-direction:column;align-items:center;line-height:1;z-index:2;
  transform:rotate(180deg);
}
.my-hand .hand-card .hc-corner-br .hc-rank{font-size:30px;font-weight:900;font-family:'Playfair Display',serif}
.my-hand .hand-card .hc-corner-br .hc-suit{font-size:22px;line-height:1;margin-top:-2px}
.my-hand .hand-card .hc-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:55px;z-index:2;filter:drop-shadow(0 1px 3px rgba(0,0,0,.08));
}

/* My hand value badge */
.my-hand-value{
  position:fixed;bottom:175px;left:50%;transform:translateX(-50%);z-index:99;
  font-size:28px;font-weight:900;color:#F4D03F;
  background:rgba(20,10,5,.85);padding:6px 22px;border-radius:16px;
  border:1.5px solid rgba(212,175,55,.3);
  text-shadow:0 0 12px rgba(244,208,63,.3);
  opacity:0;transition:opacity .4s;pointer-events:none;
  backdrop-filter:blur(4px);
}
.my-hand-value.visible{opacity:1}

/* ═══════ TAKE SEAT ═══════ */
.take-seat-area{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 20px calc(env(safe-area-inset-bottom, 20px) + 30px);
  background:linear-gradient(180deg,transparent 0%,rgba(10,5,2,.85) 30%,rgba(10,5,2,.97) 100%);
  cursor:pointer;transition:opacity .4s, transform .4s;
}
.take-seat-area.hidden{opacity:0;pointer-events:none;transform:translateY(40px)}
.take-seat-icon{font-size:48px;margin-bottom:10px;animation:seat-bounce 2s ease-in-out infinite}
@keyframes seat-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.take-seat-text{
  font-size:26px;font-weight:900;
  background:linear-gradient(135deg,#D4AF37,#F4D03F,#D4AF37);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:2px;text-transform:uppercase;text-align:center;
}
.take-seat-sub{
  font-size:13px;color:rgba(240,230,211,.45);margin-top:6px;
  letter-spacing:1px;animation:seat-pulse 2s ease-in-out infinite;
}
@keyframes seat-pulse{0%,100%{opacity:.4}50%{opacity:.8}}

/* ═══════ CONTROLS ═══════ */
.controls{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,rgba(20,10,5,.5),rgba(20,10,5,.95));
  border-top:1px solid rgba(212,175,55,.1);
  padding:12px 16px calc(env(safe-area-inset-bottom, 8px) + 12px);
  display:flex;flex-direction:column;gap:10px;align-items:center;
}
.controls.hidden{display:none}
.action-row,.bet-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center}
.btn{
  padding:12px 22px;border-radius:12px;font-family:inherit;font-weight:700;
  font-size:15px;cursor:pointer;transition:.2s;border:none;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
  min-height:44px;min-width:44px;
}
.btn-hit{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
.btn-stand{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}
.btn-double{background:linear-gradient(135deg,#f39c12,#d68910);color:#fff}
.btn-split{background:linear-gradient(135deg,#9b59b6,#8e44ad);color:#fff}
.btn-bet{
  background:linear-gradient(180deg,rgba(50,35,15,.9),rgba(25,18,8,.95));
  border:1.5px solid rgba(212,175,55,.4);color:#D4AF37;
  padding:10px 16px;font-size:14px;
}
.btn-bet.selected{background:linear-gradient(135deg,#D4AF37,#F4D03F);color:#000;border:none;box-shadow:0 0 16px rgba(212,175,55,.4)}
.btn:hover{transform:scale(1.05)}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.bet-confirm{
  background:linear-gradient(135deg,#D4AF37,#F4D03F);color:#000;
  font-size:16px;padding:14px 36px;border-radius:12px;
  box-shadow:0 4px 16px rgba(212,175,55,.3);
}

/* ═══════ WINNER BANNER ═══════ */
.winner-banner{
  position:fixed;top:45%;left:50%;transform:translate(-50%,-50%) scale(.8);
  z-index:200;text-align:center;padding:28px 50px;
  background:linear-gradient(135deg,rgba(212,175,55,.95),rgba(244,208,63,.95));
  color:#000;border-radius:20px;
  font-size:28px;font-weight:900;
  box-shadow:0 0 80px rgba(212,175,55,.6),0 0 20px rgba(212,175,55,.3) inset;
  opacity:0;transition:opacity .5s, transform .5s;pointer-events:none;
}
.winner-banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.winner-banner .sub{font-size:16px;font-weight:400;margin-top:4px;color:rgba(0,0,0,.6)}
.winner-banner .payout{font-size:22px;font-weight:700;color:#1a5c2e;margin-top:4px}

/* ═══════ PHASE INFO ═══════ */
.phase-info{
  position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
  z-index:50;text-align:center;
  font-size:26px;font-weight:900;color:#F4D03F;
  text-shadow:0 0 30px rgba(244,208,63,.6),0 2px 4px rgba(0,0,0,.5);
  pointer-events:none;opacity:0;transition:opacity .5s;
}
.phase-info.show{opacity:1}

/* ═══════ SPEECH BUBBLES ═══════ */
.speech-bubble{
  position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.82);color:#F0E6D3;
  padding:5px 10px;border-radius:10px;font-size:11px;
  white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;
  border:1px solid rgba(212,175,55,.3);
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  animation:bubble-in .3s ease-out;
  pointer-events:none;z-index:50;
  backdrop-filter:blur(4px);
}
.speech-bubble::after{
  content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;border-top-color:rgba(0,0,0,.82);
}
@keyframes bubble-in{

<script>
// ═══════════════════════════════════════════════════════════════
// BLACKJACK – Premium Multiplayer Client
// ═══════════════════════════════════════════════════════════════

const token = localStorage.getItem('casinoToken');
const user = (() => { try { return JSON.parse(localStorage.getItem('casinoUser')); } catch(e) { return null; } })();
const guest = (() => { try { return JSON.parse(localStorage.getItem('casinoGuest')); } catch(e) { return null; } })();
const guestBaxt = parseInt(localStorage.getItem('guestBaxt') || '0');
const socket = io({ auth: { token, username: (!token && guest) ? guest.username : undefined, guestBaxt: !token ? guestBaxt : undefined } });
const tableId = new URLSearchParams(location.search).get('table') || 'tisch-1';

// Gast: Baxt-Updates aus dem Spiel empfangen
if (!token && guest) {
  socket.on('guest:baxtUpdate', (data) => {
    localStorage.setItem('guestBaxt', String(Math.max(0, data.baxt)));
  });
  socket.on('guest:broke', () => {
    localStorage.setItem('guestBaxt', '0');
    setTimeout(() => { window.location.href = '/'; }, 3000);
  });
}

let myState = null;
let mySeat = -1;
let currentPhase = 'waiting';
let selectedBet = 50;
const isEmbed = location.search.includes('embed=1') || window.self !== window.top;
let timerInterval = null;

// ═══════ SOUND EFFECTS (Web Audio) ═══════
const BJSFX = {
  ctx: null,
  init() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },
  play(freq, type, dur, vol=0.15) {
    this.init();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(); o.stop(this.ctx.currentTime + dur);
  },
  _cardDealAudio: null,
  cardDeal() {
    if (!this._cardDealAudio) this._cardDealAudio = new Audio('/games/sounds/freesound_community-shuffle-cards-46455.mp3');
    const a = this._cardDealAudio.cloneNode();
    a.volume = 0.5;
    a.currentTime = 0.05;
    a.play().catch(() => {});
    setTimeout(() => { if (!a.paused) a.pause(); }, 600);
  },
  cardHit() {
    this.play(1400, 'triangle', 0.1, 0.12);
    setTimeout(() => this.play(1000, 'sine', 0.08, 0.08), 40);
  },
  chipBet() {
    [600,800,1000,1200].forEach((f,i) => setTimeout(() => this.play(f,'triangle',0.06,0.1), i*40));
  },
  win() {
    [523,659,784,1047].forEach((f,i) => setTimeout(() => this.play(f,'sine',0.3,0.12), i*120));
  },
  lose() { this.play(300, 'sine', 0.4, 0.1); setTimeout(() => this.play(200, 'sine', 0.5, 0.08), 200); },
  _blackjackAudio: null,
  blackjack() {
    if (!this._blackjackAudio) this._blackjackAudio = new Audio('/games/sounds/blackjack-call.mp3');
    this._blackjackAudio.currentTime = 0;
    this._blackjackAudio.volume = 0.8;
    this._blackjackAudio.play().catch(() => {});
  },
  bust() { this.play(150, 'sawtooth', 0.5, 0.08); },
  yourTurn() { [880,1100,880].forEach((f,i) => setTimeout(() => this.play(f,'sine',0.15,0.1), i*100)); }
};
// AudioContext braucht User-Geste zum Starten — bei erstem Touch/Click initialisieren
document.addEventListener('click', function() { BJSFX.init(); }, { once: true });
document.addEventListener('touchstart', function() { BJSFX.init(); }, { once: true, passive: true });

// ═══════ DICEBEAR AVATAR ═══════
function diceBearUrl(name) {
  return 'https://api.dicebear.com/9.x/toon-head/svg?seed=' + encodeURIComponent(name);
}

// ═══════ CARD RENDERING ═══════
function renderCard(c, extraClass='') {
  if (c === '??' || !c) return `<div class="card hidden ${extraClass}"></div>`;
  const rank = c.slice(0, -1);
  const suit = c.slice(-1);
  const color = (suit === '♥' || suit === '♦') ? 'red' : 'black';
  return `<div class="card ${color} ${extraClass}">
    <div class="corner-tl"><span class="c-rank">${rank}</span><span class="c-suit">${suit}</span></div>
    <div class="center-suit">${suit}</div>
    <div class="corner-br"><span class="c-rank">${rank}</span><span class="c-suit">${suit}</span></div>
  </div>`;
}

function renderMyCard(c) {
  if (c === '??' || !c) return `<div class="hand-card hidden"></div>`;
  const rank = c.slice(0, -1);
  const suit = c.slice(-1);
  const color = (suit === '♥' || suit === '♦') ? 'red' : 'black';
  return `<div class="hand-card ${color}">
    <div class="hc-corner-tl"><span class="hc-rank">${rank}</span><span class="hc-suit">${suit}</span></div>
    <div class="hc-center">${suit}</div>
    <div class="hc-corner-br"><span class="hc-rank">${rank}</span><span class="hc-suit">${suit}</span></div>
  </div>`;
}

// ═══════ FLYING CARD ANIMATION ═══════
const CardAnim = {
  dealerPos() {
    const da = document.querySelector('.dealer-area');
    if (!da) return {x: window.innerWidth/2, y: 80};
    const r = da.getBoundingClientRect();
    return {x: r.left + r.width/2, y: r.top + r.height/2};
  },
  seatPos(idx) {
    const seat = document.querySelector(`.seat[data-idx="${idx}"]`);
    if (!seat) return {x: window.innerWidth/2, y: window.innerHeight/2};
    const r = seat.getBoundingClientRect();
    return {x: r.left + r.width/2, y: r.top + 40};
  },
  fly(fromPos, toPos, faceDown=true, content='', onDone=null) {
    const el = document.createElement('div');
    el.className = `flying-card ${faceDown ? 'face-down' : 'face-up'}`;
    if (content && !faceDown) el.textContent = content;
    el.style.left = fromPos.x - 16 + 'px';
    el.style.top = fromPos.y - 23 + 'px';
    el.style.transform = 'rotate(-15deg) scale(.6)';
    document.body.appendChild(el);
    requestAnimationFrame(() => {
      el.style.transition = 'all .35s cubic-bezier(.2,.8,.3,1)';
      el.style.left = toPos.x - 16 + 'px';
      el.style.top = toPos.y - 23 + 'px';
      el.style.transform = 'rotate(0) scale(1)';
    });
    setTimeout(() => { el.remove(); if(onDone) onDone(); }, 380);
  }
};

// ═══════ TIMER ═══════
function startTimer(duration) {
  clearInterval(timerInterval);
  const fill = document.getElementById('timerFill');
  let remaining = duration;
  fill.style.width = '100%';
  timerInterval = setInterval(() => {
    remaining -= 100;
    fill.style.width = Math.max(0, (remaining / duration) * 100) + '%';
    if (remaining <= 0) clearInterval(timerInterval);
  }, 100);
}

// ═══════ RENDER STATE ═══════
let prevState = null;

function renderState(state) {
  // Karten-Sound: prüfe ob sich Kartenanzahl geändert hat
  var prevCardCount = 0, newCardCount = 0;
  if (prevState) {
    prevCardCount = (prevState.dealer.cards || []).length;
    (prevState.seats || []).forEach(function(s) { if (s) prevCardCount += (s.cards || []).length; });
  }
  newCardCount = (state.dealer.cards || []).length;
  (state.seats || []).forEach(function(s) { if (s) newCardCount += (s.cards || []).length; });
  var hasNewCards = newCardCount > prevCardCount;
  const isNewCards = !prevState || prevState.phase !== state.phase;
  prevState = JSON.parse(JSON.stringify(state));
  myState = state;
  currentPhase = state.phase;

  // Find my seat
  mySeat = -1;
  state.seats.forEach((s, i) => { if (s && s.isYou) mySeat = i; });

  // Dealer cards
  const dc = document.getElementById('dealerCards');
  dc.innerHTML = (state.dealer.cards || []).map((c, i) =>
    renderCard(c, isNewCards ? 'dealing' : '')
  ).join('');
  const dv = state.dealer.value;
  document.getElementById('dealerValue').textContent = dv ? (dv > 21 ? dv + ' BUST!' : dv) : '';
  if (dv > 21) document.getElementById('dealerValue').style.color = '#e74c3c';
  else document.getElementById('dealerValue').style.color = '#F4D03F';

  // Seats
  const seatsEl = document.getElementById('seats');
  seatsEl.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const s = state.seats[i];
    const div = document.createElement('div');
    div.className = 'seat';
    div.setAttribute('data-idx', i);

    if (!s) {
      div.className += ' empty';
      div.innerHTML = `<div class="seat-inner">
        <div class="seat-avatar" style="opacity:.3;border-style:dashed"><span style="font-size:20px;color:rgba(212,175,55,.3)">+</span></div>
      </div>`;
      div.onclick = () => joinSeat(i);
    } else {
      if (s.isYou) div.className += ' you';
      if (state.currentSeat === i) div.className += ' active';
      if (s.status === 'bust' || s.status === 'lose') div.className += ' folded';
      const statusCls = s.status && ['win','lose','bust','push','blackjack'].includes(s.status) ? s.status : '';

      div.innerHTML = `<div class="seat-inner">
        <div class="seat-avatar" id="av-${i}"></div>
        <div class="seat-cards">${s.cards.map(c => renderCard(c, isNewCards ? 'dealing' : '')).join('')}</div>
        <div class="seat-value">${s.value || ''}</div>
        <div class="seat-name">${s.username.replace(' 🤖','')}${s.isYou ? ' (Du)' : ''}</div>
        ${s.isBot ? '<div style="font-size:10px;color:rgba(212,175,55,.5);margin-top:1px">🤖 KI</div>' : ''}
        ${s.rang && !s.isBot ? `<div class="seat-rang">${s.rang}</div>` : ''}
        ${s.bet > 0 ? `<div class="seat-bet-bubble">${s.bet.toLocaleString('de-DE')} ₿</div>` : ''}
        ${statusCls ? `<div class="seat-status ${statusCls}">${statusMap(s.status)}</div>` : ''}
      </div>`;

      // Avatar: Server-Avatar bevorzugen, sonst generieren
      setTimeout(() => {
        const avEl = document.getElementById('av-' + i);
        if (!avEl) return;
        if (s.avatarConfig && s.avatarConfig.emoji) {
          avEl.innerHTML = '';
          avEl.style.background = s.avatarConfig.color || '#D4AF37';
          avEl.style.display = 'flex';
          avEl.style.alignItems = 'center';
          avEl.style.justifyContent = 'center';
          avEl.style.fontSize = '28px';
          avEl.textContent = s.avatarConfig.emoji;
        } else {
          const imgSrc = s.avatarUrl || diceBearUrl(s.username);
          const img = document.createElement('img');
          img.src = imgSrc;
          img.style.cssText = 'width:100%;height:100%;border-radius:50%;object-fit:cover';
          avEl.innerHTML = '';
          avEl.appendChild(img);
        }
      }, 0);
    }
    seatsEl.appendChild(div);
  }

  // My hand (large cards at bottom)
  const myHand = document.getElementById('myHand');
  const myHandValue = document.getElementById('myHandValue');
  const me = state.seats.find(s => s && s.isYou);

  if (me && me.cards.length > 0) {
    myHand.innerHTML = me.cards.map(c => renderMyCard(c)).join('');
    myHand.classList.add('visible');
    myHandValue.textContent = me.value || '';
    if (me.value > 21) {
      myHandValue.textContent = me.value + ' BUST!';
      myHandValue.style.color = '#e74c3c';
    } else if (me.value === 21 && me.cards.length === 2) {
      myHandValue.textContent = '21 BLACKJACK!';
      myHandValue.style.color = '#FFD700';
    } else {
      myHandValue.style.color = '#F4D03F';
    }
    myHandValue.classList.add('visible');
  } else {
    myHand.classList.remove('visible');
    myHandValue.classList.remove('visible');
  }

  // Hide "take seat" if seated
  const takeSeat = document.getElementById('takeSeatArea');
  if (mySeat >= 0) {
    takeSeat.classList.add('hidden');
  } else {
    takeSeat.classList.remove('hidden');
  }

  // Table info
  document.getElementById('tableInfo').textContent =
    `Tisch ${tableId} · ${state.playerCount} Spieler · ${phaseMap(state.phase)}`;

  // Controls
  renderControls(state);

  // Sound effects — Karten-Sound bei jeder neuen Karte
  if (hasNewCards) BJSFX.cardDeal();

  // Players bar disabled - seats show everything
}

function getBJChipPositions() {
  try { return JSON.parse(localStorage.getItem('bj-chip-pos') || '{}'); } catch(e) { return {}; }
}
function saveBJChipPositions(pos) {
  localStorage.setItem('bj-chip-pos', JSON.stringify(pos));
}
function initBJDraggableChips() {
  const chips = document.querySelectorAll('.p-chip');
  const saved = getBJChipPositions();
  chips.forEach(chip => {
    const name = chip.dataset.name;
    if (saved[name]) {
      chip.style.position = 'fixed';
      chip.style.left = saved[name].x + 'px';
      chip.style.top = saved[name].y + 'px';
      chip.style.zIndex = '150';
    }
    chip.addEventListener('mousedown', bjStartDrag);
    chip.addEventListener('touchstart', bjStartDrag, { passive: false });
  });
}
function bjStartDrag(e) {
  e.preventDefault();
  const chip = e.currentTarget;
  const rect = chip.getBoundingClientRect();
  const isTouch = e.type === 'touchstart';
  const startX = isTouch ? e.touches[0].clientX : e.clientX;
  const startY = isTouch ? e.touches[0].clientY : e.clientY;
  const offX = startX - rect.left;
  const offY = startY - rect.top;
  let dragged = false;
  chip.style.position = 'fixed';
  chip.style.left = rect.left + 'px';
  chip.style.top = rect.top + 'px';
  chip.style.zIndex = '200';
  function onMove(ev) {
    const cx = isTouch ? ev.touches[0].clientX : ev.clientX;
    const cy = isTouch ? ev.touches[0].clientY : ev.clientY;
    if (Math.abs(cx - startX) > 5 || Math.abs(cy - startY) > 5) dragged = true;
    if (dragged) {
      chip.classList.add('dragging');
      chip.style.left = (cx - offX) + 'px';
      chip.style.top = (cy - offY) + 'px';
    }
  }
  function onEnd() {
    chip.classList.remove('dragging');
    chip.style.zIndex = '150';
    if (!dragged) {
      openPlayerMenu(chip);
    } else {
      const pos = getBJChipPositions();
      pos[chip.dataset.name] = { x: parseInt(chip.style.left), y: parseInt(chip.style.top) };
      saveBJChipPositions(pos);
    }
    document.removeEventListener(isTouch ? 'touchmove' : 'mousemove', onMove);
    document.removeEventListener(isTouch ? 'touchend' : 'mouseup', onEnd);
  }
  document.addEventListener(isTouch ? 'touchmove' : 'mousemove', onMove);
  document.addEventListener(isTouch ? 'touchend' : 'mouseup', onEnd);
}

// ═══════ PLAYER MENU ═══════
let pmTarget = null;
function openPlayerMenu(chip) {
  pmTarget = chip.dataset.name;
  const menu = document.getElementById('playerMenu');
  const overlay = document.getElementById('pmOverlay');
  document.getElementById('pmName').textContent = pmTarget;
  const img = chip.querySelector('.avatar');
  const avatarEl = document.getElementById('pmAvatar');
  if (img) avatarEl.innerHTML = `<img src="${img.src}" alt="${pmTarget}">`;
  else avatarEl.innerHTML = pmTarget.charAt(0).toUpperCase();
  const rect = chip.getBoundingClientRect();
  let top = rect.bottom + 8;
  let left = rect.left;
  if (top + 320 > window.innerHeight) top = rect.top - 320;
  if (top < 8) top = 8;
  if (left + 210 > window.innerWidth) left = window.innerWidth - 218;
  if (left < 8) left = 8;
  menu.style.top = top + 'px';
  menu.style.left = left + 'px';
  overlay.classList.add('open');
  menu.classList.add('open');
}
function closePlayerMenu() {
  document.getElementById('pmOverlay').classList.remove('open');
  document.getElementById('playerMenu').classList.remove('open');
  pmTarget = null;
}
function pmAction(type) {
  const name = pmTarget;
  closePlayerMenu();
  switch(type) {
    case 'profile': openProfileModal(name); break;
    case 'message': openMessageModal(name); break;
    case 'call': startCallUI(name, false); break;
    case 'video': startCallUI(name, true); break;
    case 'voicemsg': openVoiceRecorder(name); break;
    case 'money': openSendMoney(name); break;
    case 'friend': addFriend(name); break;
    case 'block': blockPlayer(name); break;
  }
}
function addFriend(name) {
  const token = localStorage.getItem('casinoToken');
  if (!token) { alert('Bitte zuerst anmelden!'); return; }
  fetch('/api/friends/request', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ targetUsername: name.replace(' 🤖','') })
  }).then(r => r.json()).then(d => {
    alert(d.error || 'Freundschaftsanfrage an ' + name + ' gesendet! 👥');
  }).catch(() => alert('Fehler beim Senden'));
}
function blockPlayer(name) {
  const cleanName = name.replace(' 🤖','');
  let blocked = JSON.parse(localStorage.getItem('blockedPlayers') || '[]');
  if (blocked.includes(cleanName)) {
    blocked = blocked.filter(n => n !== cleanName);
    localStorage.setItem('blockedPlayers', JSON.stringify(blocked));
    alert(cleanName + ' wurde entblockt.');
  } else {
    blocked.push(cleanName);
    localStorage.setItem('blockedPlayers', JSON.stringify(blocked));
    alert(cleanName + ' wurde blockiert. 🚫');
  }
}

function createActionModal(title, content, onClose) {
  const old = document.getElementById('actionModal');
  if (old) old.remove();
  const overlay = document.createElement('div');
  overlay.id = 'actionModal';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center';
  const modal = document.createElement('div');
  modal.style.cssText = 'background:linear-gradient(165deg,rgba(30,18,8,.97),rgba(15,8,3,.98));border:1.5px solid rgba(212,175,55,.3);border-radius:16px;padding:20px;min-width:280px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.7),0 0 20px rgba(212,175,55,.1);color:#F0E6D3;font-family:Playfair Display,serif';
  modal.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:16px;font-weight:700;color:#F4D03F">${title}</div>
    <button onclick="closeActionModal()" style="background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px">✕</button>
  </div>${content}`;
  overlay.appendChild(modal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeActionModal(); });
  document.body.appendChild(overlay);
  overlay._onClose = onClose;
  return modal;
}
function closeActionModal() {
  const m = document.getElementById('actionModal');
  if (m) { if (m._onClose) m._onClose(); m.remove(); }
}

function openProfileModal(name) {
  const hash = [...name].reduce((h,c) => ((h<<5)-h)+c.charCodeAt(0), 0);
  const level = Math.abs(hash % 20) + 1;
  const wins = Math.abs((hash*7) % 150);
  const games = wins + Math.abs((hash*3) % 200);
  const winRate = games > 0 ? Math.round(wins/games*100) : 0;
  const rank = level > 15 ? 'Diamant' : level > 10 ? 'Gold' : level > 5 ? 'Silber' : 'Bronze';
  const rankColor = level > 15 ? '#b9f2ff' : level > 10 ? '#F4D03F' : level > 5 ? '#c0c0c0' : '#cd7f32';
  createActionModal('👤 Spielerprofil', `
    <div style="text-align:center;margin-bottom:14px">
      <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#2c1810,#1a0f08);border:3px solid ${rankColor};margin:0 auto 8px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 16px ${rankColor}44"><img src="${bjBotAvatar(name)}" style="width:100%;height:100%;border-radius:50%"></div>
      <div style="font-size:18px;font-weight:900;color:#F4D03F">${name}</div>
      <div style="font-size:12px;color:${rankColor};margin-top:2px">⭐ ${rank} · Level ${level}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div style="background:rgba(255,255,255,.05);border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:900;color:#F4D03F">${games}</div><div style="font-size:10px;color:rgba(240,230,211,.4)">Spiele</div></div>
      <div style="background:rgba(255,255,255,.05);border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:900;color:#2ecc71">${winRate}%</div><div style="font-size:10px;color:rgba(240,230,211,.4)">Gewinnrate</div></div>

function statusMap(s) {
  return {win:'Gewonnen!',lose:'Verloren',bust:'Überkauft!',push:'Unentschieden',blackjack:'BLACKJACK!',betting:'Wettet...',ready:'Bereit',playing:'Am Zug',stand:'Stand',spectating:'Zuschauer'}[s] || s;
}
function phaseMap(p) {
  return {waiting:'Wartet...',betting:'Einsätze',playing:'Karten',dealer:'Dealer zieht',payout:'Auszahlung'}[p] || p;
}

// ═══════ CONTROLS ═══════
function renderControls(state) {
  const ctrl = document.getElementById('controls');
  const meInGame = state.seats.some(s => s && s.isYou);

  if (!meInGame) {
    ctrl.classList.add('hidden');
    return;
  }
  ctrl.classList.remove('hidden');

  if (state.phase === 'betting') {
    const me = state.seats.find(s => s && s.isYou);
    if (me && me.status === 'ready') {
      ctrl.innerHTML = `<div style="color:#4d4;font-size:18px;font-weight:700">
        ✅ Einsatz: ${selectedBet.toLocaleString('de-DE')} ₿<br>
        <span style="font-size:13px;font-weight:400;color:rgba(240,230,211,.5)">Warte auf andere Spieler...</span>
      </div>`;
    } else {
      ctrl.innerHTML = `
        <div class="bet-row">
          ${[50,100,500,1000,5000,10000].map(b =>
            `<button class="btn btn-bet${selectedBet===b?' selected':''}" onclick="selectedBet=${b};renderControls(myState)">${b>=1000?(b/1000)+'K':b}</button>`
          ).join('')}
        </div>
        <button class="btn bet-confirm" onclick="placeBet()">Setzen: ${selectedBet.toLocaleString('de-DE')} ₿</button>
      `;
    }
    startTimer(15000);

  } else if (state.phase === 'playing' && state.currentSeat >= 0) {
    const cp = state.seats[state.currentSeat];
    if (cp && cp.isYou) {
      BJSFX.yourTurn();
      const canDouble = cp.cards.length === 2;
      ctrl.innerHTML = `
        <div class="action-row">
          <button class="btn btn-hit" onclick="doHit()">🃏 Karte</button>
          <button class="btn btn-stand" onclick="doStand()">✋ Halten</button>
          <button class="btn btn-double" onclick="doDouble()" ${canDouble?'':'disabled'}>×2 Verdoppeln</button>
        </div>
      `;
      startTimer(30000);
    } else {
      ctrl.innerHTML = `<div style="color:rgba(240,230,211,.5);font-size:14px">
        ${cp?.username || '?'} ist am Zug...
      </div>`;
    }

  } else if (state.phase === 'payout' || state.phase === 'dealer') {
    const me = state.seats.find(s => s && s.isYou);
    if (me) {
      if (me.status === 'blackjack') {
        BJSFX.blackjack();
        showWinner('BLACKJACK!', '21 mit 2 Karten', me.payout);
      } else if (me.status === 'win') {
        BJSFX.win();
        showWinner('Gewonnen!', '', me.payout);
      } else if (me.status === 'push') {
        ctrl.innerHTML = `<div style="color:#dd4;font-size:20px;font-weight:700">Unentschieden – Einsatz zurück</div>`;
      } else if (me.status === 'bust') {
        BJSFX.bust();
        ctrl.innerHTML = `<div style="color:#d44;font-size:20px;font-weight:700">Überkauft!</div>`;
      } else {
        BJSFX.lose();
        ctrl.innerHTML = `<div style="color:#d44;font-size:18px">${statusMap(me.status)}</div>`;
      }
    } else {
      ctrl.innerHTML = `<div style="color:rgba(240,230,211,.5)">Nächste Runde startet gleich...</div>`;
    }
    clearInterval(timerInterval);
    document.getElementById('timerFill').style.width = '0%';

  } else {
    ctrl.innerHTML = '<div style="color:rgba(240,230,211,.5);font-size:14px">Warte auf nächste Runde...</div>';
    clearInterval(timerInterval);
  }
}

// ═══════ ACTIONS ═══════
function joinSeat(seat) {
  socket.emit('bj:join', { tableId, seat });
}

function autoJoinSeat() {
  const seats = document.querySelectorAll('.seat');
  for (let i = 0; i < seats.length; i++) {
    if (seats[i].classList.contains('empty')) {
      joinSeat(i);
      return;
    }
  }
}

function placeBet() {
  BJSFX.chipBet();
  socket.emit('bj:bet', { amount: selectedBet });
}

function doHit() {
  BJSFX.cardDeal();
  socket.emit('bj:hit');
}

function doStand() {
  socket.emit('bj:stand');
}

function doDouble() {
  BJSFX.chipBet();
  socket.emit('bj:double');
}

function sendChat() {
  const inp = document.getElementById('chatInput');
  const msg = inp.value.trim();
  if (!msg) return;
  socket.emit('chat:msg', { msg, room: 'bj-' + tableId });
  inp.value = '';
}

// ═══════ VIDEO CHAT (via /js/rtc.js module) ═══════
let vcOpen = false;

let globalMuted = false;
let globalVolume = parseInt(localStorage.getItem('game-volume') || '100');
function toggleMuteAll() {
  globalMuted = !globalMuted;
  document.getElementById('btnMute').textContent = globalMuted ? '🔇' : '🔊';
  document.getElementById('btnMute').classList.toggle('active', globalMuted);
  document.querySelectorAll('audio,video').forEach(el => { el.muted = globalMuted; });
  if (typeof BJSFX !== 'undefined' && BJSFX.ctx) { globalMuted ? BJSFX.ctx.suspend() : BJSFX.ctx.resume(); }
}
function setGameVolume(val) {
  globalVolume = parseInt(val);
  localStorage.setItem('game-volume', String(globalVolume));
  document.querySelectorAll('audio,video').forEach(el => { el.volume = globalVolume / 100; });
}
document.getElementById('volumeSlider').value = globalVolume;

function toggleVC() {
  vcOpen = !vcOpen;
  document.getElementById('vcControls').classList.toggle('open', vcOpen);
}

// ═══════ BOTS ═══════
let botsActive = false;
function toggleBots(on) {
  botsActive = on;
  if (on) {
    // Add 1-3 bots (max 3)
    const count = 1 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      setTimeout(() => socket.emit('bj:addBot', { tableId }), i * 500);
    }
  } else {
    socket.emit('bj:removeBots', { tableId });
  }
}

// ═══════ SOCKET EVENTS ═══════
socket.on('connect', () => {
  socket.emit('bj:join', { tableId, seat: -1 });
  document.getElementById('tableInfo').textContent = 'Verbunden!';
  // Bots automatisch starten
  if (document.getElementById('botToggle').checked) {
    setTimeout(() => toggleBots(true), 1000);
  }
  // Voice Chat: RTC initialisieren
  RTC.init(socket, 'bj');
  if (!isEmbed) {
    document.addEventListener('click', async function bjAutoMic() {
      if (RTC.stream) { document.removeEventListener('click', bjAutoMic); return; }
      await RTC.startMedia();
      if (RTC.stream) {
        document.removeEventListener('click', bjAutoMic);
        // myState.seats enthält die Spieler
        if (myState && myState.seats) {
          RTC.connectToAll(myState.seats, socket.id);
        }
      }
    });
  }
});

socket.on('bj:state', renderState);
socket.on('baxt:update', function(d) {
  if (window._baxt) window._baxt.refresh();
  try { if (window.top && window.top._baxt) window.top._baxt.refresh(); } catch(e) {}
});

socket.on('bj:playerJoined', d => {
  if (window.playDoorSound) window.playDoorSound();
  showPhase(d.username + ' setzt sich!');
  BJSFX.play(660, 'sine', 0.15, 0.08);
  setTimeout(() => BJSFX.play(880, 'sine', 0.15, 0.08), 100);
});

socket.on('bj:playerLeft', d => {
  if (window.playDoorSound) window.playDoorSound();
  showPhase(d.username + ' geht...');
  BJSFX.play(440, 'sine', 0.15, 0.08);
  setTimeout(() => BJSFX.play(330, 'sine', 0.2, 0.08), 100);
});

socket.on('bj:results', d => {
  console.log('Results:', d);
});

socket.on('chat:msg', d => {
  const box = document.getElementById('chatBox');
  const msgEl = document.createElement('div');
  msgEl.className = 'chat-msg';
  msgEl.innerHTML = `<span class="name">${d.username}:</span> ${d.msg}`;
  box.insertBefore(msgEl, box.querySelector('.chat-input-row'));
  box.scrollTop = box.scrollHeight;
  showSpeechBubble(d.username, d.msg);
});

// ═══════ SPEECH BUBBLES (overlay-based, survives re-render) ═══════
const _activeBubbles = {}; // name -> { text, timer, created }

function showSpeechBubble(name, text) {
  const clean = name.replace(' 🤖','');
  // Clear old timer
  if (_activeBubbles[clean]?.timer) clearTimeout(_activeBubbles[clean].timer);
  _activeBubbles[clean] = { text, created: Date.now() };
  _renderBubbles();
  _activeBubbles[clean].timer = setTimeout(() => {
    delete _activeBubbles[clean];
    _renderBubbles();
  }, 4500);
}

function _renderBubbles() {
  // Ensure overlay container exists
  let overlay = document.getElementById('bubble-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'bubble-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:10000;';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = '';
  for (const [name, data] of Object.entries(_activeBubbles)) {
    // Find seat avatar element (preferred) or p-chip
    let el = null;
    document.querySelectorAll('.seat').forEach(s => {
      const n = s.querySelector('.seat-name');
      if (n && n.textContent.includes(name)) el = s.querySelector('.seat-avatar') || s;
    });
    if (!el) el = document.querySelector(`.p-chip[data-name="${name}"]`);
    if (!el) continue;
    const rect = el.getBoundingClientRect();
    const bubble = document.createElement('div');
    bubble.textContent = data.text;
    // Clamp position to viewport
    const bx = Math.max(60, Math.min(window.innerWidth - 60, rect.left + rect.width/2));
    const by = Math.max(50, Math.min(window.innerHeight - 80, rect.top - 6));
    bubble.style.cssText = `position:fixed;left:${bx}px;top:${by}px;transform:translate(-50%,-100%);background:rgba(26,26,46,.92);color:rgba(240,230,211,.9);padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.3;white-space:normal;text-align:center;max-width:220px;overflow:hidden;text-overflow:ellipsis;border:1px solid rgba(212,175,55,.35);box-shadow:0 4px 12px rgba(0,0,0,.5);z-index:10000;pointer-events:none;backdrop-filter:blur(4px);`;
    overlay.appendChild(bubble);
  }
}

// ═══════ BOT CHAT ═══════
const BJ_BOT_CHAT = {
  idle: [
    'Heute ist mein Glückstag!','Noch eine Runde!','Wer wagt, gewinnt!',
    'Ich spüre es, diesmal!','Kommt schon, Karten!','Das wird mein Abend!',
    'Blackjack Vibes! 🎰','Auf geht\'s!','Wer braucht Schlaf?'
  ],
  win: [
    'JAAAA! 🎉','Gewonnen, Baby!','Ich wusste es!','Danke, Dealer! 😎',
    'So muss das!','Haha, leichtes Spiel!','$$$ Cha-Ching! $$$'
  ],
  lose: [
    'Nächstes Mal...','Uff, das tat weh 😅','Nein nein nein!',
    'Der Dealer ist gemein!','Karma kommt zurück...','Das zählt nicht!'
  ],
  bust: [
    'BUST! 💀','Zu gierig gewesen...','Hätte stehen bleiben sollen!',
    'Verdammt! Eins zu viel!','RIP meine Chips 😭'
  ],
  blackjack: [
    'BLACKJACK! 🔥🔥🔥','21! Perfekt!','DAS ist das Gefühl!',
    'Boom! Blackjack, Baby!'
  ]
};
let bjBotChatInterval = null;

function startBJBotChat() {
  if (bjBotChatInterval) clearInterval(bjBotChatInterval);
  bjBotChatInterval = setInterval(() => {
    if (!myState || !myState.seats) return;
    const bots = myState.seats.filter(s => s && s.isBot);
    if (bots.length === 0 || Math.random() > 0.35) return;
    const bot = bots[Math.floor(Math.random() * bots.length)];
    let pool = BJ_BOT_CHAT.idle;
    if (bot.status === 'win' || bot.status === 'blackjack') pool = BJ_BOT_CHAT.win;
    else if (bot.status === 'lose') pool = BJ_BOT_CHAT.lose;
    else if (bot.status === 'bust') pool = BJ_BOT_CHAT.bust;
    showSpeechBubble(bot.username, pool[Math.floor(Math.random() * pool.length)]);
  }, 6000 + Math.random() * 10000);
}
startBJBotChat();

socket.on('error', msg => {
  showPhase(msg);
});

// Prevent double-tap zoom
document.addEventListener('dblclick', e => e.preventDefault());

// Keyboard shortcut for hit/stand
document.addEventListener('keydown', e => {
  if (currentPhase !== 'playing' || mySeat < 0) return;
  const me = myState?.seats?.[myState.currentSeat];
  if (!me || !me.isYou) return;
  if (e.key === 'h' || e.key === 'H') doHit();
  if (e.key === 's' || e.key === 'S') doStand();
  if ((e.key === 'd' || e.key === 'D') && me.cards.length === 2) doDouble();
});

// ═══════ EMBED AUDIO CONTROL ═══════
if (location.search.includes('embed=1')) {
  // Embed: UI-Elemente ausblenden
  document.querySelector('.chat-toggle').style.display = 'none';
  document.getElementById('chatBox').style.display = 'none';
  document.querySelector('.bot-controls').style.display = 'none';
  var vcFabEl = document.getElementById('vcFab');
  if (vcFabEl) vcFabEl.style.display = 'none';
  // Im Embed standardmäßig stumm — Lobby schaltet Sound per postMessage ein
  BJSFX._embedMuted = true;
  const origPlay = BJSFX.play.bind(BJSFX);
  BJSFX.play = function(...args) { if (!this._embedMuted) origPlay(...args); };
  const origDeal = BJSFX.cardDeal.bind(BJSFX);
  BJSFX.cardDeal = function() { if (!this._embedMuted) origDeal(); };
  const origBJ = BJSFX.blackjack.bind(BJSFX);
  BJSFX.blackjack = function() { if (!this._embedMuted) origBJ(); };
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'embedAudioOn') BJSFX._embedMuted = false;
    else if (e.data && e.data.type === 'embedAudioOff') BJSFX._embedMuted = true;
  });
}
