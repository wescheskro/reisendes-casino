<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reisendes Casino">
<meta name="theme-color" content="#0a0a05">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/games/img/icon-192.png">
<title>Poker – Reisendes Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;background:#0a0a05;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
body{font-family:'Playfair Display',serif;color:#F0E6D3;user-select:none;-webkit-user-select:none;touch-action:manipulation;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

/* ============ WOHNWAGEN BACKGROUND ============ */
.wagen-bg{
  position:fixed;inset:0;z-index:0;
  background:url('/games/img/poker-bg.png') center center / cover no-repeat;
}
.wagen-bg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 55%, rgba(0,0,0,.15) 0%, rgba(0,0,0,.5) 60%, rgba(0,0,0,.75) 100%);
}


/* ============ TOP BAR ============ */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:calc(env(safe-area-inset-top, 0px) + 8px) calc(env(safe-area-inset-right, 0px) + 16px) 8px calc(env(safe-area-inset-left, 0px) + 16px);
  background:linear-gradient(180deg,rgba(30,18,8,.95),rgba(30,18,8,.6));
  border-bottom:1px solid rgba(212,175,55,.15);
}
.top-bar .logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:#D4AF37}
.top-bar .back{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);color:#D4AF37;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;transition:.2s;min-height:44px;min-width:44px;display:flex;align-items:center}
.top-bar .back:hover{background:rgba(212,175,55,.2)}
.top-bar .info{font-size:12px;color:rgba(240,230,211,.5)}

/* ============ POT & COMMUNITY ============ */
.community-area{
  position:fixed;top:54%;left:50%;transform:translate(-50%,-50%);
  text-align:center;z-index:10;
  width:100%;
  padding:0 8px;
  box-sizing:border-box;
}
.pot-display{
  font-size:18px;color:#F4D03F;margin-bottom:12px;
  background:rgba(20,10,5,.75);padding:8px 28px;border-radius:24px;
  display:inline-block;border:1px solid rgba(212,175,55,.3);
  backdrop-filter:blur(4px);
}
.pot-display .amount{font-size:32px;font-weight:900}
.community-cards{
  display:flex;gap:6px;justify-content:center;
  min-height:100px;align-items:center;
  width:100%;
}
.phase-label{font-size:12px;color:rgba(240,230,211,.4);margin-top:10px;text-transform:uppercase;letter-spacing:3px}

/* ============ CARDS (Community / Flop – volle Breite) ============ */
.card{
  flex:1;
  max-width:80px;height:auto;aspect-ratio:5/7;
  border-radius:8px;
  background:linear-gradient(165deg,#ffffff 0%,#f9f7f2 30%,#f0ece3 70%,#e8e2d6 100%);
  color:#1a1a2e;
  font-weight:900;
  box-shadow:0 4px 14px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.5) inset,0 -1px 0 rgba(0,0,0,.08) inset;
  transition:transform .3s;
  position:relative;
  overflow:hidden;
  border:1.5px solid rgba(180,170,150,.35);
}
/* Inner card pattern – subtle linen texture */
.card::before{
  content:'';position:absolute;inset:3px;border-radius:5px;
  border:1px solid rgba(150,140,120,.12);
  pointer-events:none;z-index:1;
}
/* Corner index – top left */
.card .corner-tl{
  position:absolute;top:3px;left:4px;
  display:flex;flex-direction:column;align-items:center;
  line-height:1;z-index:2;
}
.card .corner-tl .c-rank{font-size:13px;font-weight:800;font-family:'Playfair Display',serif}
.card .corner-tl .c-suit{font-size:10px;line-height:1}
/* Corner index – bottom right (rotated) */
.card .corner-br{
  position:absolute;bottom:3px;right:4px;
  display:flex;flex-direction:column;align-items:center;
  line-height:1;z-index:2;
  transform:rotate(180deg);
}
.card .corner-br .c-rank{font-size:13px;font-weight:800;font-family:'Playfair Display',serif}
.card .corner-br .c-suit{font-size:10px;line-height:1}
/* Center suit – big */
.card .center-suit{
  font-size:clamp(24px,4vw,36px);
  z-index:2;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.08));
}
.card.red{color:#c0392b}
.card.black{color:#1a1a2e}
.card.hidden{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:2px solid rgba(212,175,55,.5);
  color:transparent;font-size:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.card.hidden::before{display:none}
.card.hidden .card-back-design{display:none}
.card.empty-slot{
  background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.08);
  box-shadow:none;
}
.card.empty-slot::before{display:none}

/* ============ SEATS (oberer Bereich, ÜBER dem Pot) ============ */
.seats-container{
  position:fixed;inset:0;z-index:12;pointer-events:none;
}
.seat{
  position:absolute;pointer-events:all;
  width:clamp(70px,15vw,105px);
  text-align:center;cursor:pointer;transition:.2s;
  transform:translate(-50%,-50%);
}
/* Gegner – mittig zwischen Top-Bar und Pot */
.seat[data-pos="0"]{top:34%;left:10%}
.seat[data-pos="1"]{top:29%;left:30%}
.seat[data-pos="2"]{top:27%;left:50%}
.seat[data-pos="3"]{top:29%;left:70%}
.seat[data-pos="4"]{top:34%;left:90%}
.seat[data-pos="5"]{top:31%;left:50%}
/* Eigener Sitz: komplett ausblenden (große Hand-Anzeige unten übernimmt) */
.seat.you{display:none!important}

.seat-inner{
  background:rgba(20,10,5,.85);border-radius:8px;padding:4px 3px 5px;
  border:2px solid rgba(212,175,55,.12);transition:.3s;
  backdrop-filter:blur(4px);
}
.seat.active .seat-inner{
  border-color:#F4D03F;
  box-shadow:0 0 16px rgba(244,208,63,.35),0 0 6px rgba(244,208,63,.2) inset;
  animation:pulse-glow 1.5s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 16px rgba(244,208,63,.35)}
  50%{box-shadow:0 0 28px rgba(244,208,63,.5)}
}
.seat.folded .seat-inner{opacity:.3;filter:grayscale(.5)}

.seat-cards{display:flex;gap:2px;justify-content:center;min-height:36px;align-items:center}
.seat-cards .card{
  width:28px !important;height:40px !important;
  flex:0 0 28px !important;aspect-ratio:auto !important;max-width:none !important;
  border-radius:4px;font-size:9px;
  box-shadow:0 2px 6px rgba(0,0,0,.4) !important;
}
.seat-cards .card .corner-tl{top:2px;left:2px}
.seat-cards .card .corner-tl .c-rank{font-size:8px}
.seat-cards .card .corner-tl .c-suit{font-size:5px}
.seat-cards .card .corner-br{display:none}
.seat-cards .card .center-suit{font-size:13px}
.seat-cards .card::before{inset:1px;border-radius:3px}

.seat-name{
  font-size:9px;color:#D4AF37;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:100%;line-height:1.1;
}
.seat.you .seat-name{color:#F4D03F;font-weight:700}
.seat-chips{font-size:8px;color:rgba(240,230,211,.55)}
.seat-bet-bubble{
  font-size:8px;color:#F4D03F;
  background:rgba(0,0,0,.65);padding:1px 6px;border-radius:8px;
  display:inline-block;margin-top:1px;
  border:1px solid rgba(212,175,55,.15);
}
.seat-hand{font-size:8px;font-weight:700;color:#4d4;margin-top:1px}
.dealer-chip{
  position:absolute;top:-6px;right:-6px;
  width:18px;height:18px;border-radius:50%;
  background:linear-gradient(135deg,#D4AF37,#F4D03F);color:#000;
  font-size:9px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
  border:1.5px solid rgba(139,105,20,.6);
}

/* EMPTY SEAT */
.seat.empty .seat-inner{opacity:.2}
.seat.empty:hover .seat-inner{opacity:.55;border-color:rgba(212,175,55,.3)}
.seat.empty .seat-cards{display:flex;align-items:center;justify-content:center}
.seat.empty .seat-cards::after{
  content:'+';font-size:14px;color:rgba(212,175,55,.25);
  width:26px;height:36px;border:2px dashed rgba(212,175,55,.15);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
}

/* ============ MEINE HAND (große Karten-Anzeige) ============ */
.my-hand{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:99;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:12px;
  pointer-events:none;
  padding:0 20px;
  opacity:0;
  transform:translateY(80px);
  transition:opacity .4s ease, transform .4s ease;
}
.my-hand.visible{
  opacity:1;
  transform:translateY(0);
}
/* 3D Flip Container */
.my-hand .hand-card-wrap{
  width:95px;height:135px;
  perspective:600px;
  pointer-events:auto;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.my-hand .hand-card-wrap:nth-child(1){
  transform:rotate(-6deg) translateY(-8px);
}
.my-hand .hand-card-wrap:nth-child(2){
  transform:rotate(6deg) translateY(-8px);
}
.my-hand .hand-card-inner{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .5s ease;
}
.my-hand .hand-card-wrap.flipped .hand-card-inner{
  transform:rotateY(180deg);
}
/* Shared face/back styles */
.my-hand .hand-card-face,
.my-hand .hand-card-back{
  position:absolute;top:0;left:0;width:100%;height:100%;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:10px;
  overflow:hidden;
}
/* FRONT (card face) */
.my-hand .hand-card-face{
  background:linear-gradient(165deg,#ffffff 0%,#f9f7f2 30%,#f0ece3 70%,#e8e2d6 100%);
  color:#1a1a2e;
  font-weight:900;
  box-shadow:0 10px 35px rgba(0,0,0,.7),0 0 0 2px rgba(255,255,255,.2),0 0 25px rgba(244,208,63,.2);
  border:2px solid rgba(212,175,55,.45);
}
/* Inner border like real playing cards */
.my-hand .hand-card-face::before{
  content:'';position:absolute;inset:5px;border-radius:6px;
  border:1px solid rgba(150,140,120,.15);
  pointer-events:none;z-index:1;
}
.my-hand .hand-card-face.red{color:#c0392b}
/* BACK (face-down) */
.my-hand .hand-card-back{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:2px solid rgba(212,175,55,.5);
  box-shadow:0 10px 35px rgba(0,0,0,.7),0 0 0 2px rgba(255,255,255,.2);
  transform:rotateY(180deg);
}
/* Corner top-left */
.my-hand .hand-card-face .h-corner-tl{
  position:absolute;top:6px;left:8px;
  display:flex;flex-direction:column;align-items:center;
  line-height:1;z-index:2;
}
.my-hand .hand-card-face .h-corner-tl .hc-rank{
  font-size:22px;font-weight:900;line-height:1;
  font-family:'Playfair Display',serif;
}
.my-hand .hand-card-face .h-corner-tl .hc-suit{font-size:16px;line-height:1;margin-top:-1px}
/* Corner bottom-right (upside down) */
.my-hand .hand-card-face .h-corner-br{
  position:absolute;bottom:6px;right:8px;
  display:flex;flex-direction:column;align-items:center;
  line-height:1;z-index:2;
  transform:rotate(180deg);
}
.my-hand .hand-card-face .h-corner-br .hc-rank{
  font-size:22px;font-weight:900;line-height:1;
  font-family:'Playfair Display',serif;
}
.my-hand .hand-card-face .h-corner-br .hc-suit{font-size:16px;line-height:1;margin-top:-1px}
/* Center suit – hero */
.my-hand .hand-card-face .h-center-suit{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:46px;z-index:2;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.1));
}

/* Chips-Info neben den Karten */
.my-hand .hand-info{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:4px;
  align-self:center;
  pointer-events:none;
}
.my-hand .hand-chips{
  font-size:14px;font-weight:700;color:#F4D03F;
  background:rgba(0,0,0,.6);padding:4px 12px;border-radius:10px;
  border:1px solid rgba(212,175,55,.2);
  white-space:nowrap;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
.my-hand .hand-bet{
  font-size:11px;color:rgba(244,208,63,.7);
  white-space:nowrap;
}

/* Hand-Label (zeigt "Deine Hand" oder Handname) */
.my-hand-label{
  position:fixed;
  z-index:99;
  left:50%;transform:translateX(-50%);
  font-size:11px;
  color:rgba(244,208,63,.7);
  text-transform:uppercase;
  letter-spacing:2px;
  font-weight:700;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
  opacity:0;
  transition:opacity .4s;
  pointer-events:none;
}
.my-hand-label.visible{opacity:1}

/* Mobile: Hand sitzt direkt über Controls */
@media(max-width:600px){
  .my-hand .hand-card-wrap{width:76px;height:110px}
  .my-hand .hand-card-face .h-corner-tl .hc-rank{font-size:18px}
  .my-hand .hand-card-face .h-corner-tl .hc-suit{font-size:13px}
  .my-hand .hand-card-face .h-corner-br .hc-rank{font-size:18px}
  .my-hand .hand-card-face .h-corner-br .hc-suit{font-size:13px}
  .my-hand .hand-card-face .h-center-suit{font-size:38px}
  .my-hand{gap:8px}
}
@media(max-width:375px){
  .my-hand .hand-card-wrap{width:64px;height:92px}
  .my-hand .hand-card-face .h-corner-tl .hc-rank{font-size:15px}
  .my-hand .hand-card-face .h-corner-tl .hc-suit{font-size:11px}
  .my-hand .hand-card-face .h-corner-br .hc-rank{font-size:15px}
  .my-hand .hand-card-face .h-corner-br .hc-suit{font-size:11px}
  .my-hand .hand-card-face .h-center-suit{font-size:30px}
  .my-hand{gap:6px}
}
@media(max-height:450px) and (orientation:landscape){
  .my-hand .hand-card-wrap{width:58px;height:84px}
  .my-hand .hand-card-face .h-corner-tl .hc-rank{font-size:14px}
  .my-hand .hand-card-face .h-corner-tl .hc-suit{font-size:10px}
  .my-hand .hand-card-face .h-corner-br{display:none}
  .my-hand .hand-card-face .h-center-suit{font-size:26px}
  .my-hand{gap:6px}
}

/* ============ NIMM PLATZ EIN ============ */
.take-seat-area{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:100;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:30px 20px calc(env(safe-area-inset-bottom, 20px) + 30px);
  background:linear-gradient(180deg,transparent 0%,rgba(10,5,2,.85) 30%,rgba(10,5,2,.97) 100%);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .4s, transform .4s;
}
.take-seat-area.hidden{
  opacity:0;
  pointer-events:none;
  transform:translateY(40px);
}
.take-seat-icon{
  font-size:48px;
  margin-bottom:10px;
  animation:seat-bounce 2s ease-in-out infinite;
}
@keyframes seat-bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.take-seat-text{
  font-family:'Playfair Display',serif;
  font-size:26px;
  font-weight:900;
  background:linear-gradient(135deg,#D4AF37,#F4D03F,#D4AF37);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:2px;
  text-transform:uppercase;
  text-align:center;
}
.take-seat-sub{
  font-size:13px;
  color:rgba(240,230,211,.45);
  margin-top:6px;
  letter-spacing:1px;
  animation:seat-pulse 2s ease-in-out infinite;
}
@keyframes seat-pulse{
  0%,100%{opacity:.4}
  50%{opacity:.8}
}

@media(max-width:600px){
  .take-seat-text{font-size:22px}
  .take-seat-icon{font-size:40px}
  .take-seat-area{padding:24px 16px calc(env(safe-area-inset-bottom, 16px) + 24px)}
}
@media(max-width:375px){
  .take-seat-text{font-size:19px}
  .take-seat-icon{font-size:36px}
}

/* ============ CONTROLS ============ */
.controls{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,rgba(20,10,5,.5),rgba(20,10,5,.95));
  border-top:1px solid rgba(212,175,55,.1);
  padding:12px 16px calc(env(safe-area-inset-bottom, 8px) + 12px);
  display:flex;flex-direction:column;gap:10px;align-items:center;
}
.action-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center}
.btn{
  padding:12px 20px;border-radius:12px;font-family:inherit;font-weight:700;
  font-size:15px;cursor:pointer;transition:.2s;border:none;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
  min-height:44px;min-width:44px;
  -webkit-tap-highlight-color:transparent;
}
.btn-call{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
.btn-raise{background:linear-gradient(135deg,#f39c12,#d68910);color:#fff}
.btn-fold{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}
.btn-check{background:linear-gradient(135deg,#3498db,#2980b9);color:#fff}
.btn-allin{background:linear-gradient(135deg,#D4AF37,#F4D03F);color:#000}
.btn:hover{transform:scale(1.05)}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

.raise-slider{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.04);padding:6px 14px;border-radius:10px;
  border:1px solid rgba(212,175,55,.1);
}
.raise-slider input[type=range]{width:130px;accent-color:#D4AF37}
.raise-slider .raise-val{color:#F4D03F;font-weight:700;font-size:14px;min-width:65px;text-align:center}

/* ============ WINNER BANNER ============ */
.winner-banner{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:200;text-align:center;padding:24px 44px;
  background:linear-gradient(135deg,rgba(212,175,55,.95),rgba(244,208,63,.95));
  color:#000;border-radius:18px;
  font-size:24px;font-weight:900;
  box-shadow:0 0 80px rgba(212,175,55,.6),0 0 20px rgba(212,175,55,.3) inset;
  opacity:0;transition:opacity .5s;pointer-events:none;
}
.winner-banner.show{opacity:1}
.winner-banner .hand{font-size:15px;font-weight:400;margin-top:4px;color:rgba(0,0,0,.7)}
.winner-banner .pot{font-size:18px;font-weight:700;color:#1a5c2e;margin-top:2px}

/* ============ PHASE INFO ============ */
.phase-info{
  position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
  z-index:50;text-align:center;
  font-size:26px;font-weight:900;color:#F4D03F;
  text-shadow:0 0 30px rgba(244,208,63,.6),0 2px 4px rgba(0,0,0,.5);
  pointer-events:none;opacity:0;transition:opacity .5s;
}
.phase-info.show{opacity:1}

/* ============ CHAT ============ */
.chat-toggle{
  position:fixed;bottom:130px;right:10px;z-index:30;
  width:36px;height:36px;border-radius:50%;
  background:rgba(20,10,5,.7);border:1px solid rgba(212,175,55,.2);
  color:#D4AF37;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.chat-box{
  position:fixed;bottom:170px;right:8px;z-index:20;
  width:220px;max-height:140px;overflow-y:auto;
  background:rgba(20,10,5,.8);border-radius:10px;padding:8px;
  font-size:11px;color:rgba(240,230,211,.7);
  border:1px solid rgba(212,175,55,.1);
  backdrop-filter:blur(4px);
  display:none;
}
.chat-box.open{display:block}
.chat-msg{margin-bottom:3px}
.chat-msg .name{color:#D4AF37;font-weight:700}
.chat-input-row{
  display:flex;gap:4px;margin-top:6px;
}
.chat-input-row input{
  flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.15);

<script>
// iPhone: Prevent bounce scroll, double-tap zoom, pull-to-refresh
document.addEventListener('touchmove', function(e) {
  if (!e.target.closest('.chat-box, .video-grid, .raise-slider')) e.preventDefault();
}, { passive: false });

// Prevent iOS double-tap zoom on buttons
document.addEventListener('dblclick', function(e) { e.preventDefault(); });

// Fix iOS 100vh issue - use real viewport height
function setVH() {
  document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
}
setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', () => setTimeout(setVH, 100));

// VC-Menü ausklappen/einklappen
function toggleVcMenu() {
  const menu = document.getElementById('vcControls');
  menu.classList.toggle('open');
}
// Menü schließen wenn man woanders tippt
document.addEventListener('touchstart', function(e) {
  if (!e.target.closest('.vc-fab, .vc-controls, .vc-btn')) {
    document.getElementById('vcControls').classList.remove('open');
  }
});
</script>
<script src="/socket.io/socket.io.js"></script>
<script>
const token = localStorage.getItem('casinoToken');
const user = (() => { try { return JSON.parse(localStorage.getItem('casinoUser')); } catch(e) { return null; } })();

const socket = io({ auth: { token } });
const tableId = new URLSearchParams(location.search).get('table') || 'tisch-1';
let myState = null;
let mySeat = -1;
let currentPhase = 'waiting';
let raiseAmount = 200;
let turnTimer = null;
let turnTimerStart = 0;

// ===================== CARD RENDERING =====================
function renderCard(c) {
  if (c === '??' || !c) return '<div class="card hidden"><div class="card-back-design">♠</div></div>';
  const rank = c.slice(0, -1);
  const suit = c.slice(-1);
  const isRed = (suit === '♥' || suit === '♦');
  const cls = isRed ? ' red' : ' black';
  return `<div class="card${cls}">
    <div class="corner-tl"><span class="c-rank">${rank}</span><span class="c-suit">${suit}</span></div>
    <span class="center-suit">${suit}</span>
    <div class="corner-br"><span class="c-rank">${rank}</span><span class="c-suit">${suit}</span></div>
  </div>`;
}

function renderEmptyCard() {
  return '<div class="card empty-slot"></div>';
}

// ===================== TURN TIMER =====================
function startTurnTimer(seconds) {
  const bar = document.getElementById('timerBar');
  const fill = document.getElementById('timerFill');
  bar.style.display = 'block';
  fill.style.width = '100%';
  turnTimerStart = Date.now();
  if (turnTimer) clearInterval(turnTimer);
  turnTimer = setInterval(() => {
    const elapsed = (Date.now() - turnTimerStart) / 1000;
    const pct = Math.max(0, 100 - (elapsed / seconds * 100));
    fill.style.width = pct + '%';
    if (pct <= 0) { clearInterval(turnTimer); bar.style.display = 'none'; }
  }, 100);
}
function stopTurnTimer() {
  if (turnTimer) clearInterval(turnTimer);
  document.getElementById('timerBar').style.display = 'none';
}

// ===================== STATE RENDERING =====================
function renderState(state) {
  myState = state;
  const prevPhase = currentPhase;
  currentPhase = state.phase;

  // Phase change announcements
  if (prevPhase !== state.phase && state.phase !== 'waiting') {
    const announcements = { preflop:'Neue Runde!', flop:'Flop!', turn:'Turn!', river:'River!', showdown:'Aufdecken!' };
    if (announcements[state.phase]) showPhase(announcements[state.phase]);
  }

  // Pot
  document.getElementById('potAmount').textContent = state.pot.toLocaleString('de-DE');

  // Community cards with animation
  const cc = document.getElementById('communityCards');
  let communityHTML = '';
  for (let i = 0; i < 5; i++) {
    if (state.community && state.community[i]) {
      communityHTML += renderCard(state.community[i]);
    } else {
      communityHTML += renderEmptyCard();
    }
  }
  cc.innerHTML = communityHTML;

  // Phase label
  document.getElementById('phaseLabel').textContent = phaseMap(state.phase);

  // Seats
  const container = document.getElementById('seatsContainer');
  container.innerHTML = '';
  mySeat = -1;

  for (let i = 0; i < 6; i++) {
    const s = state.seats[i];
    const div = document.createElement('div');
    div.className = 'seat';
    div.setAttribute('data-pos', i);

    if (!s) {
      div.className += ' empty';
      div.innerHTML = `<div class="seat-inner">
        <div class="seat-cards"></div>
        <div class="seat-name">Freier Platz</div>
      </div>`;
      div.onclick = () => joinSeat(i);
    } else {
      if (s.isYou) { div.className += ' you'; mySeat = i; }
      if (state.currentSeat === i) div.className += ' active';
      if (s.folded) div.className += ' folded';

      const dealerChip = s.isDealer ? '<div class="dealer-chip">D</div>' : '';
      const betBubble = s.bet > 0 ? `<div class="seat-bet-bubble">${s.bet.toLocaleString('de-DE')}</div>` : '';
      const handName = s.handName ? `<div class="seat-hand">${s.handName}</div>` : '';
      const foldedLabel = s.folded ? '<div style="font-size:10px;color:#d44;margin-top:2px">Gepasst</div>' : '';
      const botBadge = s.isBot ? `<span class="bot-badge">KI</span>` : '';
      const botStyle = s.isBot && s.botStyle ? `<div class="bot-style-tag ${s.botStyle}">${s.botStyle}</div>` : '';

      div.innerHTML = `<div class="seat-inner" style="position:relative">
        ${dealerChip}
        <div class="seat-cards">${s.cards.map(renderCard).join('')}</div>
        <div class="seat-name">${s.username}${s.isYou ? ' (Du)' : ''}${botBadge}</div>
        <div class="seat-chips">💰 ${(s.chips || 0).toLocaleString('de-DE')}</div>
        ${botStyle}${betBubble}${handName}${foldedLabel}
      </div>`;
    }
    container.appendChild(div);
  }

  // Timer for active turn
  const isMyTurn = state.currentSeat >= 0 && state.seats[state.currentSeat] && state.seats[state.currentSeat].isYou;
  if (isMyTurn && state.phase !== 'waiting' && state.phase !== 'showdown') {
    startTurnTimer(30);
  } else {
    stopTurnTimer();
  }

  // Table info
  const tischName = tableId.replace('tisch-', 'Tisch ');
  document.getElementById('tableInfo').textContent =
    `${tischName} · ${state.playerCount} Spieler · ${phaseMap(state.phase)}`;

  // Bot button visibility
  const hasBots = state.seats.some(s => s && s.isBot);
  const hasEmptySeat = state.seats.some(s => !s);
  document.getElementById('removeBotBtn').style.display = hasBots ? 'flex' : 'none';
  document.querySelector('.bot-controls .bot-btn:first-child').style.display = hasEmptySeat ? 'flex' : 'none';

  renderControls(state);
  updateMyHand(state);
}

// ===================== GROSSE HAND-ANZEIGE =====================
let lastHandCards = [null, null]; // Letzte bekannte Karten merken

function renderHandCard(c, index) {
  const hasCard = c && c !== '??';
  let faceHtml = '';
  let faceClass = 'hand-card-face';
  if (hasCard) {
    const rank = c.slice(0, -1);
    const suit = c.slice(-1);
    const isRed = (suit === '♥' || suit === '♦');
    if (isRed) faceClass += ' red';
    faceHtml = `<div class="h-corner-tl"><span class="hc-rank">${rank}</span><span class="hc-suit">${suit}</span></div>
      <span class="h-center-suit">${suit}</span>
      <div class="h-corner-br"><span class="hc-rank">${rank}</span><span class="hc-suit">${suit}</span></div>`;
  }
  // Wenn keine Karte: leere Vorderseite (wird eh nicht gezeigt da flipped)
  const startFlipped = !hasCard ? ' flipped' : '';
  return `<div class="hand-card-wrap${startFlipped}" data-card-idx="${index}" onclick="toggleCardFlip(this)">
    <div class="hand-card-inner">
      <div class="${faceClass}">${faceHtml}</div>
      <div class="hand-card-back"></div>
    </div>
  </div>`;
}

function toggleCardFlip(el) {
  el.classList.toggle('flipped');
}

function updateMyHand(state) {
  const handEl = document.getElementById('myHand');
  const labelEl = document.querySelector('.my-hand-label');
  const me = state.seats.find(s => s && s.isYou);

  // Keine echten Karten → komplett ausblenden
  const hasRealCards = me && me.cards && me.cards.length > 0 && !me.folded && state.phase !== 'waiting';
  if (!hasRealCards) {
    handEl.classList.remove('visible');
    if (labelEl) labelEl.classList.remove('visible');
    lastHandCards = [null, null];
    return;
  }

  handEl.classList.add('visible');
  const cards = me.cards;

  // Karten rendern
  let html = '';
  cards.forEach((c, i) => {
    html += renderHandCard(c, i);
  });

  // Chips-Info zwischen den Karten
  const chipsStr = (me.chips || 0).toLocaleString('de-DE');
  const betStr = me.bet > 0 ? `<div class="hand-bet">Einsatz: ${me.bet.toLocaleString('de-DE')}</div>` : '';
  html += `<div class="hand-info">
    <div class="hand-chips">💰 ${chipsStr}</div>
    ${betStr}
  </div>`;

  // Nur neu rendern wenn sich die Karten geändert haben (sonst geht Flip-State verloren)
  const cardStr = JSON.stringify(cards);
  const lastStr = JSON.stringify(lastHandCards);
  if (cardStr !== lastStr) {
    handEl.innerHTML = html;
    lastHandCards = [...cards];
  } else {
    // Nur Chips/Bet aktualisieren
    const infoEl = handEl.querySelector('.hand-info');
    if (infoEl) {
      infoEl.innerHTML = `<div class="hand-chips">💰 ${chipsStr}</div>${betStr}`;
    }
  }

  // Positionierung: über den Controls (mit rAF für korrektes Layout)
  requestAnimationFrame(() => {
    const controls = document.getElementById('controls');
    const controlsH = controls ? controls.offsetHeight : 90;
    handEl.style.bottom = (controlsH + 6) + 'px';

    // Label mit Handname wenn vorhanden
    if (labelEl) {
      const cardH = handEl.offsetHeight || 130;
      if (me.handName) {
        labelEl.textContent = me.handName;
        labelEl.classList.add('visible');
        labelEl.style.bottom = (controlsH + cardH + 14) + 'px';
      } else if (state.phase !== 'showdown') {
        labelEl.textContent = 'Deine Hand';
        labelEl.classList.add('visible');
        labelEl.style.bottom = (controlsH + cardH + 14) + 'px';
      } else {
        labelEl.classList.remove('visible');
      }
    }
  });
}

// ===================== CONTROLS =====================
function renderControls(state) {
  const ctrl = document.getElementById('controls');
  const takeSeat = document.getElementById('takeSeatArea');
  const meInGame = state.seats.some(s => s && s.isYou);

  if (!meInGame) {
    // "Nimm Platz ein" anzeigen, Controls verstecken
    takeSeat.classList.remove('hidden');
    ctrl.style.display = 'none';
    return;
  }

  // Spieler sitzt → "Nimm Platz" weg, Controls zeigen
  takeSeat.classList.add('hidden');
  ctrl.style.display = '';

  const me = state.seats.find(s => s && s.isYou);
  if (!me) return;

  if (state.phase === 'waiting') {
    ctrl.innerHTML = '<div style="color:rgba(240,230,211,.5);font-size:14px">⏳ Warte auf weitere Spieler...</div>';
    return;
  }

  if (state.phase === 'showdown') {
    const myHand = me.handName;
    if (myHand) {
      ctrl.innerHTML = `<div style="color:#F4D03F;font-size:16px;font-weight:700">Deine Hand: ${myHand}</div>
        <div style="color:rgba(240,230,211,.4);font-size:12px;margin-top:4px">Nächste Runde startet gleich...</div>`;
    } else {
      ctrl.innerHTML = '<div style="color:rgba(240,230,211,.5);font-size:14px">Nächste Runde startet gleich...</div>';
    }
    return;
  }

  if (me.folded) {
    ctrl.innerHTML = '<div style="color:rgba(240,230,211,.5);font-size:14px">Du hast gepasst. Warte auf nächste Runde...</div>';
    return;
  }

  const isMyTurn = state.currentSeat >= 0 && state.seats[state.currentSeat] && state.seats[state.currentSeat].isYou;

  if (!isMyTurn) {
    const current = state.currentSeat >= 0 && state.seats[state.currentSeat];
    const name = current ? current.username : '...';
    ctrl.innerHTML = `<div style="color:rgba(240,230,211,.5);font-size:14px">⏳ ${name} ist am Zug...</div>`;
    return;
  }

  // MY TURN
  const toCall = state.currentBet - (me.bet || 0);
  const canCheck = toCall <= 0;
  const myChips = me.chips || 0;
  const minRaise = Math.max(state.currentBet * 2, 200);
  if (raiseAmount < minRaise) raiseAmount = minRaise;
  if (raiseAmount > myChips) raiseAmount = myChips;

  let html = '<div class="action-row">';

  if (canCheck) {
    html += `<button class="btn btn-check" onclick="doCheck()">✓ Schieben</button>`;
  } else {
    const callAmt = Math.min(toCall, myChips);
    html += `<button class="btn btn-call" onclick="doCall()">📞 Mitgehen ${callAmt.toLocaleString('de-DE')}</button>`;
  }

  html += `<button class="btn btn-fold" onclick="doFold()">✕ Passen</button>`;

  if (myChips > toCall) {
    html += `<button class="btn btn-raise" onclick="doRaise()">⬆ Erhöhen</button>`;
  }

  if (myChips > 0) {
    html += `<button class="btn btn-allin" onclick="doAllIn()">🔥 Alles setzen (${myChips.toLocaleString('de-DE')})</button>`;
  }
  html += '</div>';

  // Erhöhen-Slider
  if (myChips > toCall) {
    const minR = Math.max(state.currentBet * 2, 200);
    const maxR = myChips;
    html += `<div class="raise-slider">
      <span style="font-size:11px;color:rgba(240,230,211,.35)">Erhöhen:</span>
      <input type="range" min="${minR}" max="${maxR}" step="100" value="${raiseAmount}"
        oninput="raiseAmount=parseInt(this.value);document.getElementById('raiseVal').textContent=raiseAmount.toLocaleString('de-DE')">
      <span class="raise-val" id="raiseVal">${raiseAmount.toLocaleString('de-DE')}</span>
    </div>`;
  }

  ctrl.innerHTML = html;
}

const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },

];

let localStream = null;
let vcActive = false;
let micEnabled = true;
let camEnabled = true;
const peers = {}; // peerId -> { pc, username, videoEl }

function setVcStatus(text) {

async function toggleVoiceChat() {
  if (vcActive) {
    leaveVoiceChat();
    return;
  }
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    vcActive = true;

    // Eigenes Video anzeigen
    addVideoTile('local', user?.username || 'Du', localStream, true);

    // Buttons aktualisieren
    document.getElementById('vcFab').classList.add('connected');
    document.getElementById('vcFab').textContent = '🟢';
    document.getElementById('vcJoinBtn').classList.add('active');
    document.getElementById('vcJoinBtn').textContent = '📵';
    document.getElementById('vcJoinBtn').title = 'Sprachchat verlassen';
    document.getElementById('vcMicBtn').classList.add('active');
    document.getElementById('vcCamBtn').classList.add('active');

    // Dem RTC-Raum beitreten
    socket.emit('rtc:join', { room: 'pk-' + tableId });
    setVcStatus('🟢 Sprachchat aktiv');
  } catch (err) {
    console.error('Kamera/Mikrofon Fehler:', err);
    setVcStatus('⚠️ Kein Zugriff auf Kamera/Mikrofon');

    // Nur Audio versuchen
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      vcActive = true;
      camEnabled = false;
      addVideoTile('local', user?.username || 'Du', localStream, true);
      document.getElementById('vcFab').classList.add('connected');
      document.getElementById('vcFab').textContent = '🟢';
      document.getElementById('vcJoinBtn').classList.add('active');
      document.getElementById('vcJoinBtn').textContent = '📵';
      document.getElementById('vcMicBtn').classList.add('active');
      document.getElementById('vcCamBtn').classList.add('muted');
      socket.emit('rtc:join', { room: 'pk-' + tableId });
      setVcStatus('🟢 Nur Sprache (keine Kamera)');
    } catch (err2) {
      setVcStatus('❌ Kein Mikrofon gefunden');
    }
  }
}

function leaveVoiceChat() {
  vcActive = false;
  socket.emit('rtc:leave');

  // Alle Peer-Verbindungen schließen
  for (const peerId of Object.keys(peers)) {
    removePeer(peerId);
  }

  // Eigenen Stream stoppen
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }

  // Video-Grid leeren
  document.getElementById('videoGrid').innerHTML = '';

  // Buttons zurücksetzen
  document.getElementById('vcFab').classList.remove('connected');
  document.getElementById('vcFab').textContent = '📞';
  document.getElementById('vcJoinBtn').classList.remove('active');
  document.getElementById('vcJoinBtn').textContent = '📞';
  document.getElementById('vcJoinBtn').title = 'Sprachchat beitreten';
  document.getElementById('vcMicBtn').classList.remove('active', 'muted');
  document.getElementById('vcCamBtn').classList.remove('active', 'muted');
  document.getElementById('vcControls').classList.remove('open');
  micEnabled = true;
  camEnabled = true;
  setVcStatus('Sprachchat verlassen');
}

function toggleMic() {
  if (!localStream) return;
  micEnabled = !micEnabled;
  localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
  const btn = document.getElementById('vcMicBtn');
  btn.classList.toggle('active', micEnabled);
  btn.classList.toggle('muted', !micEnabled);

}

function toggleCam() {
  if (!localStream) return;
  const videoTracks = localStream.getVideoTracks();
  if (videoTracks.length === 0) return;
  camEnabled = !camEnabled;
  videoTracks.forEach(t => t.enabled = camEnabled);
  const btn = document.getElementById('vcCamBtn');
  btn.classList.toggle('active', camEnabled);
  btn.classList.toggle('muted', !camEnabled);

  // Eigenes Video-Tile aktualisieren
  const tile = document.getElementById('vt-local');
  if (tile) tile.classList.toggle('no-video', !camEnabled);
}

function addVideoTile(id, username, stream, isLocal) {
  let tile = document.getElementById('vt-' + id);
  if (!tile) {
    tile = document.createElement('div');
    tile.id = 'vt-' + id;
    tile.className = 'video-tile';
    tile.innerHTML = `
      <video autoplay ${isLocal ? 'muted' : ''} playsinline></video>
      <div class="vt-name">${username}${isLocal ? ' (Du)' : ''}</div>
    `;
    document.getElementById('videoGrid').appendChild(tile);
  }
  const video = tile.querySelector('video');
  video.srcObject = stream;

  // Prüfen ob Video-Track vorhanden
  if (!stream.getVideoTracks().length || !stream.getVideoTracks()[0].enabled) {
    tile.classList.add('no-video');
    tile.insertAdjacentHTML('afterbegin',
      `<span style="font-size:28px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">👤</span>`);
  }

  // Spracherkennung (Speaking Indicator)
  if (!isLocal) {
    try {
      const audioCtx = new AudioContext();
      const analyser = audioCtx.createAnalyser();
      const source = audioCtx.createMediaStreamSource(stream);
      source.connect(analyser);
      analyser.fftSize = 256;
      const data = new Uint8Array(analyser.frequencyBinCount);
      const checkSpeaking = () => {
        if (!peers[id] && id !== 'local') return;
        analyser.getByteFrequencyData(data);
        const avg = data.reduce((a, b) => a + b) / data.length;
        tile.classList.toggle('speaking', avg > 20);
        requestAnimationFrame(checkSpeaking);
      };
      checkSpeaking();
    } catch(e) {}
  }
}

function removeVideoTile(id) {
  const tile = document.getElementById('vt-' + id);
  if (tile) tile.remove();
}

// ===================== WEBRTC PEER MANAGEMENT =====================
async function createPeerConnection(peerId, username, isInitiator) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  peers[peerId] = { pc, username };

  // Lokalen Stream hinzufügen
  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  // Remote Stream empfangen
  pc.ontrack = (e) => {
    if (e.streams[0]) {
      addVideoTile(peerId, username, e.streams[0], false);
    }
  };

  // ICE Candidates senden
  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('rtc:ice', { to: peerId, candidate: e.candidate });
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
      removePeer(peerId);
    }
  };

  if (isInitiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('rtc:offer', { to: peerId, offer });
  }

  return pc;
}

function removePeer(peerId) {
  if (peers[peerId]) {
    peers[peerId].pc.close();
    delete peers[peerId];
  }
  removeVideoTile(peerId);
}

// ===================== RTC SOCKET EVENTS =====================
socket.on('rtc:peers', async (peerList) => {
  // Verbindung zu allen bestehenden Peers aufbauen (wir sind Initiator)
  for (const { peerId, username } of peerList) {
    await createPeerConnection(peerId, username, true);
  }
});

socket.on('rtc:peerJoined', async ({ peerId, username }) => {
  if (!vcActive) return;
  setVcStatus(`🟢 ${username} ist beigetreten`);
  // Neuer Peer → warten auf deren Offer
});

socket.on('rtc:offer', async ({ from, username, offer }) => {
  if (!vcActive) return;
  const pc = await createPeerConnection(from, username, false);
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('rtc:answer', { to: from, answer });
});

socket.on('rtc:answer', async ({ from, answer }) => {
  if (peers[from]) {
    await peers[from].pc.setRemoteDescription(answer);
  }
});

socket.on('rtc:ice', async ({ from, candidate }) => {
  if (peers[from]) {
    try {
      await peers[from].pc.addIceCandidate(candidate);
    } catch(e) {}
  }
});

socket.on('rtc:peerLeft', ({ peerId }) => {
  const username = peers[peerId]?.username || 'Jemand';
  removePeer(peerId);
  setVcStatus(`🔴 ${username} hat verlassen`);
});
// ===================== DRAG-MODUS FÜR SEATS =====================
(function() {
  const STORAGE_KEY = 'pokerSeatPositions';
  let dragMode = false;
  let dragging = null;
  let offsetX = 0, offsetY = 0;

  // Gespeicherte Positionen laden und anwenden
  function applySaved() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!saved) return;
      for (const pos in saved) {
        const seats = document.querySelectorAll(`.seat[data-pos="${pos}"]`);
        seats.forEach(s => {
          s.style.top = saved[pos].top;
          s.style.left = saved[pos].left;
        });
      }
    } catch(e) {}
  }

  // Nach jedem renderTable die Positionen neu anwenden
  const origRender = window.renderTable;
  if (origRender) {
    window.renderTable = function(state) {
      origRender(state);
      applySaved();
    };
  }

  // MutationObserver als Fallback
  const obs = new MutationObserver(() => applySaved());
  setTimeout(() => {
    const sc = document.getElementById('seatsContainer');
    if (sc) obs.observe(sc, { childList: true });
    applySaved();
  }, 500);

  // Toggle-Button erstellen (draggable)
  const BTN_POS_KEY = 'pokerDragBtnPos';
  const toggleBtn = document.createElement('button');
  toggleBtn.textContent = '⚙ Sitze anpassen';
  toggleBtn.id = 'dragToggle';
  toggleBtn.style.cssText = 'display:none;position:fixed;bottom:140px;right:8px;z-index:9999;padding:6px 12px;background:rgba(212,175,55,.9);color:#000;border:none;border-radius:8px;font:bold 11px sans-serif;cursor:grab;touch-action:none;user-select:none;';
  document.body.appendChild(toggleBtn);

  // Gespeicherte Button-Position laden
  try {
    const bp = JSON.parse(localStorage.getItem(BTN_POS_KEY));
    if (bp) { toggleBtn.style.bottom = bp.bottom; toggleBtn.style.right = bp.right; }
  } catch(e) {}

  // Button selbst draggable machen
  let btnDragging = false, btnStartX = 0, btnStartY = 0, btnMoved = false;
  function btnDragStart(cx, cy) {
    btnDragging = true; btnMoved = false;
    btnStartX = cx; btnStartY = cy;
  }
  function btnDragMove(cx, cy) {
    if (!btnDragging) return;
    if (Math.abs(cx - btnStartX) > 5 || Math.abs(cy - btnStartY) > 5) btnMoved = true;
    if (!btnMoved) return;
    const r = window.innerWidth - cx - toggleBtn.offsetWidth / 2;
    const b = window.innerHeight - cy - toggleBtn.offsetHeight / 2;
    toggleBtn.style.right = Math.max(0, Math.min(window.innerWidth - 60, r)) + 'px';
    toggleBtn.style.bottom = Math.max(0, Math.min(window.innerHeight - 30, b)) + 'px';
  }
  function btnDragEnd() {
    if (btnDragging && btnMoved) {
      localStorage.setItem(BTN_POS_KEY, JSON.stringify({ bottom: toggleBtn.style.bottom, right: toggleBtn.style.right }));
    }
    btnDragging = false;
  }
  toggleBtn.addEventListener('mousedown', e => { btnDragStart(e.clientX, e.clientY); });
  document.addEventListener('mousemove', e => { if (btnDragging) { e.preventDefault(); btnDragMove(e.clientX, e.clientY); } });
  document.addEventListener('mouseup', () => { btnDragEnd(); });
  toggleBtn.addEventListener('touchstart', e => { const t = e.touches[0]; btnDragStart(t.clientX, t.clientY); }, { passive: true });
  document.addEventListener('touchmove', e => { if (btnDragging) { const t = e.touches[0]; btnDragMove(t.clientX, t.clientY); } }, { passive: true });
  document.addEventListener('touchend', () => { btnDragEnd(); });

  // Info-Label
  const infoLabel = document.createElement('div');
  infoLabel.id = 'dragInfo';
  infoLabel.style.cssText = 'display:none;position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:9999;padding:8px 20px;background:rgba(244,208,63,.95);color:#000;border-radius:10px;font:bold 13px sans-serif;text-align:center;pointer-events:none;';
  infoLabel.textContent = '🔧 Ziehe die Gegner an die gewünschte Position – klicke nochmal zum Speichern';
  document.body.appendChild(infoLabel);

  toggleBtn.addEventListener('click', () => {
    if (btnMoved) return; // Nicht klicken wenn gerade gezogen
    dragMode = !dragMode;
    infoLabel.style.display = dragMode ? 'block' : 'none';
    toggleBtn.textContent = dragMode ? '✅ Positionen speichern' : '⚙ Sitze anpassen';
    toggleBtn.style.background = dragMode ? '#2ecc71' : 'rgba(212,175,55,.9)';

    document.querySelectorAll('.seat:not(.you)').forEach(s => {
      s.style.cursor = dragMode ? 'grab' : 'pointer';
      if (dragMode) s.style.outline = '2px dashed rgba(244,208,63,.6)';
      else s.style.outline = '';
    });

    if (!dragMode) {
      // Positionen speichern
      const positions = {};
      document.querySelectorAll('.seat[data-pos]').forEach(s => {
        const pos = s.getAttribute('data-pos');
        positions[pos] = { top: s.style.top, left: s.style.left };
      });
      // Nur nicht-leere speichern
      const toSave = {};
      for (const p in positions) {
        if (positions[p].top && positions[p].left) toSave[p] = positions[p];
      }
      if (Object.keys(toSave).length > 0) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
      }
    }
  });

  // Admin-Menü: Button zeigen wenn Debug-Panel sichtbar wird
  const showDragBtn = () => {
    const panel = document.getElementById('reelDebugPanel');
    // Immer zeigen – egal ob Admin oder nicht
    toggleBtn.style.display = 'block';
  };
  // Zeige den Button nach kurzer Verzögerung
  setTimeout(showDragBtn, 1000);

  // Drag-Handler (Mouse)
  document.addEventListener('mousedown', e => {
    if (!dragMode) return;
    const seat = e.target.closest('.seat:not(.you)');
    if (!seat) return;
    e.preventDefault();
    dragging = seat;
    seat.style.cursor = 'grabbing';
    seat.style.zIndex = '999';
    const rect = seat.getBoundingClientRect();
    offsetX = e.clientX - rect.left - rect.width / 2;
    offsetY = e.clientY - rect.top - rect.height / 2;
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    e.preventDefault();
    const x = ((e.clientX - offsetX) / window.innerWidth * 100);
    const y = ((e.clientY - offsetY) / window.innerHeight * 100);
    dragging.style.left = Math.max(2, Math.min(98, x)).toFixed(1) + '%';
    dragging.style.top = Math.max(5, Math.min(75, y)).toFixed(1) + '%';
  });

  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging.style.cursor = 'grab';
      dragging.style.zIndex = '';
      dragging = null;
    }
  });

  // Drag-Handler (Touch)
  document.addEventListener('touchstart', e => {
    if (!dragMode) return;
    const seat = e.target.closest('.seat:not(.you)');
    if (!seat) return;
    e.preventDefault();
    dragging = seat;
    seat.style.zIndex = '999';
    const touch = e.touches[0];
    const rect = seat.getBoundingClientRect();
    offsetX = touch.clientX - rect.left - rect.width / 2;
    offsetY = touch.clientY - rect.top - rect.height / 2;
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    e.preventDefault();
    const touch = e.touches[0];
    const x = ((touch.clientX - offsetX) / window.innerWidth * 100);
    const y = ((touch.clientY - offsetY) / window.innerHeight * 100);
    dragging.style.left = Math.max(2, Math.min(98, x)).toFixed(1) + '%';
    dragging.style.top = Math.max(5, Math.min(75, y)).toFixed(1) + '%';
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (dragging) {
      dragging.style.zIndex = '';
      dragging = null;
    }
  });

  // Reset-Button (Doppelklick auf den Toggle)
  toggleBtn.addEventListener('dblclick', () => {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  });
})();
</script>
</body>
</html>
