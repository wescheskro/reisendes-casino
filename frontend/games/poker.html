let localStream = null;
let vcActive = false;
let micEnabled = true;
let camEnabled = true;
const peers = {}; // peerId -> { pc, username, videoEl }

function setVcStatus(text) {
  document.getElementById('vcStatus').textContent = text;
  if (text) setTimeout(() => {
    const el = document.getElementById('vcStatus');
    if (el.textContent === text) el.textContent = '';
  }, 3000);
}

async function toggleVoiceChat() {
  if (vcActive) {
    leaveVoiceChat();
    return;
  }
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    vcActive = true;

    // Eigenes Video anzeigen
    addVideoTile('local', user?.username || 'Du', localStream, true);

    // Buttons aktualisieren
    document.getElementById('vcFab').classList.add('connected');
    document.getElementById('vcFab').textContent = '🟢';
    document.getElementById('vcJoinBtn').classList.add('active');
    document.getElementById('vcJoinBtn').textContent = '📵';
    document.getElementById('vcJoinBtn').title = 'Sprachchat verlassen';
    document.getElementById('vcMicBtn').classList.add('active');
    document.getElementById('vcCamBtn').classList.add('active');

    // Dem RTC-Raum beitreten
    socket.emit('rtc:join', { room: 'pk-' + tableId });
    setVcStatus('🟢 Sprachchat aktiv');
  } catch (err) {
    console.error('Kamera/Mikrofon Fehler:', err);
    setVcStatus('⚠️ Kein Zugriff auf Kamera/Mikrofon');

    // Nur Audio versuchen
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      vcActive = true;
      camEnabled = false;
      addVideoTile('local', user?.username || 'Du', localStream, true);
      document.getElementById('vcFab').classList.add('connected');
      document.getElementById('vcFab').textContent = '🟢';
      document.getElementById('vcJoinBtn').classList.add('active');
      document.getElementById('vcJoinBtn').textContent = '📵';
      document.getElementById('vcMicBtn').classList.add('active');
      document.getElementById('vcCamBtn').classList.add('muted');
      socket.emit('rtc:join', { room: 'pk-' + tableId });
      setVcStatus('🟢 Nur Sprache (keine Kamera)');
    } catch (err2) {
      setVcStatus('❌ Kein Mikrofon gefunden');
    }
  }
}

function leaveVoiceChat() {
  vcActive = false;
  socket.emit('rtc:leave');

  // Alle Peer-Verbindungen schließen
  for (const peerId of Object.keys(peers)) {
    removePeer(peerId);
  }

  // Eigenen Stream stoppen
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }

  // Video-Grid + Seat-Videos + eigenes Video leeren
  document.getElementById('videoGrid').innerHTML = '';
  document.querySelectorAll('.seat-video').forEach(v => v.remove());
  const myVid = document.getElementById('myVideoTile');
  if (myVid) myVid.remove();
  // Peer-Seat-Map leeren
  for (const key of Object.keys(peerSeatMap)) delete peerSeatMap[key];

  // Buttons zurücksetzen
  document.getElementById('vcFab').classList.remove('connected');
  document.getElementById('vcFab').textContent = '📞';
  document.getElementById('vcJoinBtn').classList.remove('active');
  document.getElementById('vcJoinBtn').textContent = '📞';
  document.getElementById('vcJoinBtn').title = 'Sprachchat beitreten';
  document.getElementById('vcMicBtn').classList.remove('active', 'muted');
  document.getElementById('vcCamBtn').classList.remove('active', 'muted');
  document.getElementById('vcControls').classList.remove('open');
  micEnabled = true;
  camEnabled = true;
  setVcStatus('Sprachchat verlassen');
}

function toggleMic() {
  if (!localStream) return;
  micEnabled = !micEnabled;
  localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
  const btn = document.getElementById('vcMicBtn');
  btn.classList.toggle('active', micEnabled);
  btn.classList.toggle('muted', !micEnabled);
  btn.textContent = micEnabled ? '🎤' : '🔇';
}

function toggleCam() {
  if (!localStream) return;
  const videoTracks = localStream.getVideoTracks();
  if (videoTracks.length === 0) return;
  camEnabled = !camEnabled;
  videoTracks.forEach(t => t.enabled = camEnabled);
  const btn = document.getElementById('vcCamBtn');
  btn.classList.toggle('active', camEnabled);
  btn.classList.toggle('muted', !camEnabled);
  btn.textContent = camEnabled ? '📷' : '🚫';

  // Eigenes Video-Tile aktualisieren
  const myVid = document.getElementById('myVideoTile');
  if (myVid) myVid.style.display = camEnabled ? '' : 'none';
}

// Peer-Username → Seat-Index Mapping
const peerSeatMap = {}; // peerId -> seatIdx

function findSeatForUsername(username) {
  if (!myState) return -1;
  return myState.seats.findIndex(s => s && s.username === username);
}

function addVideoTile(id, username, stream, isLocal) {
  // Eigenes Video: kleines Overlay unten rechts
  if (isLocal) {
    let myVid = document.getElementById('myVideoTile');
    if (!myVid) {
      myVid = document.createElement('div');
      myVid.id = 'myVideoTile';
      myVid.className = 'my-video';
      myVid.innerHTML = `<video autoplay muted playsinline></video><div class="mv-label">Du</div>`;
      document.body.appendChild(myVid);
    }
    myVid.querySelector('video').srcObject = stream;
    if (!stream.getVideoTracks().length) myVid.style.display = 'none';
    return;
  }

  // Gegner-Video: Am Seat des Spielers anzeigen
  const seatIdx = findSeatForUsername(username);
  peerSeatMap[id] = { username, stream, seatIdx };

  if (seatIdx >= 0) {
    attachVideoToSeat(id, seatIdx, stream);
  } else {
    // Fallback: ins Grid (falls Seat nicht gefunden)
    let tile = document.getElementById('vt-' + id);
    if (!tile) {
      tile = document.createElement('div');
      tile.id = 'vt-' + id;
      tile.className = 'video-tile';
      tile.innerHTML = `<video autoplay playsinline></video><div class="vt-name">${escapeHtml(username)}</div>`;
      document.getElementById('videoGrid').appendChild(tile);
    }
    tile.querySelector('video').srcObject = stream;
  }

  // Speaking-Erkennung
  try {
    const audioCtx = new AudioContext();
    const analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    analyser.fftSize = 256;
    const data = new Uint8Array(analyser.frequencyBinCount);
    const checkSpeaking = () => {
      if (!peers[id]) return;
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b) / data.length;
      const isSpeaking = avg > 20;
      // Speaking-Status auf Seat-Video + Grid-Tile setzen
      const seatVid = document.getElementById('sv-' + id);
      const gridTile = document.getElementById('vt-' + id);
      if (seatVid) seatVid.classList.toggle('speaking', isSpeaking);
      if (gridTile) gridTile.classList.toggle('speaking', isSpeaking);
      requestAnimationFrame(checkSpeaking);
    };
    checkSpeaking();
  } catch(e) {}
}

function attachVideoToSeat(peerId, seatIdx, stream) {
  const seat = document.querySelector(`.seat[data-pos="${seatIdx}"]`);
  if (!seat) return;

  // Altes Seat-Video entfernen falls vorhanden
  const old = document.getElementById('sv-' + peerId);
  if (old) old.remove();

  const seatVid = document.createElement('div');
  seatVid.id = 'sv-' + peerId;
  seatVid.className = 'seat-video';
  seatVid.innerHTML = `<video autoplay playsinline></video>`;
  seatVid.querySelector('video').srcObject = stream;
  seat.appendChild(seatVid);
}

// Nach jedem renderState: Video-Elemente an Seats re-attachen (weil innerHTML sich ändert)
function reattachSeatVideos() {
  for (const [peerId, info] of Object.entries(peerSeatMap)) {
    if (!peers[peerId]) continue;
    const newSeatIdx = findSeatForUsername(info.username);
    if (newSeatIdx >= 0) {
      info.seatIdx = newSeatIdx;
      // Nur re-attachen wenn nicht mehr vorhanden
      if (!document.getElementById('sv-' + peerId)) {
        attachVideoToSeat(peerId, newSeatIdx, info.stream);
      }
    }
  }
}

function removeVideoTile(id) {
  const tile = document.getElementById('vt-' + id);
  if (tile) tile.remove();
  const sv = document.getElementById('sv-' + id);
  if (sv) sv.remove();
  delete peerSeatMap[id];
}

// ===================== WEBRTC PEER MANAGEMENT =====================
async function createPeerConnection(peerId, username, isInitiator) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  peers[peerId] = { pc, username };

  // Lokalen Stream hinzufügen
  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  // Remote Stream empfangen
  pc.ontrack = (e) => {
    if (e.streams[0]) {
      addVideoTile(peerId, username, e.streams[0], false);
    }
  };

  // ICE Candidates senden
  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('rtc:ice', { to: peerId, candidate: e.candidate });
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
      removePeer(peerId);
    }
  };

  if (isInitiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('rtc:offer', { to: peerId, offer });
  }

  return pc;
}

function removePeer(peerId) {
  if (peers[peerId]) {
    peers[peerId].pc.close();
    delete peers[peerId];
  }
  removeVideoTile(peerId);
}

<script>
// ═══════ PLAYER MENU (Roulette-Style) ═══════
let pmTarget = null;
function openPlayerMenu(seatEl) {
  const nameEl = seatEl.querySelector('.seat-name');
  if (!nameEl) return;
  pmTarget = nameEl.textContent.replace(' (Du)', '').replace(/KI$/, '').trim();
  const menu = document.getElementById('playerMenu');
  const overlay = document.getElementById('pmOverlay');
  document.getElementById('pmName').textContent = pmTarget;
  const avImg = seatEl.querySelector('.seat-avatar img');
  const avatarEl = document.getElementById('pmAvatar');
  if (avImg) avatarEl.innerHTML = `<img src="${avImg.src}" alt="${pmTarget}">`;
  else avatarEl.innerHTML = pmTarget.charAt(0).toUpperCase();
  const rect = seatEl.getBoundingClientRect();
  let top = rect.bottom + 8;
  let left = rect.left;
  if (top + 320 > window.innerHeight) top = rect.top - 320;
  if (top < 8) top = 8;
  if (left + 210 > window.innerWidth) left = window.innerWidth - 218;
  if (left < 8) left = 8;
  menu.style.top = top + 'px';
  menu.style.left = left + 'px';
  overlay.classList.add('open');
  menu.classList.add('open');
}
function closePlayerMenu() {
  document.getElementById('pmOverlay').classList.remove('open');
  document.getElementById('playerMenu').classList.remove('open');
  pmTarget = null;
}
function pmAction(type) {
  const name = pmTarget;
  closePlayerMenu();
  switch(type) {
    case 'profile': openProfileModal(name); break;
    case 'message': openMessageModal(name); break;
    case 'call': startCallUI(name, false); break;
    case 'video': startCallUI(name, true); break;
    case 'voicemsg': openVoiceRecorder(name); break;
    case 'money': openSendMoney(name); break;
    case 'friend': addFriend(name); break;
    case 'block': blockPlayer(name); break;
  }
}
function addFriend(name) {
  const token = localStorage.getItem('casinoToken');
  if (!token) { alert('Bitte zuerst anmelden!'); return; }
  fetch('/api/friends/request', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ targetUsername: name.replace(' 🤖','') })
  }).then(r => r.json()).then(d => {
    alert(d.error || 'Freundschaftsanfrage an ' + name + ' gesendet! 👥');
  }).catch(() => alert('Fehler beim Senden'));
}
function blockPlayer(name) {
  const cleanName = name.replace(' 🤖','');
  let blocked = JSON.parse(localStorage.getItem('blockedPlayers') || '[]');
  if (blocked.includes(cleanName)) {
    blocked = blocked.filter(n => n !== cleanName);
    localStorage.setItem('blockedPlayers', JSON.stringify(blocked));
    alert(cleanName + ' wurde entblockt.');
  } else {
    blocked.push(cleanName);
    localStorage.setItem('blockedPlayers', JSON.stringify(blocked));
    alert(cleanName + ' wurde blockiert. 🚫');
  }
}
function createActionModal(title, content, onClose) {
  const old = document.getElementById('actionModal');
  if (old) old.remove();
  const overlay = document.createElement('div');
  overlay.id = 'actionModal';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center';
  const modal = document.createElement('div');
  modal.style.cssText = 'background:linear-gradient(165deg,rgba(30,18,8,.97),rgba(15,8,3,.98));border:1.5px solid rgba(212,175,55,.3);border-radius:16px;padding:20px;min-width:280px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.7),0 0 20px rgba(212,175,55,.1);color:#F0E6D3;font-family:Playfair Display,serif';
  modal.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:16px;font-weight:700;color:#F4D03F">${title}</div>
    <button onclick="closeActionModal()" style="background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px">✕</button>
  </div>${content}`;
  overlay.appendChild(modal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeActionModal(); });
  document.body.appendChild(overlay);
  overlay._onClose = onClose;
  return modal;
}
function closeActionModal() {
  const m = document.getElementById('actionModal');
  if (m) { if (m._onClose) m._onClose(); m.remove(); }
}
function openProfileModal(name) {
  const hash = [...name].reduce((h,c) => ((h<<5)-h)+c.charCodeAt(0), 0);
  const level = Math.abs(hash % 20) + 1;
  const wins = Math.abs((hash*7) % 150);
  const games = wins + Math.abs((hash*3) % 200);
  const winRate = games > 0 ? Math.round(wins/games*100) : 0;
  const rank = level > 15 ? 'Diamant' : level > 10 ? 'Gold' : level > 5 ? 'Silber' : 'Bronze';
  const rankColor = level > 15 ? '#b9f2ff' : level > 10 ? '#F4D03F' : level > 5 ? '#c0c0c0' : '#cd7f32';
  createActionModal('👤 Spielerprofil', `
    <div style="text-align:center;margin-bottom:14px">
      <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#2c1810,#1a0f08);border:3px solid ${rankColor};margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 16px ${rankColor}44">${name.charAt(0).toUpperCase()}</div>
      <div style="font-size:18px;font-weight:900;color:#F4D03F">${name}</div>
      <div style="font-size:12px;color:${rankColor};margin-top:2px">⭐ ${rank} · Level ${level}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:rgba(255,255,255,.05);border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:900;color:#F4D03F">${games}</div><div style="font-size:10px;color:rgba(240,230,211,.4)">Spiele</div></div>
      <div style="background:rgba(255,255,255,.05);border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:900;color:#2ecc71">${winRate}%</div><div style="font-size:10px;color:rgba(240,230,211,.4)">Gewinnrate</div></div>
    </div>`);
}
function openMessageModal(name) {
  createActionModal('💬 Nachricht an ' + name, `
    <textarea id="msgInput" placeholder="Nachricht eingeben..." style="width:100%;height:80px;background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.2);border-radius:8px;padding:10px;color:#F0E6D3;font-family:inherit;font-size:13px;resize:none"></textarea>
    <button onclick="closeActionModal()" style="margin-top:10px;width:100%;padding:10px;background:linear-gradient(135deg,#D4AF37,#8B6914);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit">Senden</button>`);
}

      <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#2c1810,#1a0f08);border:3px solid #2ecc71;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:36px">${name.charAt(0).toUpperCase()}</div>
      <div style="font-size:16px;font-weight:700;color:#F4D03F;margin-bottom:4px">${name}</div>
      <div style="color:rgba(240,230,211,.4);font-size:12px">Rufe an...</div>
      <button onclick="closeActionModal()" style="margin-top:16px;padding:10px 24px;background:#e74c3c;border:none;border-radius:20px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit">Auflegen</button>
    </div>`);
}
function openVoiceRecorder(name) {
  createActionModal('🎙 Sprachnachricht an ' + name, `

      <div style="font-size:48px;margin-bottom:10px">🎙</div>

      <button onclick="closeActionModal()" style="padding:10px 24px;background:linear-gradient(135deg,#D4AF37,#8B6914);border:none;border-radius:20px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit">Senden</button>
