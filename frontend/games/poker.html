<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;background:#0a0a05;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
body{font-family:'Playfair Display',serif;color:#F0E6D3;user-select:none;-webkit-user-select:none;touch-action:manipulation;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

/* ============ WOHNWAGEN BACKGROUND ============ */
.wagen-bg{
  position:fixed;inset:0;z-index:0;
  background:url('/games/img/poker-bg.png') center center / cover no-repeat;
}
.wagen-bg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 55%, rgba(0,0,0,.15) 0%, rgba(0,0,0,.5) 60%, rgba(0,0,0,.75) 100%);
}


/* ============ TOP BAR ============ */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:calc(env(safe-area-inset-top, 0px) + 8px) calc(env(safe-area-inset-right, 0px) + 16px) 8px calc(env(safe-area-inset-left, 0px) + 16px);
  background:linear-gradient(180deg,rgba(30,18,8,.95),rgba(30,18,8,.6));
  border-bottom:1px solid rgba(212,175,55,.15);
}
.top-bar .logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:#D4AF37}
.top-bar .back{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);color:#D4AF37;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;transition:.2s;min-height:44px;min-width:44px;display:flex;align-items:center}
.top-bar .back:hover{background:rgba(212,175,55,.2)}
.top-bar .info{font-size:12px;color:rgba(240,230,211,.5)}

/* ============ POT & COMMUNITY ============ */
.community-area{
  position:fixed;top:54%;left:50%;transform:translate(-50%,-50%);
  text-align:center;z-index:10;
  width:100%;
  padding:0 8px;
  box-sizing:border-box;
}
.pot-display{
  font-size:18px;color:#F4D03F;margin-bottom:12px;
  background:rgba(20,10,5,.75);padding:8px 28px;border-radius:24px;
  display:inline-block;border:1px solid rgba(212,175,55,.3);
  backdrop-filter:blur(4px);
}
.pot-display .amount{font-size:32px;font-weight:900}
.community-cards{
  display:flex;gap:6px;justify-content:center;
  min-height:100px;align-items:center;
  width:100%;
}
.phase-label{font-size:12px;color:rgba(240,230,211,.4);margin-top:10px;text-transform:uppercase;letter-spacing:3px}

/* ============ FLIEGENDE KARTEN ANIMATION ============ */
.flying-card{
  position:fixed;
  width:32px;height:46px;
  border-radius:5px;
  z-index:9999;
  pointer-events:none;
  transition:none;
  box-shadow:0 4px 16px rgba(0,0,0,.6);
}
.flying-card.face-down{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:1.5px solid rgba(212,175,55,.5);
}
.flying-card.face-up{
  background:linear-gradient(165deg,#fff,#f0ece3);
  border:1.5px solid rgba(212,175,55,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;
}
.flying-card.face-up.red{color:#c0392b}
.flying-card.fold-card{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:1.5px solid rgba(212,175,55,.3);
  opacity:.7;
}

/* ============ CARDS (Community / Flop – volle Breite) ============ */
.card{
  flex:1;
  max-width:80px;height:auto;aspect-ratio:5/7;
  border-radius:8px;
  background:linear-gradient(165deg,#ffffff 0%,#f9f7f2 30%,#f0ece3 70%,#e8e2d6 100%);
  color:#1a1a2e;
  font-weight:900;
  box-shadow:0 4px 14px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.5) inset,0 -1px 0 rgba(0,0,0,.08) inset;
  transition:transform .3s;
  position:relative;
  overflow:hidden;
  border:1.5px solid rgba(180,170,150,.35);
}
/* Inner card pattern – subtle linen texture */
.card::before{
  content:'';position:absolute;inset:3px;border-radius:5px;
  border:1px solid rgba(150,140,120,.12);
  pointer-events:none;z-index:1;
}
/* Corner index – top left */
.card .corner-tl{
  position:absolute;top:3px;left:4px;
  display:flex;flex-direction:column;align-items:center;
  line-height:1;z-index:2;
}
.card .corner-tl .c-rank{font-size:18px;font-weight:800;font-family:'Playfair Display',serif}
.card .corner-tl .c-suit{font-size:14px;line-height:1}
/* Corner index – bottom right (rotated) */
.card .corner-br{
  position:absolute;bottom:3px;right:4px;
  display:flex;flex-direction:column;align-items:center;
  line-height:1;z-index:2;
  transform:rotate(180deg);
}
.card .corner-br .c-rank{font-size:18px;font-weight:800;font-family:'Playfair Display',serif}
.card .corner-br .c-suit{font-size:14px;line-height:1}
/* Center suit – big */
.card .center-suit{
  font-size:clamp(30px,5vw,44px);
  z-index:2;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.08));
}
.card.red{color:#c0392b}
.card.black{color:#1a1a2e}
.card.hidden{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:2px solid rgba(212,175,55,.5);
  color:transparent;font-size:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.card.hidden::before{display:none}
.card.hidden .card-back-design{display:none}
.card.empty-slot{
  background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.08);
  box-shadow:none;
}
.card.empty-slot::before{display:none}

/* ============ SEATS (oberer Bereich, ÜBER dem Pot) ============ */
.seats-container{
  position:fixed;inset:0;z-index:12;pointer-events:none;
}
.seat{
  position:absolute;pointer-events:all;
  width:clamp(90px,18vw,130px);
  text-align:center;cursor:grab;
  transform:translate(-50%,-50%);
  touch-action:none;
}
.seat.dragging{cursor:grabbing;z-index:50;opacity:.85}
/* Gegner – mittig zwischen Top-Bar und Pot */
.seat[data-pos="0"]{top:34%;left:10%}
.seat[data-pos="1"]{top:29%;left:30%}
.seat[data-pos="2"]{top:27%;left:50%}
.seat[data-pos="3"]{top:29%;left:70%}
.seat[data-pos="4"]{top:34%;left:90%}
.seat[data-pos="5"]{top:31%;left:50%}
/* Eigener Sitz: komplett ausblenden (große Hand-Anzeige unten übernimmt) */
.seat.you{display:none!important}

.seat-inner{
  background:none;border-radius:8px;padding:4px 3px 5px;
  border:none;transition:.3s;
}
.seat.active .seat-inner{
  animation:none;
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 16px rgba(244,208,63,.35)}
  50%{box-shadow:0 0 28px rgba(244,208,63,.5)}
}
.seat.folded .seat-inner{opacity:.4;filter:grayscale(.5)}

.seat-cards{display:flex;gap:0;justify-content:center;min-height:36px;align-items:center;position:relative}
.seat-cards .card{
  width:28px !important;height:40px !important;
  flex:0 0 28px !important;aspect-ratio:auto !important;max-width:none !important;
  border-radius:4px;font-size:9px;
  box-shadow:0 2px 6px rgba(0,0,0,.4) !important;
  transition:transform .4s ease, box-shadow .4s ease;
}
/* Karten liegen wie echt auf dem Tisch – leicht versetzt und angewinkelt */
.seat-cards .card:nth-child(1){
  transform:rotate(-8deg) translateX(3px);
  z-index:1;
}
.seat-cards .card:nth-child(2){
  transform:rotate(8deg) translateX(-3px);
  z-index:2;
}
/* Peek-Animation: Karte hebt sich leicht an */
.seat.peeking .seat-cards .card:nth-child(1){
  transform:rotate(-12deg) translateX(3px) translateY(-6px);
  box-shadow:0 6px 16px rgba(0,0,0,.6) !important;
}
.seat.peeking .seat-cards .card:nth-child(2){
  transform:rotate(12deg) translateX(-3px) translateY(-6px);
  box-shadow:0 6px 16px rgba(0,0,0,.6) !important;
}
.seat.peeking .seat-inner::after{
  content:'👀';
  position:absolute;top:-16px;right:-6px;
  font-size:14px;z-index:10;
  animation:peekBounce .6s ease-in-out;
}
@keyframes peekBounce{
  0%{transform:scale(0);opacity:0}
  50%{transform:scale(1.3);opacity:1}
  100%{transform:scale(1);opacity:1}
}
.seat-cards .card .corner-tl{top:2px;left:2px}
.seat-cards .card .corner-tl .c-rank{font-size:8px}
.seat-cards .card .corner-tl .c-suit{font-size:5px}
.seat-cards .card .corner-br{display:none}
.seat-cards .card .center-suit{font-size:13px}
.seat-cards .card::before{inset:1px;border-radius:3px}

.seat-name{
  font-size:28px;color:#D4AF37;margin-top:4px;font-weight:700;
  white-space:nowrap;overflow:visible;
  line-height:1.1;
  text-shadow:0 2px 6px rgba(0,0,0,.9);
}
.seat.you .seat-name{color:#F4D03F;font-weight:700}
.seat-rang{
  font-size:14px;color:rgba(212,175,55,.6);margin-top:1px;
  font-style:italic;
}
.seat-chips{font-size:14px;color:rgba(240,230,211,.7);font-weight:600}
.seat-bet-bubble{
  font-size:8px;color:#F4D03F;
  background:rgba(0,0,0,.65);padding:1px 6px;border-radius:8px;
  display:inline-block;margin-top:1px;
  border:1px solid rgba(212,175,55,.15);
}
.seat-hand{font-size:8px;font-weight:700;color:#4d4;margin-top:1px}
.dealer-chip{
  position:absolute;top:-6px;right:-6px;
  width:18px;height:18px;border-radius:50%;
  background:linear-gradient(135deg,#D4AF37,#F4D03F);color:#000;
  font-size:9px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
  border:1.5px solid rgba(139,105,20,.6);
}

/* ============ AVATARE (3D-Style Premium) ============ */
.seat-avatar{
  width:80px;height:80px;
  margin:0 auto 2px;position:relative;
  border-radius:50%;overflow:hidden;
  border:3px solid rgba(212,175,55,.4);
  background:radial-gradient(circle at 30% 30%, rgba(60,50,40,.6), rgba(15,10,8,.8));
  box-shadow:
    0 4px 12px rgba(0,0,0,.6),
    0 1px 3px rgba(0,0,0,.4),
    inset 0 -2px 6px rgba(0,0,0,.3),
    inset 0 2px 4px rgba(255,255,255,.05);
}
.seat-avatar img{
  width:100%;height:100%;object-fit:cover;
  border-radius:50%;
  filter:contrast(1.05) saturate(1.1);
}
/* 3D Glanz-Effekt */
.seat-avatar::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 45%, rgba(0,0,0,.2) 100%);
  pointer-events:none;
}
.seat.active .seat-avatar{
  border-color:#F4D03F;
  box-shadow:
    0 0 18px rgba(244,208,63,.5),
    0 0 8px rgba(244,208,63,.25) inset,
    0 4px 12px rgba(0,0,0,.5);
  animation:avatar-glow 2s ease-in-out infinite;
}
@keyframes avatar-glow{
  0%,100%{box-shadow:0 0 18px rgba(244,208,63,.5),0 4px 12px rgba(0,0,0,.5)}
  50%{box-shadow:0 0 28px rgba(244,208,63,.7),0 4px 12px rgba(0,0,0,.5)}
}
.seat.folded .seat-avatar{opacity:.3;filter:grayscale(.8) brightness(.7)}
.seat.empty .seat-avatar{opacity:.08;border-color:rgba(212,175,55,.08)}

/* EMPTY SEAT */
.seat.empty .seat-inner{opacity:.2}
.seat.empty:hover .seat-inner{opacity:.55;border-color:rgba(212,175,55,.3)}
.seat.empty .seat-cards{display:flex;align-items:center;justify-content:center}
.seat.empty .seat-cards::after{
  content:'+';font-size:14px;color:rgba(212,175,55,.25);
  width:26px;height:36px;border:2px dashed rgba(212,175,55,.15);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
}

/* ============ MEINE HAND (große Karten-Anzeige) ============ */
.my-hand{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:99;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:12px;
  pointer-events:none;
  padding:0 20px;
  opacity:0;
  transform:translateY(80px);
  transition:opacity .4s ease, transform .4s ease;
}
.my-hand.visible{
  opacity:1;
  transform:translateY(0);
}
/* Flip Container */
.my-hand .hand-card-wrap{
  width:190px;height:270px;
  pointer-events:auto;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
.my-hand .hand-card-wrap:nth-child(1){
  transform:rotate(-6deg) translateY(-8px);
}
.my-hand .hand-card-wrap:nth-child(2){
  transform:rotate(6deg) translateY(-8px);
}
/* Face & Back übereinander */
.my-hand .hand-card-face,
.my-hand .hand-card-back{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border-radius:14px;
  overflow:hidden;
  transition:opacity .3s ease, transform .3s ease;
}
/* FRONT (card face) */
.my-hand .hand-card-face{
  background:linear-gradient(165deg,#ffffff 0%,#f9f7f2 30%,#f0ece3 70%,#e8e2d6 100%);
  color:#1a1a2e;
  font-weight:900;
  box-shadow:0 14px 50px rgba(0,0,0,.7),0 0 0 3px rgba(255,255,255,.2),0 0 35px rgba(244,208,63,.2);
  border:3px solid rgba(212,175,55,.45);
  opacity:1;z-index:2;
}
/* Inner border like real playing cards */
.my-hand .hand-card-face::before{
  content:'';position:absolute;inset:8px;border-radius:8px;
  border:1px solid rgba(150,140,120,.15);
  pointer-events:none;z-index:1;
}
.my-hand .hand-card-face.red{color:#c0392b}
/* BACK (face-down) */
.my-hand .hand-card-back{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:3px solid rgba(212,175,55,.5);
  border-radius:14px;
  box-shadow:0 14px 50px rgba(0,0,0,.7),0 0 0 3px rgba(255,255,255,.2);
  z-index:1;
}
/* Verdeckt: Back oben, Face versteckt */
.my-hand .hand-card-wrap.flipped .hand-card-face{
  opacity:0;z-index:1;
}
.my-hand .hand-card-wrap.flipped .hand-card-back{
  z-index:2;
}
/* Corner top-left */
.my-hand .hand-card-face .h-corner-tl{
  position:absolute;top:12px;left:14px;
  display:flex;flex-direction:column;align-items:center;
  line-height:1;z-index:2;
}
.my-hand .hand-card-face .h-corner-tl .hc-rank{
  font-size:48px;font-weight:900;line-height:1;
  font-family:'Playfair Display',serif;
}
.my-hand .hand-card-face .h-corner-tl .hc-suit{font-size:34px;line-height:1;margin-top:-2px}
/* Corner bottom-right (upside down) */
.my-hand .hand-card-face .h-corner-br{
  position:absolute;bottom:12px;right:14px;
  display:flex;flex-direction:column;align-items:center;
  line-height:1;z-index:2;
  transform:rotate(180deg);
}
.my-hand .hand-card-face .h-corner-br .hc-rank{
  font-size:48px;font-weight:900;line-height:1;
  font-family:'Playfair Display',serif;
}
.my-hand .hand-card-face .h-corner-br .hc-suit{font-size:34px;line-height:1;margin-top:-2px}
/* Center suit – hero */
.my-hand .hand-card-face .h-center-suit{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:85px;z-index:2;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.1));
}

/* Beide-Karten-Button */
.hand-flip-both{
  align-self:center;
  pointer-events:auto;
  cursor:pointer;
  font-size:28px;
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(20,10,5,.7);
  border:2px solid rgba(212,175,55,.4);
  border-radius:50%;
  transition:transform .2s, background .2s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  margin:0 -8px;
  z-index:5;
}
.hand-flip-both:active{
  transform:scale(1.15);
  background:rgba(212,175,55,.3);
}

/* Chips-Info neben den Karten */
.my-hand .hand-info{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:4px;
  align-self:center;
  pointer-events:none;
}
.my-hand .hand-chips{
  font-size:18px;font-weight:700;color:#F4D03F;
  background:rgba(0,0,0,.6);padding:6px 16px;border-radius:12px;
  border:1px solid rgba(212,175,55,.2);
  white-space:nowrap;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
.my-hand .hand-bet{
  font-size:14px;color:rgba(244,208,63,.7);
  white-space:nowrap;
}

/* Hand-Label (zeigt "Deine Hand" oder Handname) */
.my-hand-label{
  position:fixed;
  z-index:99;
  left:50%;transform:translateX(-50%);
  font-size:11px;
  color:rgba(244,208,63,.7);
  text-transform:uppercase;
  letter-spacing:2px;
  font-weight:700;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
  opacity:0;
  transition:opacity .4s;
  pointer-events:none;
}
.my-hand-label.visible{opacity:1}

/* Mobile: Hand angepasst */
@media(max-width:600px){
  .my-hand .hand-card-wrap{width:150px;height:215px}
  .my-hand .hand-card-face .h-corner-tl .hc-rank{font-size:34px}
  .my-hand .hand-card-face .h-corner-tl .hc-suit{font-size:24px}
  .my-hand .hand-card-face .h-corner-br .hc-rank{font-size:34px}
  .my-hand .hand-card-face .h-corner-br .hc-suit{font-size:24px}
  .my-hand .hand-card-face .h-center-suit{font-size:68px}
  .my-hand{gap:10px}
}
@media(max-width:375px){
  .my-hand .hand-card-wrap{width:125px;height:180px}
  .my-hand .hand-card-face .h-corner-tl .hc-rank{font-size:28px}
  .my-hand .hand-card-face .h-corner-tl .hc-suit{font-size:20px}
  .my-hand .hand-card-face .h-corner-br .hc-rank{font-size:28px}
  .my-hand .hand-card-face .h-corner-br .hc-suit{font-size:20px}
  .my-hand .hand-card-face .h-center-suit{font-size:55px}
  .my-hand{gap:8px}
}
@media(max-height:450px) and (orientation:landscape){
  .my-hand .hand-card-wrap{width:110px;height:158px}
  .my-hand .hand-card-face .h-corner-tl .hc-rank{font-size:24px}
  .my-hand .hand-card-face .h-corner-tl .hc-suit{font-size:18px}
  .my-hand .hand-card-face .h-corner-br{display:none}
  .my-hand .hand-card-face .h-center-suit{font-size:48px}
  .my-hand{gap:6px}
}

/* ============ NAME OVERLAY ============ */
.name-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.85);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
}
.name-overlay.hidden{display:none}
.name-dialog{
  background:linear-gradient(165deg,rgba(30,15,5,.95),rgba(15,8,2,.98));
  border:2px solid rgba(212,175,55,.5);
  border-radius:20px;
  padding:40px 35px;
  text-align:center;
  max-width:320px;width:90%;
  box-shadow:0 0 60px rgba(212,175,55,.15),0 20px 60px rgba(0,0,0,.6);
}
.name-icon{font-size:48px;margin-bottom:12px}
.name-title{
  font-size:20px;font-weight:800;color:#F4D03F;
  font-family:'Playfair Display',serif;
  margin-bottom:6px;
}
.name-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px}
.name-input{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,.08);
  border:2px solid rgba(212,175,55,.3);
  border-radius:12px;
  color:#fff;font-size:18px;font-weight:700;
  text-align:center;
  outline:none;
  transition:border-color .3s;
}
.name-input:focus{border-color:rgba(212,175,55,.7)}
.name-input::placeholder{color:rgba(255,255,255,.25)}
.name-btn{
  margin-top:16px;
  width:100%;padding:14px;
  background:linear-gradient(135deg,#D4AF37,#B8941F);
  color:#1a0a00;font-size:16px;font-weight:800;
  border:none;border-radius:12px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:1px;
  transition:transform .2s, box-shadow .2s;
}
.name-btn:active{transform:scale(.97)}
.name-btn:disabled{opacity:.4;cursor:not-allowed}

/* ============ NIMM PLATZ EIN ============ */
.take-seat-area{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:100;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:30px 20px calc(env(safe-area-inset-bottom, 20px) + 30px);
  background:linear-gradient(180deg,transparent 0%,rgba(10,5,2,.85) 30%,rgba(10,5,2,.97) 100%);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .4s, transform .4s;
}
.take-seat-area.hidden{
  opacity:0;
  pointer-events:none;
  transform:translateY(40px);
}
.take-seat-icon{
  font-size:48px;
  margin-bottom:10px;
  animation:seat-bounce 2s ease-in-out infinite;
}
@keyframes seat-bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.take-seat-text{
  font-family:'Playfair Display',serif;
  font-size:26px;
  font-weight:900;
  background:linear-gradient(135deg,#D4AF37,#F4D03F,#D4AF37);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:2px;
  text-transform:uppercase;
  text-align:center;
}
.take-seat-sub{
  font-size:13px;
  color:rgba(240,230,211,.45);
  margin-top:6px;
  letter-spacing:1px;
  animation:seat-pulse 2s ease-in-out infinite;
}
@keyframes seat-pulse{
  0%,100%{opacity:.4}
  50%{opacity:.8}
}

@media(max-width:600px){
  .take-seat-text{font-size:22px}
  .take-seat-icon{font-size:40px}
  .take-seat-area{padding:24px 16px calc(env(safe-area-inset-bottom, 16px) + 24px)}
}
@media(max-width:375px){
  .take-seat-text{font-size:19px}
  .take-seat-icon{font-size:36px}
}

/* ============ CONTROLS ============ */
.controls{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,rgba(20,10,5,.5),rgba(20,10,5,.95));
  border-top:1px solid rgba(212,175,55,.1);
  padding:12px 16px calc(env(safe-area-inset-bottom, 8px) + 12px);
  display:flex;flex-direction:column;gap:10px;align-items:center;
}
.action-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center}
.btn{
  padding:12px 20px;border-radius:12px;font-family:inherit;font-weight:700;
  font-size:15px;cursor:pointer;transition:.2s;border:none;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
  min-height:44px;min-width:44px;
  -webkit-tap-highlight-color:transparent;
}
.btn-call{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
.btn-raise{background:linear-gradient(135deg,#f39c12,#d68910);color:#fff}
.btn-fold{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}
.btn-check{background:linear-gradient(135deg,#3498db,#2980b9);color:#fff}
.btn-allin{background:linear-gradient(135deg,#D4AF37,#F4D03F);color:#000}
.btn:hover{transform:scale(1.05)}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* Reihe 2: Passen + Erhöhen + Slider in einer Zeile */
.action-row-raise{
  display:flex;gap:6px;align-items:center;justify-content:center;width:100%;
}
/* Slider-Track */
.chip-slider{
  -webkit-appearance:none;appearance:none;
  flex:1;min-width:60px;max-width:160px;height:10px;
  background:linear-gradient(90deg,
    rgba(46,204,113,.4) 0%,
    rgba(243,156,18,.5) 40%,
    rgba(212,175,55,.6) 70%,
    rgba(231,76,60,.5) 100%);
  border-radius:7px;outline:none;cursor:pointer;
  border:2px solid rgba(212,175,55,.2);
  box-shadow:inset 0 2px 4px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.05);
}
/* Chip als Slider-Thumb (Webkit/Chrome/Safari) */
.chip-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:32px;height:32px;border-radius:50%;cursor:grab;
  background:linear-gradient(145deg,#D4AF37,#F4D03F);
  border:2.5px solid #b8960f;
  box-shadow:0 2px 8px rgba(0,0,0,.5), inset 0 1px 3px rgba(255,255,255,.4);
}
.chip-slider::-webkit-slider-thumb:active{cursor:grabbing}
/* Chip als Slider-Thumb (Firefox) */
.chip-slider::-moz-range-thumb{
  width:32px;height:32px;border-radius:50%;cursor:grab;
  background:linear-gradient(145deg,#D4AF37,#F4D03F);
  border:2.5px solid #b8960f;
  box-shadow:0 2px 8px rgba(0,0,0,.5), inset 0 1px 3px rgba(255,255,255,.4);
}
.chip-slider::-moz-range-thumb:active{cursor:grabbing}
/* Track Firefox */
.chip-slider::-moz-range-track{
  height:14px;border-radius:7px;
  background:linear-gradient(90deg,
    rgba(46,204,113,.4) 0%,
    rgba(243,156,18,.5) 40%,
    rgba(212,175,55,.6) 70%,
    rgba(231,76,60,.5) 100%);
  border:2px solid rgba(212,175,55,.2);
}
@media(max-width:600px){
  .chip-slider{max-width:100px;height:8px}
  .chip-slider::-webkit-slider-thumb{width:26px;height:26px}
  .chip-slider::-moz-range-thumb{width:26px;height:26px}
  .action-row-raise{gap:4px}
  .action-row-raise .btn{padding:10px 12px;font-size:11px}
}

/* ============ WINNER BANNER ============ */
.winner-banner{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:200;text-align:center;padding:24px 44px;
  background:linear-gradient(135deg,rgba(212,175,55,.95),rgba(244,208,63,.95));
  color:#000;border-radius:18px;
  font-size:24px;font-weight:900;
  box-shadow:0 0 80px rgba(212,175,55,.6),0 0 20px rgba(212,175,55,.3) inset;
  opacity:0;transition:opacity .5s;pointer-events:none;
}
.winner-banner.show{opacity:1}
.winner-banner .hand{font-size:15px;font-weight:400;margin-top:4px;color:rgba(0,0,0,.7)}
.winner-banner .pot{font-size:18px;font-weight:700;color:#1a5c2e;margin-top:2px}

/* ============ PHASE INFO ============ */
.phase-info{
  position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
  z-index:50;text-align:center;
  font-size:26px;font-weight:900;color:#F4D03F;
  text-shadow:0 0 30px rgba(244,208,63,.6),0 2px 4px rgba(0,0,0,.5);
  pointer-events:none;opacity:0;transition:opacity .5s;
}
.phase-info.show{opacity:1}

/* ============ SPEECH BUBBLES ============ */
.speech-bubble{
  position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.82);color:#F0E6D3;
  padding:5px 10px;border-radius:10px;font-size:11px;
  white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;
  border:1px solid rgba(212,175,55,.3);
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  animation:bubble-in .3s ease-out;
  pointer-events:none;z-index:50;
  backdrop-filter:blur(4px);
}
.speech-bubble::after{
  content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;border-top-color:rgba(0,0,0,.82);
}
@keyframes bubble-in{
  0%{opacity:0;transform:translateX(-50%) translateY(6px) scale(.8)}
  100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
}
@keyframes bubble-out{
  0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-4px) scale(.9)}
}

/* ============ CHAT ============ */
.chat-toggle{
  position:fixed;bottom:130px;right:10px;z-index:30;
  width:36px;height:36px;border-radius:50%;
  background:rgba(20,10,5,.7);border:1px solid rgba(212,175,55,.2);
  color:#D4AF37;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.chat-box{
  position:fixed;bottom:170px;right:8px;z-index:20;
  width:220px;max-height:140px;overflow-y:auto;
  background:rgba(20,10,5,.8);border-radius:10px;padding:8px;
  font-size:11px;color:rgba(240,230,211,.7);
  border:1px solid rgba(212,175,55,.1);
  backdrop-filter:blur(4px);
  display:none;
}
.chat-box.open{display:block}
.chat-msg{margin-bottom:3px}
.chat-msg .name{color:#D4AF37;font-weight:700}
.chat-input-row{
  display:flex;gap:4px;margin-top:6px;
}
.chat-input-row input{
  flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.15);
  color:#F0E6D3;padding:4px 8px;border-radius:6px;font-size:11px;font-family:inherit;
  outline:none;
}
.chat-input-row button{
  background:rgba(212,175,55,.2);border:1px solid rgba(212,175,55,.3);
  color:#D4AF37;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;
}

/* ============ LANTERN GLOW ============ */
.lantern-glow{
  position:fixed;top:5%;left:50%;transform:translateX(-50%);
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,180,50,.08) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ============ BOT TOGGLE ============ */
.bot-controls{
  position:fixed;top:56px;left:12px;z-index:100;
  display:flex;flex-direction:column;gap:5px;
}
.bot-toggle{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:rgba(240,230,211,.6);
  cursor:pointer;user-select:none;
}
.bot-toggle input{display:none}
.bot-switch{
  width:32px;height:18px;border-radius:9px;
  background:rgba(255,255,255,.15);
  position:relative;transition:.2s;flex-shrink:0;
}
.bot-switch::after{
  content:'';position:absolute;top:2px;left:2px;
  width:14px;height:14px;border-radius:50%;
  background:#888;transition:.2s;
}
.bot-toggle input:checked + .bot-switch{background:rgba(76,175,80,.5)}
.bot-toggle input:checked + .bot-switch::after{left:16px;background:#4caf50}
.bot-btn{
  background:rgba(20,10,5,.8);border:1px solid rgba(212,175,55,.25);
  color:#D4AF37;padding:7px 12px;border-radius:8px;cursor:pointer;
  font-family:inherit;font-size:11px;font-weight:700;
  transition:.2s;backdrop-filter:blur(4px);
  display:flex;align-items:center;gap:5px;
}
.bot-btn:hover{background:rgba(212,175,55,.15);border-color:rgba(212,175,55,.5)}
.bot-btn.remove{color:#e74c3c;border-color:rgba(231,76,60,.25)}
.bot-btn.remove:hover{background:rgba(231,76,60,.1);border-color:rgba(231,76,60,.5)}
.bot-badge{
  display:inline-block;font-size:14px;padding:2px 8px;border-radius:6px;
  background:rgba(212,175,55,.15);color:#D4AF37;border:1px solid rgba(212,175,55,.2);
  margin-left:4px;vertical-align:middle;
}
.bot-style-tag{
  font-size:14px;padding:2px 6px;border-radius:5px;
  display:inline-block;margin-top:2px;
}
.bot-style-tag.vorsichtig{background:rgba(52,152,219,.2);color:#5dade2}
.bot-style-tag.normal{background:rgba(46,204,113,.2);color:#2ecc71}
.bot-style-tag.aggressiv{background:rgba(243,156,18,.2);color:#f39c12}
.bot-style-tag.verrückt{background:rgba(231,76,60,.2);color:#e74c3c}

/* ============ AVATAR EDITOR ============ */
.avatar-editor-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.8);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  padding:16px;
}
.avatar-editor-modal{
  background:linear-gradient(135deg,#1a1520,#0f0a14);
  border:2px solid rgba(212,175,55,.3);border-radius:16px;
  width:100%;max-width:380px;max-height:90vh;overflow-y:auto;
  padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.8);
}
.ave-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ave-header h3{color:#D4AF37;font-family:'Playfair Display',serif;font-size:18px;margin:0}
.ave-close{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px 8px}
.ave-close:hover{color:#fff}
.ave-preview{text-align:center;margin-bottom:14px}
.ave-preview-img{
  width:100px;height:100px;border-radius:50%;margin:0 auto 8px;
  border:3px solid rgba(212,175,55,.4);overflow:hidden;
  background:rgba(20,10,5,.5);box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.ave-preview-img img{width:100%;height:100%;object-fit:cover}
.ave-preview-name{color:#D4AF37;font-size:13px;font-weight:700}
.ave-tabs{display:flex;gap:4px;margin-bottom:12px}
.ave-tab{
  flex:1;padding:8px;border:1px solid rgba(212,175,55,.2);
  background:rgba(212,175,55,.05);color:#D4AF37;border-radius:8px;
  font-size:12px;cursor:pointer;font-family:'Playfair Display',serif;
}
.ave-tab.active{background:rgba(212,175,55,.2);border-color:rgba(212,175,55,.5)}
.ave-panel{margin-bottom:12px}
.ave-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ave-preset{
  width:100%;aspect-ratio:1;border-radius:12px;cursor:pointer;
  border:2px solid rgba(212,175,55,.15);background:rgba(20,10,5,.4);
  overflow:hidden;transition:.2s;padding:4px;
}
.ave-preset:hover{border-color:rgba(212,175,55,.5);transform:scale(1.05)}
.ave-preset.selected{border-color:#F4D03F;box-shadow:0 0 12px rgba(244,208,63,.3)}
.ave-preset img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.ave-option{margin-bottom:10px}
.ave-option label{display:block;color:#D4AF37;font-size:11px;margin-bottom:4px;letter-spacing:1px;text-transform:uppercase}
.ave-colors{display:flex;gap:6px;flex-wrap:wrap}
.ave-color{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:2px solid rgba(255,255,255,.1);transition:.2s;
}
.ave-color:hover{transform:scale(1.15)}
.ave-color.selected{border-color:#F4D03F;box-shadow:0 0 8px rgba(244,208,63,.4)}
.ave-choices{display:flex;gap:4px;flex-wrap:wrap}
.ave-choice{
  padding:4px 10px;border-radius:6px;cursor:pointer;
  border:1px solid rgba(212,175,55,.15);background:rgba(212,175,55,.05);
  color:#aaa;font-size:11px;transition:.2s;
}
.ave-choice:hover{border-color:rgba(212,175,55,.4);color:#D4AF37}
.ave-choice.selected{background:rgba(212,175,55,.2);border-color:#F4D03F;color:#F4D03F}
.ave-save{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#D4AF37,#F4D03F);color:#0a0a12;
  font-size:14px;font-weight:900;cursor:pointer;
  font-family:'Playfair Display',serif;letter-spacing:1px;
}
.ave-save:hover{box-shadow:0 0 20px rgba(244,208,63,.4)}
/* Avatar-Edit Button am eigenen Seat */
.seat-avatar-edit{
  position:absolute;bottom:-2px;right:-2px;
  width:16px;height:16px;border-radius:50%;
  background:#D4AF37;color:#000;font-size:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:10;border:1.5px solid #0a0a12;
  box-shadow:0 1px 4px rgba(0,0,0,.5);
}
.seat-avatar-edit:hover{background:#F4D03F;transform:scale(1.1)}

/* ============ AVATAR CANVAS CREATOR ============ */
.acc-canvas-wrap{
  width:200px;height:200px;margin:0 auto 10px;border-radius:50%;overflow:hidden;
  border:3px solid rgba(212,175,55,.4);background:rgba(20,10,5,.5);
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.acc-canvas-wrap canvas{width:100%;height:100%}
.acc-category{margin-bottom:10px}
.acc-category label{display:block;color:#D4AF37;font-size:11px;margin-bottom:4px;letter-spacing:1px;text-transform:uppercase}
.acc-items{display:flex;gap:6px;flex-wrap:wrap}
.acc-item{
  width:42px;height:42px;border-radius:8px;cursor:pointer;
  border:2px solid rgba(212,175,55,.15);background:rgba(20,10,5,.5);

  transition:.2s;
}
.acc-item:hover{border-color:rgba(212,175,55,.5);transform:scale(1.1)}
.acc-item.selected{border-color:#F4D03F;box-shadow:0 0 10px rgba(244,208,63,.3);background:rgba(212,175,55,.15)}
.acc-item-color{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:2px solid rgba(255,255,255,.1);transition:.2s;
}
.acc-item-color:hover{transform:scale(1.15)}
.acc-item-color.selected{border-color:#F4D03F;box-shadow:0 0 8px rgba(244,208,63,.4)}
.acc-scroll{max-height:320px;overflow-y:auto;padding-right:4px}
.acc-scroll::-webkit-scrollbar{width:4px}
.acc-scroll::-webkit-scrollbar-thumb{background:rgba(212,175,55,.3);border-radius:4px}
/* (old avaturn styles removed) */
}
.ave-tab.tab-3d.active{
  background:linear-gradient(135deg,rgba(212,175,55,.25),rgba(155,89,182,.3));
  border-color:rgba(155,89,182,.6);
}

/* ============ VIDEO CHAT (ausklappbar) ============ */
.vc-fab{
  position:fixed;top:calc(env(safe-area-inset-top, 0px) + 50px);right:8px;z-index:150;
  width:44px;height:44px;border-radius:50%;
  background:rgba(20,10,5,.85);border:2px solid rgba(212,175,55,.25);
  color:#D4AF37;font-size:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);transition:.3s;
  -webkit-tap-highlight-color:transparent;min-width:44px;min-height:44px;
}
.vc-fab:hover{background:rgba(212,175,55,.15)}
.vc-fab.connected{border-color:#2ecc71;color:#2ecc71;background:rgba(46,204,113,.15)}

.vc-controls{
  position:fixed;top:calc(env(safe-area-inset-top, 0px) + 96px);right:8px;z-index:150;
  display:flex;flex-direction:column;gap:5px;
  opacity:0;pointer-events:none;transform:translateY(-8px);
  transition:opacity .25s, transform .25s;
}
.vc-controls.open{opacity:1;pointer-events:all;transform:translateY(0)}

.vc-btn{
  width:38px;height:38px;border-radius:50%;border:2px solid rgba(212,175,55,.3);
  background:rgba(20,10,5,.85);color:#D4AF37;font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s;backdrop-filter:blur(4px);
  min-width:44px;min-height:44px;
  -webkit-tap-highlight-color:transparent;
}
.vc-btn:hover{background:rgba(212,175,55,.15);border-color:rgba(212,175,55,.6)}
.vc-btn.active{background:rgba(46,204,113,.2);border-color:#2ecc71;color:#2ecc71}
.vc-btn.muted{background:rgba(231,76,60,.2);border-color:#e74c3c;color:#e74c3c}

/* Video-Grid für nicht-zugeordnete Videos */
.video-grid{
  position:fixed;top:calc(env(safe-area-inset-top, 0px) + 50px);right:54px;z-index:25;
  display:flex;flex-direction:row-reverse;gap:4px;
  max-width:calc(100vw - 70px);overflow-x:auto;
}
.video-tile{
  width:100px;height:75px;border-radius:10px;overflow:hidden;
  background:rgba(20,10,5,.9);border:2px solid rgba(212,175,55,.2);
  position:relative;backdrop-filter:blur(4px);flex-shrink:0;
}
.video-tile video{
  width:100%;height:100%;object-fit:cover;
  transform:scaleX(-1);
}
.video-tile .vt-name{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.8));
  padding:2px 6px;font-size:8px;color:#D4AF37;
  text-align:center;
}
.video-tile .vt-muted{
  position:absolute;top:4px;right:4px;
  font-size:10px;color:#e74c3c;
}
.video-tile.speaking{border-color:#2ecc71;box-shadow:0 0 12px rgba(46,204,113,.4)}
.video-tile.no-video{
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
}
.video-tile.no-video video{display:none}

/* Video direkt am Seat */
.seat-video{

<script>
// iPhone: Prevent bounce scroll, double-tap zoom, pull-to-refresh
document.addEventListener('touchmove', function(e) {
  if (!e.target.closest('.chat-box, .video-grid, .action-row-raise')) e.preventDefault();
}, { passive: false });

// Prevent iOS double-tap zoom on buttons
document.addEventListener('dblclick', function(e) { e.preventDefault(); });

// XSS Protection
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Fix iOS 100vh issue - use real viewport height
function setVH() {
  document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
}
setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', () => setTimeout(setVH, 100));

// ===================== POKER SOUND SYSTEM =====================
const PokerSFX = {
  ctx: null,
  muted: false,

  init() {
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  },

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },

  // Hilfsfunktionen
  _osc(freq, dur, vol, type='sine') {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + dur);
  },

  _noise(dur, vol, freq=4000) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const f = this.ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq; f.Q.value = 2;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(f); f.connect(g); g.connect(this.ctx.destination);
    src.start(t);
  },

  // 🃏 Karte austeilen – echte Karten-Sound MP3
  _cardDealAudio: null,
  cardDeal() {
    if (this.muted) return;
    if (!this._cardDealAudio) this._cardDealAudio = new Audio('/games/sounds/freesound_community-shuffle-cards-46455.mp3');
    const a = this._cardDealAudio.cloneNode();
    a.volume = 0.5;
    a.currentTime = 0.05;
    a.play().catch(() => {});
    setTimeout(() => { if (!a.paused) a.pause(); }, 600);
  },

  // 👀 Karte aufdecken/peek – sanftes Umdrehen
  cardPeek() {
    this._noise(0.06, 0.15, 6000);
    setTimeout(() => this._osc(1200, 0.05, 0.06, 'sine'), 30);
  },

  // 🪙 Chips setzen – Klackern von Chips
  chipBet() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    for (let i = 0; i < 4; i++) {
      const delay = i * 0.035;
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = 'triangle';
      o.frequency.value = 2800 + Math.random() * 1200;
      g.gain.setValueAtTime(0.12, t + delay);
      g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.06);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(t + delay); o.stop(t + delay + 0.06);
    }
    this._noise(0.12, 0.08, 7000);
  },

  // ✅ Check – kurzes Klopfen auf den Tisch
  check() {
    this._noise(0.05, 0.25, 800);
    this._osc(180, 0.08, 0.15, 'sine');
  },

  // ❌ Fold – Karten wegschieben
  fold() {
    if (!this.ctx || this.muted) return;
    this._noise(0.15, 0.12, 3000);
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(500, t);
    o.frequency.exponentialRampToValueAtTime(200, t + 0.2);
    g.gain.setValueAtTime(0.08, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.25);
  },

  // 📈 Raise – aufsteigender Ton + Chips
  raise() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(400, t);
    o.frequency.exponentialRampToValueAtTime(900, t + 0.15);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.25);
    setTimeout(() => this.chipBet(), 100);
  },

  // 📞 Call – bestätigender Doppelton
  call() {
    this._osc(600, 0.08, 0.1, 'triangle');
    setTimeout(() => this._osc(800, 0.08, 0.1, 'triangle'), 90);
    setTimeout(() => this.chipBet(), 120);
  },

  // 🏆 Gewonnen – triumphale Fanfare
  win() {
    if (!this.ctx || this.muted) return;
    const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
    notes.forEach((freq, i) => {
      setTimeout(() => {
        this._osc(freq, 0.3, 0.12, 'triangle');
        this._osc(freq * 0.5, 0.3, 0.06, 'sine');
      }, i * 120);
    });
    // Chip-Regen
    setTimeout(() => {
      for (let i = 0; i < 8; i++) {
        setTimeout(() => {
          this._osc(2500 + Math.random() * 2000, 0.05, 0.06, 'triangle');
        }, i * 40);
      }
    }, 500);
  },

  // 💀 Verloren – absteigender Ton
  lose() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(400, t);
    o.frequency.exponentialRampToValueAtTime(150, t + 0.5);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.6);
  },

  // 🔔 Du bist dran – aufmerksamkeits Glocke
  yourTurn() {
    if (!this.ctx || this.muted) return;
    const notes = [880, 1100, 880]; // A5-C#6-A5
    notes.forEach((freq, i) => {
      setTimeout(() => this._osc(freq, 0.15, 0.1, 'sine'), i * 130);
    });
  },

  // 🃏 Flop/Turn/River – neue Community Cards
  community() {
    if (!this.ctx || this.muted) return;
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        this._noise(0.06, 0.2, 5000);
        this._osc(700 + i * 100, 0.04, 0.05, 'triangle');
      }, i * 100);
    }
  },

  // 🎭 Showdown – dramatischer Reveal
  showdown() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    // Trommelwirbel
    for (let i = 0; i < 12; i++) {
      const d = i * 0.04;
      setTimeout(() => this._noise(0.03, 0.08 + i * 0.01, 1500), d * 1000);
    }
    // Schluss-Gong
    setTimeout(() => {
      this._osc(220, 0.8, 0.12, 'sine');
      this._osc(330, 0.6, 0.08, 'sine');
      this._osc(440, 0.4, 0.06, 'triangle');
    }, 500);
  },

  // 👤 Spieler setzt sich / verlässt
  playerJoin() {
    this._osc(440, 0.1, 0.06, 'sine');
    setTimeout(() => this._osc(660, 0.1, 0.06, 'sine'), 80);
  },

  playerLeave() {
    this._osc(660, 0.1, 0.06, 'sine');
    setTimeout(() => this._osc(440, 0.1, 0.06, 'sine'), 80);
  },

  // 🔘 Button klick
  btnClick() {
    this._osc(1000, 0.03, 0.08, 'square');
    this._noise(0.02, 0.05, 8000);
  },

  // ⏰ Timer tickt – letzte Sekunden
  timerTick() {
    this._osc(600, 0.05, 0.06, 'square');
  }
};

const CardAnim = {
  // Dealer-Position (Mitte oben)
  dealerPos() {
    return { x: window.innerWidth / 2, y: window.innerHeight * 0.15 };
  },

  // Position eines Seats auf dem Bildschirm
  seatPos(seatIdx) {
    const el = document.querySelector(`.seat[data-pos="${seatIdx}"]`);
    if (el) {
      const r = el.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }
    // Fallback: geschätzte Positionen
    const positions = [
      {x: 0.10, y: 0.34}, {x: 0.30, y: 0.29}, {x: 0.50, y: 0.27},
      {x: 0.70, y: 0.29}, {x: 0.90, y: 0.34}, {x: 0.50, y: 0.31}
    ];
    const p = positions[seatIdx] || {x:0.5, y:0.3};
    return { x: window.innerWidth * p.x, y: window.innerHeight * p.y };
  },

  // Community-Karten Position
  communityPos(cardIdx) {
    const cc = document.getElementById('communityCards');
    if (cc) {
      const r = cc.getBoundingClientRect();
      const cardW = r.width / 5;
      return { x: r.left + cardW * cardIdx + cardW / 2, y: r.top + r.height / 2 };
    }
    return { x: window.innerWidth * (0.3 + cardIdx * 0.1), y: window.innerHeight * 0.54 };
  },

  // Meine Hand Position
  myHandPos() {
    const h = document.getElementById('myHand');
    if (h) {
      const r = h.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }
    return { x: window.innerWidth / 2, y: window.innerHeight * 0.85 };
  },

  // Pot/Mitte Position
  centerPos() {
    return { x: window.innerWidth / 2, y: window.innerHeight * 0.48 };
  },

  // Fliegende Karte erstellen und animieren
  flyCard(from, to, opts = {}) {
    const card = document.createElement('div');
    card.className = 'flying-card ' + (opts.cls || 'face-down');
    if (opts.content) card.innerHTML = opts.content;
    card.style.left = from.x - 16 + 'px';
    card.style.top = from.y - 23 + 'px';
    card.style.transform = `rotate(${opts.startRot || 0}deg) scale(${opts.startScale || 0.5})`;
    card.style.opacity = '1';
    document.body.appendChild(card);

    const dur = opts.duration || 400;
    const endRot = opts.endRot || (Math.random() * 10 - 5);
    const endScale = opts.endScale || 1;

    requestAnimationFrame(() => {
      card.style.transition = `left ${dur}ms ease-out, top ${dur}ms ease-out, transform ${dur}ms ease-out, opacity ${dur}ms ease`;
      card.style.left = to.x - 16 + 'px';
      card.style.top = to.y - 23 + 'px';
      card.style.transform = `rotate(${endRot}deg) scale(${endScale})`;
      if (opts.fadeOut) card.style.opacity = '0';
    });

    setTimeout(() => card.remove(), dur + 50);
  },

  // Karten austeilen: vom Dealer zu jedem Spieler
  animateDeal(seatIndices) {
    const dealer = this.dealerPos();
    seatIndices.forEach((seatIdx, i) => {
      // Zwei Karten pro Spieler
      setTimeout(() => {
        this.flyCard(dealer, this.seatPos(seatIdx), { duration: 350, startRot: -20, endRot: -8 + Math.random() * 6 });
        PokerSFX.cardDeal();
      }, i * 120);
      setTimeout(() => {
        this.flyCard(dealer, this.seatPos(seatIdx), { duration: 350, startRot: 20, endRot: 3 + Math.random() * 6 });
        PokerSFX.cardDeal();
      }, i * 120 + 80);
    });
    // Karten zum eigenen Hand-Bereich (nur wenn am Tisch)
    if (mySeat >= 0) {
      const myIdx = seatIndices.length;
      setTimeout(() => {
        this.flyCard(dealer, this.myHandPos(), { duration: 400, startScale: 0.4, endScale: 1.2, startRot: -15 });
        PokerSFX.cardDeal();
      }, myIdx * 120);
      setTimeout(() => {
        this.flyCard(dealer, this.myHandPos(), { duration: 400, startScale: 0.4, endScale: 1.2, startRot: 15 });
        PokerSFX.cardDeal();
      }, myIdx * 120 + 80);
    }
  },

  // Community-Karten: fliegen zur Mitte
  animateCommunity(count, offset) {
    const dealer = this.dealerPos();
    for (let i = 0; i < count; i++) {
      const cardIdx = offset + i; // Flop: offset=0 → 0,1,2 | Turn: offset=3 → 3 | River: offset=4 → 4
      setTimeout(() => {
        this.flyCard(dealer, this.communityPos(cardIdx), { duration: 350, startRot: -10, endRot: 0 });
        PokerSFX.cardDeal();
      }, i * 120);
    }
  },

  // Fold: Karten fliegen zur Mitte und verschwinden
  animateFold(seatIdx) {
    const from = this.seatPos(seatIdx);
    const to = this.centerPos();
    this.flyCard(from, to, { cls: 'fold-card', duration: 350, fadeOut: true, startRot: -10, endRot: 30, endScale: 0.6 });
    setTimeout(() => {
      this.flyCard({ x: from.x + 8, y: from.y + 4 }, to, { cls: 'fold-card', duration: 350, fadeOut: true, startRot: 10, endRot: -20, endScale: 0.6 });
    }, 60);
  },

  // Gewinner: Chips/Karten fliegen zum Gewinner
  animateWin(seatIdx) {
    const to = this.seatPos(seatIdx);
    const center = this.centerPos();
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        const from = { x: center.x + (Math.random() - 0.5) * 60, y: center.y + (Math.random() - 0.5) * 30 };
        this.flyCard(from, to, { cls: 'face-down', duration: 300 + Math.random() * 200, endScale: 0.3, fadeOut: true });
      }, i * 80);
    }
  }
};

function initSeatDrag(el, seatIdx) {
  // Im Embed-Mode: kein Dragging
  if (document.body.classList.contains('embed-mode')) return;
  let isDragging = false;
  let startX, startY, origLeft, origTop;
  let dragMoved = false;

  function getPos(e) {
    if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onStart(e) {
    if (el.classList.contains('you')) return;
    const pos = getPos(e);
    startX = pos.x; startY = pos.y;
    // getBoundingClientRect berücksichtigt transform:translate(-50%,-50%)
    const r = el.getBoundingClientRect();
    origLeft = r.left + r.width/2; // center X (wegen translate -50%)
    origTop = r.top + r.height/2;  // center Y
    isDragging = true; dragMoved = false;
    el.classList.add('dragging');
  }

  function onMove(e) {
    if (!isDragging) return;
    const pos = getPos(e);
    const dx = pos.x - startX;
    const dy = pos.y - startY;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) dragMoved = true;
    if (!dragMoved) return;
    e.preventDefault();
    const newLeft = origLeft + dx;
    const newTop = origTop + dy;
    const maxX = window.innerWidth - 20;
    const maxY = window.innerHeight - 20;
    // Setze pixel-Position (transform translate(-50%,-50%) zentriert automatisch)
    el.style.left = Math.max(10, Math.min(maxX, newLeft)) + 'px';
    el.style.top = Math.max(40, Math.min(maxY, newTop)) + 'px';
  }

  function onEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    el.classList.remove('dragging');
    el._dragMoved = dragMoved;
    if (dragMoved) {
      seatPositions[seatIdx] = { top: el.style.top, left: el.style.left };
      saveSeatPositions();
    }
    // Reset nach kurzem Delay (damit onclick den Status noch lesen kann)
    setTimeout(() => { el._dragMoved = false; }, 50);
  }

  el.addEventListener('mousedown', onStart);
  el.addEventListener('touchstart', onStart, { passive: true });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
}
