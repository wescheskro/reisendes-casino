<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reisendes Casino">
<meta name="theme-color" content="#0a0a05">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/games/img/icon-192.png">
<title>Poker – Reisendes Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;background:#0a0a05;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
body{font-family:'Playfair Display',serif;color:#F0E6D3;user-select:none;-webkit-user-select:none;touch-action:manipulation;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

/* ============ WOHNWAGEN BACKGROUND ============ */
.wagen-bg{
  position:fixed;inset:0;z-index:0;
  background:url('/games/img/poker-bg.png') center center / cover no-repeat;
}
.wagen-bg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 55%, rgba(0,0,0,.15) 0%, rgba(0,0,0,.5) 60%, rgba(0,0,0,.75) 100%);
}


/* ============ TOP BAR ============ */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:calc(env(safe-area-inset-top, 0px) + 8px) calc(env(safe-area-inset-right, 0px) + 16px) 8px calc(env(safe-area-inset-left, 0px) + 16px);
  background:linear-gradient(180deg,rgba(30,18,8,.95),rgba(30,18,8,.6));
  border-bottom:1px solid rgba(212,175,55,.15);
}
.top-bar .logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:#D4AF37}
.top-bar .back{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);color:#D4AF37;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;transition:.2s;min-height:44px;min-width:44px;display:flex;align-items:center}
.top-bar .back:hover{background:rgba(212,175,55,.2)}
.top-bar .info{font-size:12px;color:rgba(240,230,211,.5)}

/* ============ POT & COMMUNITY ============ */
.community-area{
  position:fixed;top:54%;left:50%;transform:translate(-50%,-50%);
  text-align:center;z-index:10;
  width:100%;
  padding:0 8px;
  box-sizing:border-box;
}
.pot-display{
  font-size:18px;color:#F4D03F;margin-bottom:12px;
  background:rgba(20,10,5,.75);padding:8px 28px;border-radius:24px;
  display:inline-block;border:1px solid rgba(212,175,55,.3);
  backdrop-filter:blur(4px);
}
.pot-display .amount{font-size:32px;font-weight:900}
.community-cards{
  display:flex;gap:6px;justify-content:center;
  min-height:100px;align-items:center;
  width:100%;
}
.phase-label{font-size:12px;color:rgba(240,230,211,.4);margin-top:10px;text-transform:uppercase;letter-spacing:3px}

/* ============ FLIEGENDE KARTEN ANIMATION ============ */
.flying-card{
  position:fixed;
  width:32px;height:46px;
  border-radius:5px;
  z-index:9999;
  pointer-events:none;
  transition:none;
  box-shadow:0 4px 16px rgba(0,0,0,.6);
}
.flying-card.face-down{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:1.5px solid rgba(212,175,55,.5);
}
.flying-card.face-up{
  background:linear-gradient(165deg,#fff,#f0ece3);
  border:1.5px solid rgba(212,175,55,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;
}
.flying-card.face-up.red{color:#c0392b}
.flying-card.fold-card{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:1.5px solid rgba(212,175,55,.3);
  opacity:.7;
}

/* ============ CARDS (Community / Flop – volle Breite) ============ */
.card{
  flex:1;
  max-width:80px;height:auto;aspect-ratio:5/7;
  border-radius:8px;
  background:linear-gradient(165deg,#ffffff 0%,#f9f7f2 30%,#f0ece3 70%,#e8e2d6 100%);
  color:#1a1a2e;
  font-weight:900;
  box-shadow:0 4px 14px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.5) inset,0 -1px 0 rgba(0,0,0,.08) inset;
  transition:transform .3s;
  position:relative;
  overflow:hidden;
  border:1.5px solid rgba(180,170,150,.35);
}
/* Inner card pattern – subtle linen texture */
.card::before{
  content:'';position:absolute;inset:3px;border-radius:5px;
  border:1px solid rgba(150,140,120,.12);
  pointer-events:none;z-index:1;
}
/* Corner index – top left */
.card .corner-tl{
  position:absolute;top:3px;left:4px;
  display:flex;flex-direction:column;align-items:center;
  line-height:1;z-index:2;
}
.card .corner-tl .c-rank{font-size:13px;font-weight:800;font-family:'Playfair Display',serif}
.card .corner-tl .c-suit{font-size:10px;line-height:1}
/* Corner index – bottom right (rotated) */
.card .corner-br{
  position:absolute;bottom:3px;right:4px;
  display:flex;flex-direction:column;align-items:center;
  line-height:1;z-index:2;
  transform:rotate(180deg);
}
.card .corner-br .c-rank{font-size:13px;font-weight:800;font-family:'Playfair Display',serif}
.card .corner-br .c-suit{font-size:10px;line-height:1}
/* Center suit – big */
.card .center-suit{
  font-size:clamp(24px,4vw,36px);
  z-index:2;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.08));
}
.card.red{color:#c0392b}
.card.black{color:#1a1a2e}
.card.hidden{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:2px solid rgba(212,175,55,.5);
  color:transparent;font-size:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.card.hidden::before{display:none}
.card.hidden .card-back-design{display:none}
.card.empty-slot{
  background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.08);
  box-shadow:none;
}
.card.empty-slot::before{display:none}

/* ============ SEATS (oberer Bereich, ÜBER dem Pot) ============ */
.seats-container{
  position:fixed;inset:0;z-index:12;pointer-events:none;
}
.seat{
  position:absolute;pointer-events:all;
  width:clamp(70px,15vw,105px);
  text-align:center;cursor:grab;
  transform:translate(-50%,-50%);
  touch-action:none;
}
.seat.dragging{cursor:grabbing;z-index:50;opacity:.85}
/* Gegner – mittig zwischen Top-Bar und Pot */
.seat[data-pos="0"]{top:34%;left:10%}
.seat[data-pos="1"]{top:29%;left:30%}
.seat[data-pos="2"]{top:27%;left:50%}
.seat[data-pos="3"]{top:29%;left:70%}
.seat[data-pos="4"]{top:34%;left:90%}
.seat[data-pos="5"]{top:31%;left:50%}
/* Eigener Sitz: komplett ausblenden (große Hand-Anzeige unten übernimmt) */
.seat.you{display:none!important}

.seat-inner{
  background:rgba(20,10,5,.85);border-radius:8px;padding:4px 3px 5px;
  border:2px solid rgba(212,175,55,.12);transition:.3s;
  backdrop-filter:blur(4px);
}
.seat.active .seat-inner{
  border-color:#F4D03F;
  box-shadow:0 0 16px rgba(244,208,63,.35),0 0 6px rgba(244,208,63,.2) inset;
  animation:pulse-glow 1.5s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 16px rgba(244,208,63,.35)}
  50%{box-shadow:0 0 28px rgba(244,208,63,.5)}
}
.seat.folded .seat-inner{opacity:.3;filter:grayscale(.5)}

.seat-cards{display:flex;gap:0;justify-content:center;min-height:36px;align-items:center;position:relative}
.seat-cards .card{
  width:28px !important;height:40px !important;
  flex:0 0 28px !important;aspect-ratio:auto !important;max-width:none !important;
  border-radius:4px;font-size:9px;
  box-shadow:0 2px 6px rgba(0,0,0,.4) !important;
  transition:transform .4s ease, box-shadow .4s ease;
}
/* Karten liegen wie echt auf dem Tisch – leicht versetzt und angewinkelt */
.seat-cards .card:nth-child(1){
  transform:rotate(-8deg) translateX(3px);
  z-index:1;
}
.seat-cards .card:nth-child(2){
  transform:rotate(8deg) translateX(-3px);
  z-index:2;
}
/* Peek-Animation: Karte hebt sich leicht an */
.seat.peeking .seat-cards .card:nth-child(1){
  transform:rotate(-12deg) translateX(3px) translateY(-6px);
  box-shadow:0 6px 16px rgba(0,0,0,.6) !important;
}
.seat.peeking .seat-cards .card:nth-child(2){
  transform:rotate(12deg) translateX(-3px) translateY(-6px);
  box-shadow:0 6px 16px rgba(0,0,0,.6) !important;
}
.seat.peeking .seat-inner::after{
  content:'👀';
  position:absolute;top:-16px;right:-6px;
  font-size:14px;z-index:10;
  animation:peekBounce .6s ease-in-out;
}
@keyframes peekBounce{
  0%{transform:scale(0);opacity:0}
  50%{transform:scale(1.3);opacity:1}
  100%{transform:scale(1);opacity:1}
}
.seat-cards .card .corner-tl{top:2px;left:2px}
.seat-cards .card .corner-tl .c-rank{font-size:8px}
.seat-cards .card .corner-tl .c-suit{font-size:5px}
.seat-cards .card .corner-br{display:none}
.seat-cards .card .center-suit{font-size:13px}
.seat-cards .card::before{inset:1px;border-radius:3px}

.seat-name{
  font-size:9px;color:#D4AF37;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:100%;line-height:1.1;
}
.seat.you .seat-name{color:#F4D03F;font-weight:700}
.seat-chips{font-size:8px;color:rgba(240,230,211,.55)}
.seat-bet-bubble{
  font-size:8px;color:#F4D03F;
  background:rgba(0,0,0,.65);padding:1px 6px;border-radius:8px;
  display:inline-block;margin-top:1px;
  border:1px solid rgba(212,175,55,.15);
}
.seat-hand{font-size:8px;font-weight:700;color:#4d4;margin-top:1px}
.dealer-chip{
  position:absolute;top:-6px;right:-6px;
  width:18px;height:18px;border-radius:50%;
  background:linear-gradient(135deg,#D4AF37,#F4D03F);color:#000;
  font-size:9px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
  border:1.5px solid rgba(139,105,20,.6);
}

/* EMPTY SEAT */
.seat.empty .seat-inner{opacity:.2}
.seat.empty:hover .seat-inner{opacity:.55;border-color:rgba(212,175,55,.3)}
.seat.empty .seat-cards{display:flex;align-items:center;justify-content:center}
.seat.empty .seat-cards::after{
  content:'+';font-size:14px;color:rgba(212,175,55,.25);
  width:26px;height:36px;border:2px dashed rgba(212,175,55,.15);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
}

/* ============ MEINE HAND (große Karten-Anzeige) ============ */
.my-hand{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:99;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:12px;
  pointer-events:none;
  padding:0 20px;
  opacity:0;
  transform:translateY(80px);
  transition:opacity .4s ease, transform .4s ease;
}
.my-hand.visible{
  opacity:1;
  transform:translateY(0);
}
/* Flip Container */
.my-hand .hand-card-wrap{
  width:190px;height:270px;
  pointer-events:auto;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
.my-hand .hand-card-wrap:nth-child(1){
  transform:rotate(-6deg) translateY(-8px);
}
.my-hand .hand-card-wrap:nth-child(2){
  transform:rotate(6deg) translateY(-8px);
}
/* Face & Back übereinander */
.my-hand .hand-card-face,
.my-hand .hand-card-back{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border-radius:14px;
  overflow:hidden;
  transition:opacity .3s ease, transform .3s ease;
}
/* FRONT (card face) */
.my-hand .hand-card-face{
  background:linear-gradient(165deg,#ffffff 0%,#f9f7f2 30%,#f0ece3 70%,#e8e2d6 100%);
  color:#1a1a2e;
  font-weight:900;
  box-shadow:0 14px 50px rgba(0,0,0,.7),0 0 0 3px rgba(255,255,255,.2),0 0 35px rgba(244,208,63,.2);
  border:3px solid rgba(212,175,55,.45);
  opacity:1;z-index:2;
}
/* Inner border like real playing cards */
.my-hand .hand-card-face::before{
  content:'';position:absolute;inset:8px;border-radius:8px;
  border:1px solid rgba(150,140,120,.15);
  pointer-events:none;z-index:1;
}
.my-hand .hand-card-face.red{color:#c0392b}
/* BACK (face-down) */
.my-hand .hand-card-back{
  background:url('img/card-back.jpg') center/cover no-repeat;
  border:3px solid rgba(212,175,55,.5);
  border-radius:14px;
  box-shadow:0 14px 50px rgba(0,0,0,.7),0 0 0 3px rgba(255,255,255,.2);
  z-index:1;
}
/* Verdeckt: Back oben, Face versteckt */
.my-hand .hand-card-wrap.flipped .hand-card-face{
  opacity:0;z-index:1;
}
.my-hand .hand-card-wrap.flipped .hand-card-back{
  z-index:2;
}
/* Corner top-left */
.my-hand .hand-card-face .h-corner-tl{
  position:absolute;top:12px;left:14px;
  display:flex;flex-direction:column;align-items:center;
  line-height:1;z-index:2;
}
.my-hand .hand-card-face .h-corner-tl .hc-rank{
  font-size:40px;font-weight:900;line-height:1;
  font-family:'Playfair Display',serif;
}
.my-hand .hand-card-face .h-corner-tl .hc-suit{font-size:30px;line-height:1;margin-top:-2px}
/* Corner bottom-right (upside down) */
.my-hand .hand-card-face .h-corner-br{
  position:absolute;bottom:12px;right:14px;
  display:flex;flex-direction:column;align-items:center;
  line-height:1;z-index:2;
  transform:rotate(180deg);
}
.my-hand .hand-card-face .h-corner-br .hc-rank{
  font-size:40px;font-weight:900;line-height:1;
  font-family:'Playfair Display',serif;
}
.my-hand .hand-card-face .h-corner-br .hc-suit{font-size:30px;line-height:1;margin-top:-2px}
/* Center suit – hero */
.my-hand .hand-card-face .h-center-suit{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:85px;z-index:2;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.1));
}

/* Beide-Karten-Button */
.hand-flip-both{
  align-self:center;
  pointer-events:auto;
  cursor:pointer;
  font-size:28px;
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(20,10,5,.7);
  border:2px solid rgba(212,175,55,.4);
  border-radius:50%;
  transition:transform .2s, background .2s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  margin:0 -8px;
  z-index:5;
}
.hand-flip-both:active{
  transform:scale(1.15);
  background:rgba(212,175,55,.3);
}

/* Chips-Info neben den Karten */
.my-hand .hand-info{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:4px;
  align-self:center;
  pointer-events:none;
}
.my-hand .hand-chips{
  font-size:18px;font-weight:700;color:#F4D03F;
  background:rgba(0,0,0,.6);padding:6px 16px;border-radius:12px;
  border:1px solid rgba(212,175,55,.2);
  white-space:nowrap;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
.my-hand .hand-bet{
  font-size:14px;color:rgba(244,208,63,.7);
  white-space:nowrap;
}

/* Hand-Label (zeigt "Deine Hand" oder Handname) */
.my-hand-label{
  position:fixed;
  z-index:99;
  left:50%;transform:translateX(-50%);
  font-size:11px;
  color:rgba(244,208,63,.7);
  text-transform:uppercase;
  letter-spacing:2px;
  font-weight:700;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
  opacity:0;
  transition:opacity .4s;
  pointer-events:none;
}
.my-hand-label.visible{opacity:1}

/* Mobile: Hand angepasst */
@media(max-width:600px){
  .my-hand .hand-card-wrap{width:150px;height:215px}
  .my-hand .hand-card-face .h-corner-tl .hc-rank{font-size:34px}
  .my-hand .hand-card-face .h-corner-tl .hc-suit{font-size:24px}
  .my-hand .hand-card-face .h-corner-br .hc-rank{font-size:34px}
  .my-hand .hand-card-face .h-corner-br .hc-suit{font-size:24px}
  .my-hand .hand-card-face .h-center-suit{font-size:68px}
  .my-hand{gap:10px}
}
@media(max-width:375px){
  .my-hand .hand-card-wrap{width:125px;height:180px}
  .my-hand .hand-card-face .h-corner-tl .hc-rank{font-size:28px}
  .my-hand .hand-card-face .h-corner-tl .hc-suit{font-size:20px}
  .my-hand .hand-card-face .h-corner-br .hc-rank{font-size:28px}
  .my-hand .hand-card-face .h-corner-br .hc-suit{font-size:20px}
  .my-hand .hand-card-face .h-center-suit{font-size:55px}
  .my-hand{gap:8px}
}
@media(max-height:450px) and (orientation:landscape){
  .my-hand .hand-card-wrap{width:110px;height:158px}
  .my-hand .hand-card-face .h-corner-tl .hc-rank{font-size:24px}
  .my-hand .hand-card-face .h-corner-tl .hc-suit{font-size:18px}
  .my-hand .hand-card-face .h-corner-br{display:none}
  .my-hand .hand-card-face .h-center-suit{font-size:48px}
  .my-hand{gap:6px}
}

/* ============ NAME OVERLAY ============ */
.name-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.85);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
}
.name-overlay.hidden{display:none}
.name-dialog{
  background:linear-gradient(165deg,rgba(30,15,5,.95),rgba(15,8,2,.98));
  border:2px solid rgba(212,175,55,.5);
  border-radius:20px;
  padding:40px 35px;
  text-align:center;
  max-width:320px;width:90%;
  box-shadow:0 0 60px rgba(212,175,55,.15),0 20px 60px rgba(0,0,0,.6);
}
.name-icon{font-size:48px;margin-bottom:12px}
.name-title{
  font-size:20px;font-weight:800;color:#F4D03F;
  font-family:'Playfair Display',serif;
  margin-bottom:6px;
}
.name-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px}
.name-input{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,.08);
  border:2px solid rgba(212,175,55,.3);
  border-radius:12px;
  color:#fff;font-size:18px;font-weight:700;
  text-align:center;
  outline:none;
  transition:border-color .3s;
}
.name-input:focus{border-color:rgba(212,175,55,.7)}
.name-input::placeholder{color:rgba(255,255,255,.25)}
.name-btn{
  margin-top:16px;
  width:100%;padding:14px;
  background:linear-gradient(135deg,#D4AF37,#B8941F);
  color:#1a0a00;font-size:16px;font-weight:800;
  border:none;border-radius:12px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:1px;
  transition:transform .2s, box-shadow .2s;
}
.name-btn:active{transform:scale(.97)}
.name-btn:disabled{opacity:.4;cursor:not-allowed}

/* ============ NIMM PLATZ EIN ============ */
.take-seat-area{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:100;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:30px 20px calc(env(safe-area-inset-bottom, 20px) + 30px);
  background:linear-gradient(180deg,transparent 0%,rgba(10,5,2,.85) 30%,rgba(10,5,2,.97) 100%);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .4s, transform .4s;
}
.take-seat-area.hidden{
  opacity:0;
  pointer-events:none;
  transform:translateY(40px);
}
.take-seat-icon{
  font-size:48px;
  margin-bottom:10px;
  animation:seat-bounce 2s ease-in-out infinite;
}
@keyframes seat-bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.take-seat-text{
  font-family:'Playfair Display',serif;
  font-size:26px;
  font-weight:900;
  background:linear-gradient(135deg,#D4AF37,#F4D03F,#D4AF37);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:2px;
  text-transform:uppercase;
  text-align:center;
}
.take-seat-sub{

/* ============ CONTROLS ============ */
.controls{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,rgba(20,10,5,.5),rgba(20,10,5,.95));
  border-top:1px solid rgba(212,175,55,.1);
  padding:12px 16px calc(env(safe-area-inset-bottom, 8px) + 12px);
  display:flex;flex-direction:column;gap:10px;align-items:center;
}
.action-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center}
.btn{
  padding:12px 20px;border-radius:12px;font-family:inherit;font-weight:700;
  font-size:15px;cursor:pointer;transition:.2s;border:none;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
  min-height:44px;min-width:44px;
  -webkit-tap-highlight-color:transparent;
}
.btn-call{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
.btn-raise{background:linear-gradient(135deg,#f39c12,#d68910);color:#fff}
.btn-fold{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}
.btn-check{background:linear-gradient(135deg,#3498db,#2980b9);color:#fff}
.btn-allin{background:linear-gradient(135deg,#D4AF37,#F4D03F);color:#000}
.btn:hover{transform:scale(1.05)}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* Reihe 2: Passen + Erhöhen + Slider in einer Zeile */
.action-row-raise{
  display:flex;gap:6px;align-items:center;justify-content:center;width:100%;
}
/* Slider-Track */
.chip-slider{
  -webkit-appearance:none;appearance:none;
  flex:1;min-width:60px;max-width:160px;height:10px;
  background:linear-gradient(90deg,
    rgba(46,204,113,.4) 0%,
    rgba(243,156,18,.5) 40%,
    rgba(212,175,55,.6) 70%,
    rgba(231,76,60,.5) 100%);
  border-radius:7px;outline:none;cursor:pointer;
  border:2px solid rgba(212,175,55,.2);
  box-shadow:inset 0 2px 4px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.05);
}
/* Chip als Slider-Thumb (Webkit/Chrome/Safari) */
.chip-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:32px;height:32px;border-radius:50%;cursor:grab;
  background:linear-gradient(145deg,#D4AF37,#F4D03F);
  border:2.5px solid #b8960f;
  box-shadow:0 2px 8px rgba(0,0,0,.5), inset 0 1px 3px rgba(255,255,255,.4);
}
.chip-slider::-webkit-slider-thumb:active{cursor:grabbing}
/* Chip als Slider-Thumb (Firefox) */
.chip-slider::-moz-range-thumb{
  width:32px;height:32px;border-radius:50%;cursor:grab;
  background:linear-gradient(145deg,#D4AF37,#F4D03F);
  border:2.5px solid #b8960f;
  box-shadow:0 2px 8px rgba(0,0,0,.5), inset 0 1px 3px rgba(255,255,255,.4);
}
.chip-slider::-moz-range-thumb:active{cursor:grabbing}
/* Track Firefox */
.chip-slider::-moz-range-track{
  height:14px;border-radius:7px;
  background:linear-gradient(90deg,
    rgba(46,204,113,.4) 0%,
    rgba(243,156,18,.5) 40%,
    rgba(212,175,55,.6) 70%,
    rgba(231,76,60,.5) 100%);
  border:2px solid rgba(212,175,55,.2);
}
@media(max-width:600px){

<script>
// iPhone: Prevent bounce scroll, double-tap zoom, pull-to-refresh
document.addEventListener('touchmove', function(e) {
  if (!e.target.closest('.chat-box, .video-grid, .action-row-raise')) e.preventDefault();
}, { passive: false });

// Prevent iOS double-tap zoom on buttons
document.addEventListener('dblclick', function(e) { e.preventDefault(); });

// Fix iOS 100vh issue - use real viewport height
function setVH() {
  document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
}
setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', () => setTimeout(setVH, 100));

// ===================== POKER SOUND SYSTEM =====================
const PokerSFX = {
  ctx: null,
  muted: false,

  init() {
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  },

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },

  // Hilfsfunktionen
  _osc(freq, dur, vol, type='sine') {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + dur);
  },

  _noise(dur, vol, freq=4000) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const f = this.ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq; f.Q.value = 2;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(f); f.connect(g); g.connect(this.ctx.destination);
    src.start(t);
  },

  // 🃏 Karte austeilen – schnelles "Fwipp"
  cardDeal() {
    this._noise(0.08, 0.3, 5000);
    this._osc(800, 0.04, 0.08, 'triangle');
  },

  // 👀 Karte aufdecken/peek – sanftes Umdrehen
  cardPeek() {
    this._noise(0.06, 0.15, 6000);
    setTimeout(() => this._osc(1200, 0.05, 0.06, 'sine'), 30);
  },

  // 🪙 Chips setzen – Klackern von Chips
  chipBet() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    for (let i = 0; i < 4; i++) {
      const delay = i * 0.035;
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = 'triangle';
      o.frequency.value = 2800 + Math.random() * 1200;
      g.gain.setValueAtTime(0.12, t + delay);
      g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.06);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(t + delay); o.stop(t + delay + 0.06);
    }
    this._noise(0.12, 0.08, 7000);
  },

  // ✅ Check – kurzes Klopfen auf den Tisch
  check() {
    this._noise(0.05, 0.25, 800);
    this._osc(180, 0.08, 0.15, 'sine');
  },

  // ❌ Fold – Karten wegschieben
  fold() {
    if (!this.ctx || this.muted) return;
    this._noise(0.15, 0.12, 3000);
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(500, t);
    o.frequency.exponentialRampToValueAtTime(200, t + 0.2);
    g.gain.setValueAtTime(0.08, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.25);
  },

  // 📈 Raise – aufsteigender Ton + Chips
  raise() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(400, t);
    o.frequency.exponentialRampToValueAtTime(900, t + 0.15);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.25);
    setTimeout(() => this.chipBet(), 100);
  },

  // 📞 Call – bestätigender Doppelton
  call() {
    this._osc(600, 0.08, 0.1, 'triangle');
    setTimeout(() => this._osc(800, 0.08, 0.1, 'triangle'), 90);
    setTimeout(() => this.chipBet(), 120);
  },

  // 🏆 Gewonnen – triumphale Fanfare
  win() {
    if (!this.ctx || this.muted) return;
    const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
    notes.forEach((freq, i) => {
      setTimeout(() => {
        this._osc(freq, 0.3, 0.12, 'triangle');
        this._osc(freq * 0.5, 0.3, 0.06, 'sine');
      }, i * 120);
    });
    // Chip-Regen
    setTimeout(() => {
      for (let i = 0; i < 8; i++) {
        setTimeout(() => {
          this._osc(2500 + Math.random() * 2000, 0.05, 0.06, 'triangle');
        }, i * 40);
      }
    }, 500);
  },

  // 💀 Verloren – absteigender Ton
  lose() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(400, t);
    o.frequency.exponentialRampToValueAtTime(150, t + 0.5);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.6);
  },

  // 🔔 Du bist dran – aufmerksamkeits Glocke
  yourTurn() {
    if (!this.ctx || this.muted) return;
    const notes = [880, 1100, 880]; // A5-C#6-A5
    notes.forEach((freq, i) => {
      setTimeout(() => this._osc(freq, 0.15, 0.1, 'sine'), i * 130);
    });
  },

  // 🃏 Flop/Turn/River – neue Community Cards
  community() {
    if (!this.ctx || this.muted) return;
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        this._noise(0.06, 0.2, 5000);
        this._osc(700 + i * 100, 0.04, 0.05, 'triangle');
      }, i * 100);
    }
  },

  // 🎭 Showdown – dramatischer Reveal
  showdown() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    // Trommelwirbel
    for (let i = 0; i < 12; i++) {
      const d = i * 0.04;
      setTimeout(() => this._noise(0.03, 0.08 + i * 0.01, 1500), d * 1000);
    }
    // Schluss-Gong
    setTimeout(() => {
      this._osc(220, 0.8, 0.12, 'sine');
      this._osc(330, 0.6, 0.08, 'sine');
      this._osc(440, 0.4, 0.06, 'triangle');
    }, 500);
  },

  // 👤 Spieler setzt sich / verlässt
  playerJoin() {
    this._osc(440, 0.1, 0.06, 'sine');
    setTimeout(() => this._osc(660, 0.1, 0.06, 'sine'), 80);
  },

  playerLeave() {
    this._osc(660, 0.1, 0.06, 'sine');
    setTimeout(() => this._osc(440, 0.1, 0.06, 'sine'), 80);
  },

  // 🔘 Button klick
  btnClick() {
    this._osc(1000, 0.03, 0.08, 'square');
    this._noise(0.02, 0.05, 8000);
  },

  // ⏰ Timer tickt – letzte Sekunden
  timerTick() {
    this._osc(600, 0.05, 0.06, 'square');
  }
};

// ===================== KARTEN-FLUG-ANIMATIONEN =====================
const CardAnim = {
  // Dealer-Position (Mitte oben)
  dealerPos() {
    return { x: window.innerWidth / 2, y: window.innerHeight * 0.15 };
  },

  // Position eines Seats auf dem Bildschirm
  seatPos(seatIdx) {
    const el = document.querySelector(`.seat[data-pos="${seatIdx}"]`);
    if (el) {
      const r = el.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }
    // Fallback: geschätzte Positionen
    const positions = [
      {x: 0.10, y: 0.34}, {x: 0.30, y: 0.29}, {x: 0.50, y: 0.27},
      {x: 0.70, y: 0.29}, {x: 0.90, y: 0.34}, {x: 0.50, y: 0.31}
    ];
    const p = positions[seatIdx] || {x:0.5, y:0.3};
    return { x: window.innerWidth * p.x, y: window.innerHeight * p.y };
  },

  // Community-Karten Position
  communityPos(cardIdx) {
    const cc = document.getElementById('communityCards');
    if (cc) {
      const r = cc.getBoundingClientRect();
      const cardW = r.width / 5;
      return { x: r.left + cardW * cardIdx + cardW / 2, y: r.top + r.height / 2 };
    }
    return { x: window.innerWidth * (0.3 + cardIdx * 0.1), y: window.innerHeight * 0.54 };
  },

  // Meine Hand Position
  myHandPos() {
    const h = document.getElementById('myHand');
    if (h) {
      const r = h.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }
    return { x: window.innerWidth / 2, y: window.innerHeight * 0.85 };
  },

  // Pot/Mitte Position
  centerPos() {
    return { x: window.innerWidth / 2, y: window.innerHeight * 0.48 };
  },

  // Fliegende Karte erstellen und animieren
  flyCard(from, to, opts = {}) {
    const card = document.createElement('div');
    card.className = 'flying-card ' + (opts.cls || 'face-down');
    if (opts.content) card.innerHTML = opts.content;
    card.style.left = from.x - 16 + 'px';
    card.style.top = from.y - 23 + 'px';
    card.style.transform = `rotate(${opts.startRot || 0}deg) scale(${opts.startScale || 0.5})`;
    card.style.opacity = '1';
    document.body.appendChild(card);

    const dur = opts.duration || 400;
    const endRot = opts.endRot || (Math.random() * 10 - 5);
    const endScale = opts.endScale || 1;

    requestAnimationFrame(() => {
      card.style.transition = `left ${dur}ms ease-out, top ${dur}ms ease-out, transform ${dur}ms ease-out, opacity ${dur}ms ease`;
      card.style.left = to.x - 16 + 'px';
      card.style.top = to.y - 23 + 'px';
      card.style.transform = `rotate(${endRot}deg) scale(${endScale})`;
      if (opts.fadeOut) card.style.opacity = '0';
    });

    setTimeout(() => card.remove(), dur + 50);
  },

  // Karten austeilen: vom Dealer zu jedem Spieler
  animateDeal(seatIndices) {
    const dealer = this.dealerPos();
    seatIndices.forEach((seatIdx, i) => {
      // Zwei Karten pro Spieler
      setTimeout(() => {
        this.flyCard(dealer, this.seatPos(seatIdx), { duration: 350, startRot: -20, endRot: -8 + Math.random() * 6 });
        PokerSFX.cardDeal();
      }, i * 120);
      setTimeout(() => {
        this.flyCard(dealer, this.seatPos(seatIdx), { duration: 350, startRot: 20, endRot: 3 + Math.random() * 6 });
        PokerSFX.cardDeal();
      }, i * 120 + 80);
    });
    // Karten zum eigenen Hand-Bereich (nur wenn am Tisch)
    if (mySeat >= 0) {
      const myIdx = seatIndices.length;
      setTimeout(() => {
        this.flyCard(dealer, this.myHandPos(), { duration: 400, startScale: 0.4, endScale: 1.2, startRot: -15 });
        PokerSFX.cardDeal();
      }, myIdx * 120);
      setTimeout(() => {
        this.flyCard(dealer, this.myHandPos(), { duration: 400, startScale: 0.4, endScale: 1.2, startRot: 15 });
        PokerSFX.cardDeal();
      }, myIdx * 120 + 80);
    }
  },

  // Community-Karten: fliegen zur Mitte
  animateCommunity(count, offset) {
    const dealer = this.dealerPos();
    for (let i = 0; i < count; i++) {
      const cardIdx = offset + i; // Flop: offset=0 → 0,1,2 | Turn: offset=3 → 3 | River: offset=4 → 4
      setTimeout(() => {
        this.flyCard(dealer, this.communityPos(cardIdx), { duration: 350, startRot: -10, endRot: 0 });
        PokerSFX.cardDeal();
      }, i * 120);
    }
  },

  // Fold: Karten fliegen zur Mitte und verschwinden
  animateFold(seatIdx) {
    const from = this.seatPos(seatIdx);
    const to = this.centerPos();
    this.flyCard(from, to, { cls: 'fold-card', duration: 350, fadeOut: true, startRot: -10, endRot: 30, endScale: 0.6 });
    setTimeout(() => {
      this.flyCard({ x: from.x + 8, y: from.y + 4 }, to, { cls: 'fold-card', duration: 350, fadeOut: true, startRot: 10, endRot: -20, endScale: 0.6 });
    }, 60);
  },

  // Gewinner: Chips/Karten fliegen zum Gewinner
  animateWin(seatIdx) {
    const to = this.seatPos(seatIdx);
    const center = this.centerPos();
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        const from = { x: center.x + (Math.random() - 0.5) * 60, y: center.y + (Math.random() - 0.5) * 30 };
        this.flyCard(from, to, { cls: 'face-down', duration: 300 + Math.random() * 200, endScale: 0.3, fadeOut: true });
      }, i * 80);
    }
  }
};

<script>
const token = localStorage.getItem('casinoToken');
const user = (() => { try { return JSON.parse(localStorage.getItem('casinoUser')); } catch(e) { return null; } })();
const tableId = new URLSearchParams(location.search).get('table') || 'tisch-1';

let socket = null;

function startGame(playerName) {
  if (socket) return; // Schon verbunden
  document.getElementById('nameOverlay').classList.add('hidden');
  socket = io({ auth: { token, username: playerName || undefined } });
  setupSocketEvents();

window.submitName = function() {
  var inp = document.getElementById('nameInput');
  var btn = document.getElementById('nameBtn');
  var name = inp.value.trim();
  if (!name || name.length < 2) {
    inp.style.borderColor = '#e74c3c';
    inp.placeholder = 'Mindestens 2 Zeichen!';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Prüfe...';
  fetch('/api/check-name?name=' + encodeURIComponent(name))
    .then(r => r.json())
    .then(d => {
      if (!d.available) {
        inp.style.borderColor = '#e74c3c';
        inp.value = '';
        inp.placeholder = '„' + name + '" ist vergeben!';
        btn.disabled = false;
        btn.textContent = 'Eintreten';

      }
      localStorage.setItem('pokerPlayerName', name);
      try { PokerSFX.init(); PokerSFX.btnClick(); } catch(e) {}
      startGame(name);
    })
    .catch(() => {
      // Bei Fehler trotzdem erlauben
      localStorage.setItem('pokerPlayerName', name);
      startGame(name);
    });
};

let myState = null;
let mySeat = -1;
let currentPhase = 'waiting';
let prevFoldState = [false,false,false,false,false,false];

// ===================== DRAGGABLE SEATS =====================
// Gespeicherte Positionen laden
const seatPositions = (() => {
  try { return JSON.parse(localStorage.getItem('pokerSeatPositions')) || {}; }
  catch(e) { return {}; }
})();

function saveSeatPositions() {
  try { localStorage.setItem('pokerSeatPositions', JSON.stringify(seatPositions)); } catch(e) {}
}

function initSeatDrag(el, seatIdx) {
  let isDragging = false;
  let startX, startY, origLeft, origTop;
  let dragMoved = false;

  function getPos(e) {
    if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onStart(e) {
    if (el.classList.contains('you')) return;
    const pos = getPos(e);
    startX = pos.x; startY = pos.y;
    // getBoundingClientRect berücksichtigt transform:translate(-50%,-50%)
    const r = el.getBoundingClientRect();
    origLeft = r.left + r.width/2; // center X (wegen translate -50%)
    origTop = r.top + r.height/2;  // center Y
    isDragging = true; dragMoved = false;
    el.classList.add('dragging');
  }

  function onMove(e) {
    if (!isDragging) return;
    const pos = getPos(e);
    const dx = pos.x - startX;
    const dy = pos.y - startY;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) dragMoved = true;
    if (!dragMoved) return;
    e.preventDefault();
    const newLeft = origLeft + dx;
    const newTop = origTop + dy;
    const maxX = window.innerWidth - 20;
    const maxY = window.innerHeight - 20;
    // Setze pixel-Position (transform translate(-50%,-50%) zentriert automatisch)
    el.style.left = Math.max(10, Math.min(maxX, newLeft)) + 'px';
    el.style.top = Math.max(40, Math.min(maxY, newTop)) + 'px';
  }

  function onEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    el.classList.remove('dragging');
    el._dragMoved = dragMoved;
    if (dragMoved) {
      seatPositions[seatIdx] = { top: el.style.top, left: el.style.left };
      saveSeatPositions();
    }
    // Reset nach kurzem Delay (damit onclick den Status noch lesen kann)
    setTimeout(() => { el._dragMoved = false; }, 50);
  }

  el.addEventListener('mousedown', onStart);
  el.addEventListener('touchstart', onStart, { passive: true });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
}
let raiseAmount = 200;
let turnTimer = null;
let turnTimerStart = 0;

// ===================== CARD RENDERING =====================
function renderCard(c) {
  if (c === '??' || !c) return '<div class="card hidden"><div class="card-back-design">♠</div></div>';
  const rank = c.slice(0, -1);
  const suit = c.slice(-1);
  const isRed = (suit === '♥' || suit === '♦');
  const cls = isRed ? ' red' : ' black';
  return `<div class="card${cls}">
    <div class="corner-tl"><span class="c-rank">${rank}</span><span class="c-suit">${suit}</span></div>
    <span class="center-suit">${suit}</span>
    <div class="corner-br"><span class="c-rank">${rank}</span><span class="c-suit">${suit}</span></div>
  </div>`;
}

function renderEmptyCard() {
  return '<div class="card empty-slot"></div>';
}

// ===================== TURN TIMER =====================
function startTurnTimer(seconds) {
  const bar = document.getElementById('timerBar');
  const fill = document.getElementById('timerFill');
  bar.style.display = 'block';
  fill.style.width = '100%';
  turnTimerStart = Date.now();
  if (turnTimer) clearInterval(turnTimer);
  turnTimer = setInterval(() => {
    const elapsed = (Date.now() - turnTimerStart) / 1000;
    const pct = Math.max(0, 100 - (elapsed / seconds * 100));
    fill.style.width = pct + '%';
    if (pct <= 0) { clearInterval(turnTimer); bar.style.display = 'none'; }
  }, 100);
}
function stopTurnTimer() {
  if (turnTimer) clearInterval(turnTimer);
  document.getElementById('timerBar').style.display = 'none';
}

// ===================== STATE RENDERING =====================
function renderState(state) {
  const oldState = myState; // Alten State merken BEVOR überschrieben
  myState = state;
  const prevPhase = currentPhase;
  currentPhase = state.phase;

  // Phase change announcements + Fluganimationen
  if (prevPhase !== state.phase && state.phase !== 'waiting') {
    const announcements = { preflop:'Neue Runde!', flop:'Flop!', turn:'Turn!', river:'River!', showdown:'Aufdecken!' };
    if (announcements[state.phase]) showPhase(announcements[state.phase]);
    // Phase-Sounds + Kartenflug
    try {
      if (state.phase === 'preflop') {
        const occupiedSeats = [];
        for (let i = 0; i < 6; i++) {
          if (state.seats[i] && !state.seats[i].isYou) occupiedSeats.push(i);
        }
        CardAnim.animateDeal(occupiedSeats);
        prevFoldState = [false,false,false,false,false,false];
      }
      else if (state.phase === 'flop') { CardAnim.animateCommunity(3, 0); }
      else if (state.phase === 'turn') { CardAnim.animateCommunity(1, 3); }
      else if (state.phase === 'river') { CardAnim.animateCommunity(1, 4); }
      else if (state.phase === 'showdown') PokerSFX.showdown();
    } catch(e) { console.warn('CardAnim error:', e); }
  }
  // Du bist dran (oldState für vorherigen Zustand nutzen)
  const wasMyTurn = oldState && oldState.currentSeat >= 0 && oldState.seats[oldState.currentSeat] && oldState.seats[oldState.currentSeat].isYou;
  const isNowMyTurn = state.currentSeat >= 0 && state.seats[state.currentSeat] && state.seats[state.currentSeat].isYou;
  if (!wasMyTurn && isNowMyTurn && state.phase !== 'waiting') PokerSFX.yourTurn();

  // Pot
  document.getElementById('potAmount').textContent = state.pot.toLocaleString('de-DE');

  // Community cards with animation
  const cc = document.getElementById('communityCards');
  let communityHTML = '';
  for (let i = 0; i < 5; i++) {
    if (state.community && state.community[i]) {
      communityHTML += renderCard(state.community[i]);
    } else {
      communityHTML += renderEmptyCard();
    }
  }
  cc.innerHTML = communityHTML;

  // Phase label
  document.getElementById('phaseLabel').textContent = phaseMap(state.phase);

  // Seats – in-place Update (Position bleibt erhalten bei Drag)
  const container = document.getElementById('seatsContainer');
  mySeat = -1;

  for (let i = 0; i < 6; i++) {
    const s = state.seats[i];
    let div = container.querySelector(`.seat[data-pos="${i}"]`);
    if (!div) {
      div = document.createElement('div');
      div.className = 'seat';
      div.setAttribute('data-pos', i);
      container.appendChild(div);
      // Gespeicherte Position laden
      const saved = seatPositions[i];
      if (saved) { div.style.top = saved.top; div.style.left = saved.left; }
      // Drag initialisieren
      initSeatDrag(div, i);
    }

    // Klassen setzen (ohne Position zu verlieren)
    let cls = 'seat';
    if (!s) {
      cls += ' empty';
    } else {
      if (s.isYou) { cls += ' you'; mySeat = i; }
      if (state.currentSeat === i) cls += ' active';
      if (s.folded) cls += ' folded';
      if (s.peeking) cls += ' peeking';
    }
    if (div.classList.contains('dragging')) cls += ' dragging';
    div.className = cls;

    // Inhalt aktualisieren
    if (!s) {
      div.innerHTML = `<div class="seat-inner">
        <div class="seat-cards"></div>
        <div class="seat-name">Freier Platz</div>
      </div>`;
      div.onclick = (e) => { if (!div._dragMoved) joinSeat(i); };
    } else {
      const dealerChip = s.isDealer ? '<div class="dealer-chip">D</div>' : '';
      const betBubble = s.bet > 0 ? `<div class="seat-bet-bubble">${s.bet.toLocaleString('de-DE')}</div>` : '';
      const handName = s.handName ? `<div class="seat-hand">${s.handName}</div>` : '';
      const foldedLabel = s.folded ? '<div style="font-size:10px;color:#d44;margin-top:2px">Gepasst</div>' : '';
      const botBadge = s.isBot ? `<span class="bot-badge">KI</span>` : '';
      const botStyle = s.isBot && s.botStyle ? `<div class="bot-style-tag ${s.botStyle}">${s.botStyle}</div>` : '';

      div.innerHTML = `<div class="seat-inner" style="position:relative">
        ${dealerChip}
        <div class="seat-cards">${s.cards.map(renderCard).join('')}</div>
        <div class="seat-name">${s.username}${s.isYou ? ' (Du)' : ''}${botBadge}</div>
        <div class="seat-chips">💰 ${(s.chips || 0).toLocaleString('de-DE')}</div>
        ${botStyle}${betBubble}${handName}${foldedLabel}
      </div>`;
      div.onclick = null;
    }
  }

  // Fold-Animationen: erkennen wer gerade gefoldet hat
  try {
    for (let i = 0; i < 6; i++) {
      const s = state.seats[i];
      const nowFolded = s && s.folded;
      if (nowFolded && !prevFoldState[i]) {
        if (!s.isYou) {
          CardAnim.animateFold(i);
          PokerSFX.fold();
        }
      }
      prevFoldState[i] = !!nowFolded;
    }
  } catch(e) { console.warn('Fold anim error:', e); }

  // Timer for active turn
  const isMyTurn = state.currentSeat >= 0 && state.seats[state.currentSeat] && state.seats[state.currentSeat].isYou;
  if (isMyTurn && state.phase !== 'waiting' && state.phase !== 'showdown') {
    startTurnTimer(30);
  } else {
    stopTurnTimer();
  }

  // Table info
  const tischName = tableId.replace('tisch-', 'Tisch ');
  document.getElementById('tableInfo').textContent =
    `${tischName} · ${state.playerCount} Spieler · ${phaseMap(state.phase)}`;

  // Bot button visibility
  const hasBots = state.seats.some(s => s && s.isBot);
  const hasEmptySeat = state.seats.some(s => !s);
  document.getElementById('removeBotBtn').style.display = hasBots ? 'flex' : 'none';
  document.querySelector('.bot-controls .bot-btn:first-child').style.display = hasEmptySeat ? 'flex' : 'none';

  renderControls(state);
  updateMyHand(state);

  // Video-Tiles an Seats re-attachen (weil seat innerHTML aktualisiert wurde)
  if (vcActive) {
    try { reattachSeatVideos(); } catch(e) { console.warn('Video reattach error:', e); }
  }
}

// ===================== GROSSE HAND-ANZEIGE =====================
let lastHandCards = [null, null]; // Letzte bekannte Karten merken

function renderHandCard(c, index) {
  const hasCard = c && c !== '??';
  let faceHtml = '';
  let faceClass = 'hand-card-face';
  if (hasCard) {
    const rank = c.slice(0, -1);
    const suit = c.slice(-1);
    const isRed = (suit === '♥' || suit === '♦');
    if (isRed) faceClass += ' red';
    faceHtml = `<div class="h-corner-tl"><span class="hc-rank">${rank}</span><span class="hc-suit">${suit}</span></div>
      <span class="h-center-suit">${suit}</span>
      <div class="h-corner-br"><span class="hc-rank">${rank}</span><span class="hc-suit">${suit}</span></div>`;
  }
  // Karten starten immer verdeckt (flipped) – Antippen dreht um
  return `<div class="hand-card-wrap flipped" data-card-idx="${index}" ontouchstart="flipCard(this, true, event)" ontouchend="flipCard(this, false, event)" onmousedown="flipCard(this, true, event)" onmouseup="flipCard(this, false, event)" onmouseleave="flipCard(this, false, event)">
    <div class="${faceClass}">${faceHtml}</div>
    <div class="hand-card-back"></div>
  </div>`;
}

let isPeeking = false;

// Eine einzelne Karte umdrehen
function flipCard(el, show, e) {
  if (e) e.stopPropagation();
  if (show && el.classList.contains('flipped')) {
    PokerSFX.cardPeek();
  }
  if (show) {
    el.classList.remove('flipped');
  } else {
    el.classList.add('flipped');
  }
  updatePeekState();
}

// Beide Karten umdrehen
function flipAllCards(show, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  const wraps = document.querySelectorAll('.hand-card-wrap');
  const wasFlipped = [...wraps].some(w => w.classList.contains('flipped'));
  wraps.forEach(w => {
    if (show) w.classList.remove('flipped');
    else w.classList.add('flipped');
  });
  if (show && wasFlipped) PokerSFX.cardPeek();
  updatePeekState();
}

function updatePeekState() {
  const wraps = document.querySelectorAll('.hand-card-wrap');
  const anyOpen = [...wraps].some(w => !w.classList.contains('flipped'));
  if (anyOpen !== isPeeking) {
    isPeeking = anyOpen;
    if (socket) socket.emit('poker:peek', { peeking: isPeeking });
  }
}

function updateMyHand(state) {
  const handEl = document.getElementById('myHand');
  const labelEl = document.querySelector('.my-hand-label');
  const me = state.seats.find(s => s && s.isYou);

  // Keine echten Karten → komplett ausblenden
  const hasRealCards = me && me.cards && me.cards.length > 0 && !me.folded && state.phase !== 'waiting';
  if (!hasRealCards) {
    handEl.classList.remove('visible');
    if (labelEl) labelEl.classList.remove('visible');
    lastHandCards = [null, null];
    return;
  }

  handEl.classList.add('visible');
  const cards = me.cards;

  // Karten rendern
  let html = '';
  cards.forEach((c, i) => {
    html += renderHandCard(c, i);
  });

  // Beide-Karten-Button zwischen den Karten
  html += `<div class="hand-flip-both" ontouchstart="flipAllCards(true, event)" ontouchend="flipAllCards(false, event)" onmousedown="flipAllCards(true, event)" onmouseup="flipAllCards(false, event)" onmouseleave="flipAllCards(false, event)">👁</div>`;

  // Chips-Info zwischen den Karten
  const chipsStr = (me.chips || 0).toLocaleString('de-DE');
  const betStr = me.bet > 0 ? `<div class="hand-bet">Einsatz: ${me.bet.toLocaleString('de-DE')}</div>` : '';
  html += `<div class="hand-info">
    <div class="hand-chips">💰 ${chipsStr}</div>
    ${betStr}
  </div>`;

  // Nur neu rendern wenn sich die Karten geändert haben (sonst geht Flip-State verloren)
  const cardStr = JSON.stringify(cards);
  const lastStr = JSON.stringify(lastHandCards);
  if (cardStr !== lastStr) {
    handEl.innerHTML = html;
    lastHandCards = [...cards];
  } else {
    // Nur Chips/Bet aktualisieren
    const infoEl = handEl.querySelector('.hand-info');
    if (infoEl) {
      infoEl.innerHTML = `<div class="hand-chips">💰 ${chipsStr}</div>${betStr}`;
    }
  }

  // Positionierung: über den Controls (mit rAF für korrektes Layout)
  requestAnimationFrame(() => {
    const controls = document.getElementById('controls');
    const controlsH = controls ? controls.offsetHeight : 90;
    handEl.style.bottom = (controlsH + 6) + 'px';

    // Label mit Handname wenn vorhanden
    if (labelEl) {
      const cardH = handEl.offsetHeight || 130;
      if (me.handName) {
        labelEl.textContent = me.handName;
        labelEl.classList.add('visible');
        labelEl.style.bottom = (controlsH + cardH + 14) + 'px';
      } else if (state.phase !== 'showdown') {
        labelEl.textContent = 'Deine Hand';
        labelEl.classList.add('visible');
        labelEl.style.bottom = (controlsH + cardH + 14) + 'px';
      } else {
        labelEl.classList.remove('visible');
      }
    }
  });
}

function phaseMap(p) {
  const m = {
    waiting:'Wartet auf Spieler...',
    preflop:'Vor dem Flop',
    flop:'Flop',
    turn:'Turn',
    river:'River',
    showdown:'Aufdecken'
  };
  return m[p] || p;
}

function takeFirstSeat() {
  if (!myState) return;
  // Ersten freien Platz finden
  for (let i = 0; i < 6; i++) {
    if (!myState.seats[i]) {
      joinSeat(i);
      // Button sofort ausblenden
      document.getElementById('takeSeatArea').classList.add('hidden');
      document.getElementById('controls').style.display = '';
      return;
    }
  }
}

// ===================== CONTROLS =====================
function renderControls(state) {
  const ctrl = document.getElementById('controls');
  const takeSeat = document.getElementById('takeSeatArea');
  const meInGame = state.seats.some(s => s && s.isYou);

  if (!meInGame) {
    // "Nimm Platz ein" anzeigen, Controls verstecken
    takeSeat.classList.remove('hidden');
    ctrl.style.display = 'none';
    return;
  }

  // Spieler sitzt → "Nimm Platz" weg, Controls zeigen
  takeSeat.classList.add('hidden');
  ctrl.style.display = '';

  const me = state.seats.find(s => s && s.isYou);
  if (!me) return;

  if (state.phase === 'waiting') {
    ctrl.innerHTML = '<div style="color:rgba(240,230,211,.5);font-size:14px">⏳ Warte auf weitere Spieler...</div>';
    return;
  }

  if (state.phase === 'showdown') {
    const myHand = me.handName;
    if (myHand) {
      ctrl.innerHTML = `<div style="color:#F4D03F;font-size:16px;font-weight:700">Deine Hand: ${myHand}</div>
        <div style="color:rgba(240,230,211,.4);font-size:12px;margin-top:4px">Nächste Runde startet gleich...</div>`;
    } else {
      ctrl.innerHTML = '<div style="color:rgba(240,230,211,.5);font-size:14px">Nächste Runde startet gleich...</div>';
    }
    return;
  }

  if (me.folded) {
    ctrl.innerHTML = '<div style="color:rgba(240,230,211,.5);font-size:14px">Du hast gepasst. Warte auf nächste Runde...</div>';
    return;
  }

  const isMyTurn = state.currentSeat >= 0 && state.seats[state.currentSeat] && state.seats[state.currentSeat].isYou;

  if (!isMyTurn) {
    const current = state.currentSeat >= 0 && state.seats[state.currentSeat];
    const name = current ? current.username : '...';
    ctrl.innerHTML = `<div style="color:rgba(240,230,211,.5);font-size:14px">⏳ ${name} ist am Zug...</div>`;
    return;
  }

  // MY TURN
  const toCall = state.currentBet - (me.bet || 0);
  const canCheck = toCall <= 0;
  const myChips = me.chips || 0;
  const minRaise = Math.max(state.currentBet * 2, 200);
  if (raiseAmount < minRaise) raiseAmount = minRaise;
  if (raiseAmount > myChips) raiseAmount = myChips;

  // Reihe 1: Mitgehen/Schieben + Alles setzen
  let html = '<div class="action-row">';
  if (canCheck) {
    html += `<button class="btn btn-check" onclick="doCheck()">✓ Schieben</button>`;
  } else {
    const callAmt = Math.min(toCall, myChips);
    html += `<button class="btn btn-call" onclick="doCall()">📞 Mitgehen ${callAmt.toLocaleString('de-DE')}</button>`;
  }
  if (myChips > 0) {
    html += `<button class="btn btn-allin" onclick="doAllIn()">🔥 Alles (${myChips.toLocaleString('de-DE')})</button>`;
  }
  html += '</div>';

  // Reihe 2: Passen + Erhöhen + Slider — alles in einer Zeile
  html += '<div class="action-row-raise">';
  html += `<button class="btn btn-fold" onclick="doFold()">✕ Passen</button>`;
  if (myChips > toCall) {
    const minR = Math.max(state.currentBet * 2, 200);
    const maxR = myChips;
    if (raiseAmount < minR) raiseAmount = minR;
    if (raiseAmount > maxR) raiseAmount = maxR;
    html += `<button class="btn btn-raise" onclick="doRaise()">⬆ ${raiseAmount.toLocaleString('de-DE')}</button>`;
    html += `<input type="range" class="chip-slider" min="${minR}" max="${maxR}" step="50" value="${raiseAmount}"
      oninput="updateRaise(this.value)">`;
  }
  html += '</div>';

  ctrl.innerHTML = html;
}

// ===================== ACTIONS =====================
function joinSeat(seat) {
  socket.emit('poker:join', { tableId, seat });
  // Sofort "Nimm Platz" ausblenden
  document.getElementById('takeSeatArea').classList.add('hidden');
  document.getElementById('controls').style.display = '';
}
function doCall() { PokerSFX.call(); socket.emit('poker:call'); }
function doRaise() { PokerSFX.raise(); socket.emit('poker:raise', { amount: raiseAmount }); }
function doFold() {
  PokerSFX.fold();
  // Eigene Karten fliegen zur Mitte
  if (mySeat >= 0) {
    const from = CardAnim.myHandPos();
    const to = CardAnim.centerPos();
    CardAnim.flyCard(from, to, { cls:'fold-card', duration:350, fadeOut:true, startRot:-10, endRot:30, endScale:0.6 });
    setTimeout(() => {
      CardAnim.flyCard({x:from.x+8,y:from.y+4}, to, { cls:'fold-card', duration:350, fadeOut:true, startRot:10, endRot:-20, endScale:0.6 });
    }, 60);
  }
  socket.emit('poker:fold');
}
function doCheck() { PokerSFX.check(); socket.emit('poker:check'); }

function updateRaise(val) {
  raiseAmount = parseInt(val);
  // Erhöhen-Button Text aktualisieren
  const raiseBtn = document.querySelector('.btn-raise');
  if (raiseBtn) raiseBtn.textContent = '⬆ ' + raiseAmount.toLocaleString('de-DE');
}
function doAllIn() {
  PokerSFX.raise();
  const me = myState && myState.seats.find(s => s && s.isYou);
  if (me) socket.emit('poker:raise', { amount: me.chips });
}

// ===================== SOCKET EVENTS (in connectSocket registriert) =====================
function setupSocketEvents() {
  socket.on('connect', () => {
    socket.emit('poker:join', { tableId, seat: -1 });
    document.getElementById('tableInfo').textContent = 'Verbunden!';
  });

  socket.on('disconnect', () => {
    document.getElementById('tableInfo').textContent = 'Verbindung verloren...';
    stopTurnTimer();
  });

  socket.on('poker:state', renderState);
  socket.on('poker:playerJoined', d => { PokerSFX.playerJoin(); showPhase(d.username + ' setzt sich!'); });
  socket.on('poker:playerLeft', d => { PokerSFX.playerLeave(); showPhase(d.username + ' geht...'); });
  socket.on('poker:winner', d => {
    const me = myState && myState.seats.find(s => s && s.isYou);
    if (me && d.username === me.username) PokerSFX.win();
    else PokerSFX.lose();
    // Gewinner-Animation: Karten/Chips fliegen zum Gewinner-Seat
    if (myState) {
      const winnerIdx = myState.seats.findIndex(s => s && s.username === d.username);
      if (winnerIdx >= 0) {
        if (myState.seats[winnerIdx].isYou) {
          // Eigener Gewinn → zum Hand-Bereich fliegen
          const to = CardAnim.myHandPos();
          const center = CardAnim.centerPos();
          for (let i = 0; i < 5; i++) {
            setTimeout(() => {
              const from = { x: center.x + (Math.random()-.5)*60, y: center.y + (Math.random()-.5)*30 };
              CardAnim.flyCard(from, to, { cls:'face-down', duration: 300+Math.random()*200, endScale:0.4, fadeOut:true });
            }, i * 80);
          }
        } else {
          CardAnim.animateWin(winnerIdx);
        }
      }
    }
    showWinner(d);
  });

  socket.on('chat:msg', d => {
    const msgs = document.getElementById('chatMessages');
    msgs.innerHTML += `<div class="chat-msg"><span class="name">${d.username}:</span> ${d.msg}</div>`;
    msgs.scrollTop = msgs.scrollHeight;
  });

  socket.on('error', msg => { showPhase(msg); });

  // ---- RTC SOCKET EVENTS (für Video/Sprach-Chat) ----
  socket.on('rtc:peers', async (peerList) => {
    for (const { peerId, username } of peerList) {
      await createPeerConnection(peerId, username, true);
    }
  });

  socket.on('rtc:peerJoined', async ({ peerId, username }) => {
    if (!vcActive) return;
    setVcStatus(`🟢 ${username} ist beigetreten`);
  });

  socket.on('rtc:offer', async ({ from, username, offer }) => {
    if (!vcActive) return;
    const pc = await createPeerConnection(from, username, false);
    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('rtc:answer', { to: from, answer });
  });

  socket.on('rtc:answer', async ({ from, answer }) => {
    if (peers[from]) {
      await peers[from].pc.setRemoteDescription(answer);
    }
  });

  socket.on('rtc:ice', async ({ from, candidate }) => {
    if (peers[from]) {
      try { await peers[from].pc.addIceCandidate(candidate); } catch(e) {}
    }
  });

  socket.on('rtc:peerLeft', ({ peerId }) => {
    const username = peers[peerId]?.username || 'Jemand';
    removePeer(peerId);
    setVcStatus(`🔴 ${username} hat verlassen`);
  });
}

    socket.emit('rtc:join', { room: 'pk-' + tableId });
    setVcStatus('🟢 Sprachchat aktiv');
  } catch (err) {
    console.error('Kamera/Mikrofon Fehler:', err);
    setVcStatus('⚠️ Kein Zugriff auf Kamera/Mikrofon');

    // Nur Audio versuchen
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      vcActive = true;
      camEnabled = false;
      addVideoTile('local', user?.username || 'Du', localStream, true);
      document.getElementById('vcFab').classList.add('connected');
      document.getElementById('vcFab').textContent = '🟢';
      document.getElementById('vcJoinBtn').classList.add('active');
      document.getElementById('vcJoinBtn').textContent = '📵';
      document.getElementById('vcMicBtn').classList.add('active');
      document.getElementById('vcCamBtn').classList.add('muted');
      socket.emit('rtc:join', { room: 'pk-' + tableId });
      setVcStatus('🟢 Nur Sprache (keine Kamera)');
    } catch (err2) {
      setVcStatus('❌ Kein Mikrofon gefunden');
    }
  }
}

function leaveVoiceChat() {
  vcActive = false;
  socket.emit('rtc:leave');

  // Alle Peer-Verbindungen schließen
  for (const peerId of Object.keys(peers)) {
    removePeer(peerId);
  }

  // Eigenen Stream stoppen
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }

  // Video-Grid + Seat-Videos + eigenes Video leeren
  document.getElementById('videoGrid').innerHTML = '';
  document.querySelectorAll('.seat-video').forEach(v => v.remove());
  const myVid = document.getElementById('myVideoTile');
  if (myVid) myVid.remove();
  // Peer-Seat-Map leeren
  for (const key of Object.keys(peerSeatMap)) delete peerSeatMap[key];

  // Buttons zurücksetzen
  document.getElementById('vcFab').classList.remove('connected');
  document.getElementById('vcFab').textContent = '📞';
  document.getElementById('vcJoinBtn').classList.remove('active');
  document.getElementById('vcJoinBtn').textContent = '📞';
  document.getElementById('vcJoinBtn').title = 'Sprachchat beitreten';
  document.getElementById('vcMicBtn').classList.remove('active', 'muted');
  document.getElementById('vcCamBtn').classList.remove('active', 'muted');
  document.getElementById('vcControls').classList.remove('open');
  micEnabled = true;
  camEnabled = true;
  setVcStatus('Sprachchat verlassen');
}

function toggleMic() {
  if (!localStream) return;
  micEnabled = !micEnabled;
  localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
  const btn = document.getElementById('vcMicBtn');
  btn.classList.toggle('active', micEnabled);
  btn.classList.toggle('muted', !micEnabled);
  btn.textContent = micEnabled ? '🎤' : '🔇';
}

function toggleCam() {
  if (!localStream) return;
  const videoTracks = localStream.getVideoTracks();
  if (videoTracks.length === 0) return;
  camEnabled = !camEnabled;
  videoTracks.forEach(t => t.enabled = camEnabled);
  const btn = document.getElementById('vcCamBtn');
  btn.classList.toggle('active', camEnabled);
  btn.classList.toggle('muted', !camEnabled);
  btn.textContent = camEnabled ? '📷' : '🚫';

  // Eigenes Video-Tile aktualisieren
  const myVid = document.getElementById('myVideoTile');
  if (myVid) myVid.style.display = camEnabled ? '' : 'none';
}

// Peer-Username → Seat-Index Mapping
const peerSeatMap = {}; // peerId -> seatIdx

function findSeatForUsername(username) {
  if (!myState) return -1;
  return myState.seats.findIndex(s => s && s.username === username);
}

function addVideoTile(id, username, stream, isLocal) {
  // Eigenes Video: kleines Overlay unten rechts
  if (isLocal) {
    let myVid = document.getElementById('myVideoTile');
    if (!myVid) {
      myVid = document.createElement('div');
      myVid.id = 'myVideoTile';
      myVid.className = 'my-video';
      myVid.innerHTML = `<video autoplay muted playsinline></video><div class="mv-label">Du</div>`;
      document.body.appendChild(myVid);
    }
    myVid.querySelector('video').srcObject = stream;
    if (!stream.getVideoTracks().length) myVid.style.display = 'none';
    return;
  }

  // Gegner-Video: Am Seat des Spielers anzeigen
  const seatIdx = findSeatForUsername(username);
  peerSeatMap[id] = { username, stream, seatIdx };

  if (seatIdx >= 0) {
    attachVideoToSeat(id, seatIdx, stream);
  } else {
    // Fallback: ins Grid (falls Seat nicht gefunden)
    let tile = document.getElementById('vt-' + id);
    if (!tile) {
      tile = document.createElement('div');
      tile.id = 'vt-' + id;
      tile.className = 'video-tile';
      tile.innerHTML = `<video autoplay playsinline></video><div class="vt-name">${username}</div>`;
      document.getElementById('videoGrid').appendChild(tile);
    }
    tile.querySelector('video').srcObject = stream;
  }

  // Speaking-Erkennung
  try {
    const audioCtx = new AudioContext();
    const analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    analyser.fftSize = 256;
    const data = new Uint8Array(analyser.frequencyBinCount);
    const checkSpeaking = () => {
      if (!peers[id]) return;
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b) / data.length;
      const isSpeaking = avg > 20;
      // Speaking-Status auf Seat-Video + Grid-Tile setzen
      const seatVid = document.getElementById('sv-' + id);
      const gridTile = document.getElementById('vt-' + id);
      if (seatVid) seatVid.classList.toggle('speaking', isSpeaking);
      if (gridTile) gridTile.classList.toggle('speaking', isSpeaking);
      requestAnimationFrame(checkSpeaking);
    };
    checkSpeaking();
  } catch(e) {}
}

function attachVideoToSeat(peerId, seatIdx, stream) {
  const seat = document.querySelector(`.seat[data-pos="${seatIdx}"]`);
  if (!seat) return;

  // Altes Seat-Video entfernen falls vorhanden
  const old = document.getElementById('sv-' + peerId);
  if (old) old.remove();

  const seatVid = document.createElement('div');
  seatVid.id = 'sv-' + peerId;
  seatVid.className = 'seat-video';
  seatVid.innerHTML = `<video autoplay playsinline></video>`;
  seatVid.querySelector('video').srcObject = stream;
  seat.appendChild(seatVid);
}

// Nach jedem renderState: Video-Elemente an Seats re-attachen (weil innerHTML sich ändert)
function reattachSeatVideos() {
  for (const [peerId, info] of Object.entries(peerSeatMap)) {
    if (!peers[peerId]) continue;
    const newSeatIdx = findSeatForUsername(info.username);
    if (newSeatIdx >= 0) {
      info.seatIdx = newSeatIdx;
      // Nur re-attachen wenn nicht mehr vorhanden
      if (!document.getElementById('sv-' + peerId)) {
        attachVideoToSeat(peerId, newSeatIdx, info.stream);
      }
    }
  }
}

function removeVideoTile(id) {
  const tile = document.getElementById('vt-' + id);
  if (tile) tile.remove();
  const sv = document.getElementById('sv-' + id);
  if (sv) sv.remove();
  delete peerSeatMap[id];
}

// ===================== WEBRTC PEER MANAGEMENT =====================
async function createPeerConnection(peerId, username, isInitiator) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  peers[peerId] = { pc, username };

  // Lokalen Stream hinzufügen
  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  // Remote Stream empfangen
  pc.ontrack = (e) => {
    if (e.streams[0]) {
      addVideoTile(peerId, username, e.streams[0], false);
    }
  };

  // ICE Candidates senden
  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('rtc:ice', { to: peerId, candidate: e.candidate });
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
      removePeer(peerId);
    }
  };

  if (isInitiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('rtc:offer', { to: peerId, offer });
  }

  return pc;
}

function removePeer(peerId) {
  if (peers[peerId]) {
    peers[peerId].pc.close();
    delete peers[peerId];
  }
  removeVideoTile(peerId);
}
